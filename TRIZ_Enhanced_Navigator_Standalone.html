 "a952", "title": "Pool-Frenkel Effect", "description": "(or Frenkel-Poole emission) A means by which an electrical insulator can conduct electricity in the presence of a large electric field.", "note": "", "link": "http://en.wikipedia.org/wiki/Poole-Frenkel_effect"}, "a998": {"id": "a998", "title": "Radiation Pressure", "description": "The pressure exerted upon any surface exposed to electromagnetic radiation. If absorbed, the pressure is the power flux density divided by the speed of light. If the radiation is totally reflected, the radiation pressure is doubled.", "note": "", "link": "http://en.wikipedia.org/wiki/Radiation_pressure"}, "a1066": {"id": "a1066", "title": "Seebeck Effect", "description": "The conversion of temperature differences directly into electricity.  A thermoelectric EMF (voltage), is created in the presence of a temperature difference between two different metals or semiconductors. This causes a continuous current in the conductors if they form a circuit.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermoelectric_effect#Seebeck_effect"}, "a1095": {"id": "a1095", "title": "Shunt", "description": "In electronics, a shunt is a device which allows electric current to pass around another point in the circuit.", "note": "", "link": "http://en.wikipedia.org/wiki/Shunt_(electrical)"}, "a1141": {"id": "a1141", "title": "Spirit Level", "description": "An instrument designed to indicate whether a surface is horizontal.", "note": "In the case of a gravity field.", "link": "http://en.wikipedia.org/wiki/Spirit_level"}, "a1165": {"id": "a1165", "title": "Stroboscopic Effect", "description": "A visual phenomenon caused by aliasing that occurs when continuous motion is represented by a series of short or instantaneous samples. It occurs when the view of a moving object is represented by a series of short samples as distinct from a continuous view, and the moving object is in rotational or other cyclic motion at a rate close to the sampling rate.", "note": "In the case of a modulated field.", "link": "http://en.wikipedia.org/wiki/Stroboscopic_effect"}, "a1228": {"id": "a1228", "title": "Thermistor", "description": "A type of resistor whose resistance varies significantly with temperature, more so than in standard resistors.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermistor"}, "a1245": {"id": "a1245", "title": "Thermopile", "description": "An electronic device that converts thermal energy into electrical energy. It is composed of several thermocouples connected usually in series or, less commonly, in parallel.", "note": "In particular, a thermal field.", "link": "https://en.wikipedia.org/wiki/Thermopile"}, "a1264": {"id": "a1264", "title": "Townsend Discharge", "description": "A gas ionization process where an initially very small amount of free electrons, accelerated by a sufficiently strong electric field, give rise to electrical conduction through a gas by avalanche multiplication: when the number of free charges drops or the electric field weakens, the phenomena ceases.", "note": "Avalanche multiplication during Townsend discharge is naturally used in gas phototubes, to amplify the photoelectric charge generated by incident radiation (visible light or not) on the cathode", "link": "http://en.wikipedia.org/wiki/Townsend_discharge"}, "a1299": {"id": "a1299", "title": "Vibrating String", "description": "A vibrating string produces a sound whose frequency in most cases is constant. Therefore, since frequency characterizes the pitch, the sound produced is a constant note. Vibrating strings are the basis of any string instrument like guitar, cello, or piano.", "note": "", "link": "https://en.wikipedia.org/wiki/Vibrating_string"}, "a1336": {"id": "a1336", "title": "Wiegand Effect", "description": "Generation of electrical pulses when a specially processed wire is moved in a magnetic field. The wire has two distinct magnetic regions that react differently to the magnetic field: the shell requires a strong magnetic field to reverse its magnetic polarity, whereas the core will revert under weaker field conditions. The polarity of the wire shifts very rapidly, generating strong, short (~10 \u00b5s) electrical pulses without additional external power.", "note": "In the case of a magnetic field.", "link": "http://en.wikipedia.org/wiki/Wiegand_effect"}, "a1344": {"id": "a1344", "title": "Yarkovsky Effect", "description": "A force acting on a rotating body in space caused by the anisotropic emission of thermal photons, which carry momentum. It is usually considered in relation to meteoroids or small asteroids (about 10 cm to 10 km in diameter), as its influence is most significant for these bodies.", "note": "", "link": "http://en.wikipedia.org/wiki/Yarkovsky_effect"}, "a85": {"id": "a85", "title": "Auger Effect", "description": "When an electron is removed from a core level of an atom, leaving a vacancy, an electron from a higher energy level may fall into the vacancy, resulting in a release of energy. Although sometimes this energy is released in the form of an emitted photon, in the case of the Auger Effect,  the energy is instead transferred to another electron, which is ejected from the atom.", "note": "Auger electron spectroscopy involves the emission of Auger electrons by bombarding a sample with X-rays or energetic electrons and measuring  the intensity of Auger electrons as a function of the Auger electron energy. The resulting spectra can be used to determine the identity of the emitting atoms and some information about their environment.", "link": "http://en.wikipedia.org/wiki/Auger_effect"}, "a351": {"id": "a351", "title": "Electric Glow Discharge", "description": "A type of plasma formed by passing a current at 100 V to several kV through a gas at low pressure, usually argon or another noble gas. It is found in products such as fluorescent lights and plasma-screen televisions, and is used in plasma physics and analytical chemistry.", "note": "", "link": "http://en.wikipedia.org/wiki/Glow_discharge"}, "a562": {"id": "a562", "title": "Helmholtz Resonance", "description": "The phenomenon of air resonance in a cavity, such as when one blows across the top of an empty bottle.", "note": "", "link": "http://en.wikipedia.org/wiki/Helmholtz_resonance"}, "a635": {"id": "a635", "title": "Isoelectric Focusing", "description": "(also known as electrofocusing) A technique for separating different molecules by their electric charge differences. It is a type of zone electrophoresis, usually performed in a gel, that takes advantage of the fact that a molecule's charge changes with the pH of its surroundings.", "note": "", "link": "http://en.wikipedia.org/wiki/Isoelectric_focusing"}, "a749": {"id": "a749", "title": "Magnetotellurics", "description": "An electromagnetic geophysical method of imaging the earth's subsurface by measuring natural variations of electrical and magnetic fields at the Earth's surface. Investigation depth ranges from 300m by recording higher frequencies down to 10,000m or more with long-period soundings.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetotellurics"}, "a881": {"id": "a881", "title": "Penning Effect", "description": "The reduction of the ionization voltage of an inert gas due to the presence of a small quantity of another inert gas or other impurity.", "note": "", "link": "http://en.wikipedia.org/wiki/Penning_mixture"}, "a965": {"id": "a965", "title": "Pressure-sensitive Paint", "description": "A method for measuring air pressure, usually in aerodynamic settings. It is paint which fluoresces in differing intensities depending on the external air pressure being applied to its surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Pressure-sensitive_paint"}, "a1107": {"id": "a1107", "title": "SODAR", "description": "(SOnic Detection And Ranging), or sodar, is a meteorological instrument also known as a wind profiler which measures the scattering of sound waves by atmospheric turbulence. SODAR systems are used to measure wind speed at various heights above the ground, and the thermodynamic structure of the lower layer of the atmosphere. Sodar systems are like radar systems except that sound waves rather than radio waves are used .", "note": "", "link": "http://en.wikipedia.org/wiki/SODAR"}, "a1214": {"id": "a1214", "title": "Theremin", "description": "An early electronic musical instrument controlled without contact from the player.", "note": "", "link": "http://en.wikipedia.org/wiki/Theremin"}, "a1258": {"id": "a1258", "title": "Time of Flight", "description": "A variety of methods that measure the time that it takes for an object, particle or acoustic, electromagnetic or other wave to travel a distance through a medium. This measurement can be used for a time standard (such as an atomic fountain), as a way to measure velocity or path length through a given medium, or as a way to learn about the particle or medium (such as composition or flow rate).", "note": "", "link": "http://en.wikipedia.org/wiki/Time_of_flight"}, "a1295": {"id": "a1295", "title": "Vapour Pressure", "description": "The pressure of a vapor in thermodynamic equilibrium with its condensed phases in a closed system. All liquids and solids have a tendency to evaporate into a gaseous form, and all gases have a tendency to condense back to their liquid or solid form.", "note": "", "link": "http://en.wikipedia.org/wiki/Vapor_pressure"}, "a75": {"id": "a75", "title": "Aquaplaning", "description": "A phenonomen that occurs when a layer of water builds between the wheels of the vehicle and the road surface, leading to a loss of traction that prevents the vehicle from responding to control inputs.", "note": "", "link": "http://en.wikipedia.org/wiki/Aquaplaning"}, "a155": {"id": "a155", "title": "Calorimetry", "description": "The science of measuring the heat of chemical reactions or physical changes. Calorimetry usually involves the use of a calorimeter", "note": "If selected components of a mixture of substances (e.g. water) are evaporated in calorimeter, the weight differences before and after can be used to determine the amount of liquid present in the original sample.", "link": "http://en.wikipedia.org/wiki/Calorimetry"}, "a163": {"id": "a163", "title": "Capillary Electrophoresis", "description": "A technique for separtion of chemical species based on their size to charge ratio in the interior of a small capillary filled with an electrolyte.", "note": "", "link": "http://en.wikipedia.org/wiki/Capillary_electrophoresis"}, "a364": {"id": "a364", "title": "Electrochemiluminescence", "description": "A kind of luminescence produced during electrochemical reactions in solutions. In electrogenerated chemiluminescence, electrochemically generated intermediates undergo a highly exergonic reaction to produce an electronically excited state that then emits light.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrochemiluminescence"}, "a378": {"id": "a378", "title": "Electrolyte", "description": "Any substance containing free ions that behaves as an electrically conductive medium. Because they generally consist of ions in solution, electrolytes are also known as ionic solutions, but molten electrolytes and solid electrolytes are also possible.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrolyte"}, "Lenard Effect": {"id": "", "title": "Lenard Effect", "description": "The separation of electric charges accompanying the aerodynamic breakup of water drops. It is also known as spray electrification or the waterfall effect.", "note": "", "link": ""}, "a696": {"id": "a696", "title": "LIDAR", "description": "(Light Detection And Ranging) is an optical remote sensing technology that measures properties of scattered light to find range and/or other information of a distant target. The prevalent method to determine distance to an object or surface is to use laser pulses. Like the similar radar technology, which uses radio waves, the range to an object is determined by measuring the time delay between transmission of a pulse and detection of the reflected signal.", "note": "", "link": "http://en.wikipedia.org/wiki/LIDAR"}, "a711": {"id": "a711", "title": "Lorentz Force Velocimetry", "description": "A noncontact electromagnetic flow measurement technique particularly suited for the measurement of velocities in liquid metals like steel or aluminium.", "note": "", "link": "http://en.wikipedia.org/wiki/Lorentz_force_velocimetry"}, "a777": {"id": "a777", "title": "Microbial Fuel Cell", "description": "A microbial fuel cell (MFC) or biological fuel cell is a bio-electrochemical system that drives a current by mimicking bacterial interactions found in nature.", "note": "The current generated from a microbial fuel cell is directly proportional to the energy content of the fuel, a micrcobial fuel cell can be used to measure the concentrations of fuel substances.", "link": "http://en.wikipedia.org/wiki/Microbial_fuel_cell"}, "a1317": {"id": "a1317", "title": "Water Turbine", "description": "A rotary engine that takes power from moving water", "note": "", "link": "http://en.wikipedia.org/wiki/Water_turbine"}, "a678": {"id": "a678", "title": "Laser Doppler Vibrometry", "description": "A technique that is used to make non-contact vibration measurements of a surface. The laser beam from the LDV is directed at the surface of interest, and the vibration amplitude and frequency are extracted from the Doppler shift of the laser beam frequency due to the motion of the surface.", "note": "For example: land mine detection. This technique uses an audio source  to excite the ground, causing it to vibrate a very small amount with the LDV used to measure the amplitude of the ground vibrations. Areas above a buried mine show an enhanced ground velocity at the resonance frequency of the mine-soil system.", "link": "http://en.wikipedia.org/wiki/Laser_Doppler_Vibrometer"}, "a868": {"id": "a868", "title": "Parallax", "description": "An apparent displacement or difference in the apparent position of an object viewed along two different lines of sight, and is measured by the angle or semi-angle of inclination between those two lines. Nearby objects have a larger parallax than more distant objects when observed from different positions, so parallax can be used to determine distances.", "note": "", "link": "http://en.wikipedia.org/wiki/Parallax"}, "a904": {"id": "a904", "title": "Photoelasticity", "description": "A method used to determine the stress distribution in a material based upon changes in birefringence resulting from stress.", "note": "By observing the changes resulting from the stress caused by the weight of the solid resting upon a medium.", "link": "http://en.wikipedia.org/wiki/Photoelasticity"}, "a1056": {"id": "a1056", "title": "Scanning Probe Microscopy", "description": "A branch of microscopy that forms images of surfaces using a physical probe that scans the specimen. An image of the surface is obtained by mechanically moving the probe in a raster scan of the specimen, line by line, and recording the probe-surface interaction as a function of position.", "note": "", "link": "http://en.wikipedia.org/wiki/Scanning_probe_microscopy"}, "a146": {"id": "a146", "title": "Brownian Motion", "description": "The random movement of particles suspended in a liquid or gas", "note": "", "link": "http://en.wikipedia.org/wiki/Brownian_motion"}, "a779": {"id": "a779", "title": "Microemulsion", "description": "A clear, stable, isotropic liquid mixture of oil, water and surfactant, frequently in combination with a cosurfactant. In contrast to ordinary emulsions, microemulsions form upon simple mixing of the components and do not require the high shear conditions generally used in the formation of ordinary emulsions. The two basic types of microemulsions are direct (oil dispersed in water, o/w) and reversed (water dispersed in oil, w/o).", "note": "", "link": "http://en.wikipedia.org/wiki/Microemulsion"}, "a98": {"id": "a98", "title": "Ballistic Pendulum", "description": "A device for measuring a bullet's momentum, from which it is possible to calculate the velocity and kinetic energy.", "note": "In the case of a moving solid striking the pendulum.", "link": "http://en.wikipedia.org/wiki/Ballistic_pendulum"}, "a39": {"id": "a39", "title": "Aerodynamic Heating", "description": "The heating of a solid body produced by the passage of fluid (such as air) over a body such as a meteor, missile, or airplane. It is a form of forced convection in that the flow field is created by forces beyond those associated with the thermal processes.", "note": "", "link": "http://en.wikipedia.org/wiki/Aerodynamic_heating"}, "a282": {"id": "a282", "title": "Deliquescence", "description": "Deliquescent materials are substances (mostly salts) that have a strong affinity for moisture and will absorb relatively large amounts of water from the atmosphere if exposed to it, forming a liquid solution.", "note": "", "link": "http://en.wikipedia.org/wiki/Hygroscopy#Deliquescence"}, "a753": {"id": "a753", "title": "Marangoni Effect", "description": "(or Gibbs-Marangoni effect)  The presence of a gradient in surface tension will naturally cause the liquid to flow away from regions of low surface tension. The surface tension gradient can be caused by concentration gradient or by a temperature gradient (surface tension is a function of temperature).", "note": "For example,  liquid spots left on silicon wafer surfaces are removed by blowing an alcohol vapor over the wet wafer surface and the subsequent Marangoni effect causes a surface-tension gradient in the liquid allowing gravity to pull the liquid completely off the wafer surface.", "link": "http://en.wikipedia.org/wiki/Marangoni_effect"}, "a1327": {"id": "a1327", "title": "Weightlessness", "description": "(or zero-g) is any condition equivalent to experiencing little or no acceleration or gravitational attraction, e.g., far from a planet, star, or other massive body, flying an outside loop.  From the equivalence principle for acceleration and gravitational attraction it follows that weightlessness can also be experienced in free fall, which is the cause of weightlessness of objects in orbit about the Earth.", "note": "Objects normally compressed by their own weight expand under weightless conditions.", "link": "http://en.wikipedia.org/wiki/Weightlessness"}, "Alternating Magnetic Field": {"id": "", "title": "Alternating Magnetic Field", "description": "Low frequency alternating magnetic fields can increase the hardness of some materials. They can also be used to induce eddy currents - which can give rise to a repulsive magnetic field.", "note": "", "link": ""}, "a56": {"id": "a56", "title": "Amp\u00e8re's Circuital Law", "description": "Amp\u00e8re's circuital law relates the integrated magnetic field around a closed loop to the electric current passing through the loop.", "note": "", "link": "http://en.wikipedia.org/wiki/Amp%C3%A8re%27s_circuital_law"}, "a57": {"id": "a57", "title": "Amp\u00e8re's Force Law", "description": "Ampere's Force Law decribes the force of attraction or repulsion between two current-carrying wires.", "note": "", "link": "http://en.wikipedia.org/wiki/Amp%C3%A8re%27s_force_law"}, "a181": {"id": "a181", "title": "Cathodoluminescence", "description": "An optical and electrical phenomenon whereby a beam of electrons is generated by an electron gun (e.g. cathode ray tube) and then impacts on a luminescent material such as a phosphor, causing the material to emit visible light. The most common example is the screen of a television.", "note": "", "link": "http://en.wikipedia.org/wiki/Cathodoluminescence"}, "a217": {"id": "a217", "title": "Coilgun", "description": "A type of synchronous linear electric motor that consists of one or more electromagnetic coils used to accelerate a magnetic projectile to high velocity.", "note": "", "link": "http://en.wikipedia.org/wiki/Coilgun"}, "a222": {"id": "a222", "title": "Colloidal Crystal", "description": "A highly ordered array of particles which can be formed over a very long range (from a few millimeters to one centimeter) in length, and which appear analogous to their atomic or molecular counterparts. One of the finest natural examples of this phenomenon can be found in precious opal, where brilliant regions of pure spectral color result from close-packed domains of amorphous colloidal spheres of silicon dioxide (or silica).", "note": "Through diffraction of light.", "link": "http://en.wikipedia.org/wiki/Colloidal_crystal"}, "a332": {"id": "a332", "title": "Driven Harmonic Oscillation", "description": "Driven harmonic oscillators are damped oscillators further affected by an externally applied force", "note": "", "link": "http://en.wikipedia.org/wiki/Driven_oscillations#Driven_harmonic_oscillators"}, "a539": {"id": "a539", "title": "Gravitational Redshift", "description": "Light or other forms of electromagnetic radiation of a certain wavelength originating from a source placed in a region of stronger gravitational field (and which could be said to have climbed 'uphill' out of a gravity well) will be found to be of longer wavelength when received by an observer in a region of weaker gravitational field. If applied to optical wave-lengths this manifests itself as a change in the colour of the light as the wavelength is shifted toward the red (less energetic, longer in wavelength, and lower in frequency) end of the spectrum.", "note": "", "link": "http://en.wikipedia.org/wiki/Gravitational_redshift"}, "a754": {"id": "a754", "title": "Maser", "description": "A device that produces coherent electromagnetic waves through amplification by stimulated emission. A laser is an optical maser.", "note": "", "link": "http://en.wikipedia.org/wiki/Maser"}, "Neutron Diffraction": {"id": "", "title": "Neutron Diffraction", "description": "A method by which neutrons are used to determine the atomic and/or magnetic structure of a material. It can be applied to study crystalline solids, gasses, liquids or amorphous materials.  A sample to be examined is placed in a beam of thermal or cold neutrons and the intensity pattern around the sample gives information of the structure of the material.", "note": "", "link": ""}, "a975": {"id": "a975", "title": "Pulse Jet", "description": "A type of jet engine in which combustion occurs in pulses. Pulse jet engines can be made with few or no moving parts and are capable of running statically (i.e. there is no need to have air forced into the inlet, such as by forward motion).", "note": "", "link": "https://en.wikipedia.org/wiki/Pulsejet"}, "a1043": {"id": "a1043", "title": "Rocket", "description": "A jet engine that uses only propellant mass for forming its high speed propulsive jet. Rocket engines are reaction engines. Since they need no external material to form their jet, rocket engines can be used for spacecraft propulsion as well as terrestrial uses, such as missiles. Most rocket engines are internal combustion engines, although non combusting forms also exist.", "note": "", "link": "http://en.wikipedia.org/wiki/Rocket_engine"}, "a1172": {"id": "a1172", "title": "Supercavitation", "description": "The use of cavitation effects to create a large bubble of gas inside a liquid, allowing an object to travel at great speed through the liquid by being wholly enveloped by the bubble. The cavity (the bubble) reduces the drag on the object and this makes supercavitation an attractive technology; drag is normally about 1,000 times greater in water than in air.", "note": "", "link": "http://en.wikipedia.org/wiki/Supercavitation"}, "a47": {"id": "a47", "title": "Air Entrainment", "description": "The intentional creation of tiny air bubbles in concrete (and, potentially, in other materials). The air bubbles are introduced during mixing of the plastic (flowable, not hardened) concrete, and most of them survive to be part of the hardened concrete. The primary purpose of air entrainment is to increase the durability of the hardened concrete, especially in climates subject to freeze-thaw; the secondary purpose is to increase workability of the concrete while in a plastic state.", "note": "", "link": "http://en.wikipedia.org/wiki/Air_entrainment"}, "a139": {"id": "a139", "title": "Brazing", "description": "A joining process whereby a filler metal or alloy is melted by heat and distributed between two or more close-fitting parts by capillary action. The molten filler metal and flux interacts with a thin layer of the base metal, cooling to form a strong, sealed joint. By definition the melting temperature of the braze alloy is lower (sometimes substantially) than the melting temperature of the materials being joined.", "note": "", "link": "http://en.wikipedia.org/wiki/Brazing"}, "Delta-E Effect": {"id": "", "title": "Delta-E Effect", "description": "The change in the modulus of elaticity (i.e. Young's Modulus) of a material as a result of magnetisation. Also used to refer to the reverse efect, i.e. the change in magnetism resulting from elastic tension.", "note": "", "link": ""}, "a314": {"id": "a314", "title": "Diffusion Welding", "description": "A solid state welding process by which two dissimilar metals can be bonded together. Diffusion involves the migration of atoms across the joint, due to concentration gradients. The two materials are pressed together at an elevated temperature usually between 50 and 70% of the melting point.", "note": "", "link": "http://en.wikipedia.org/wiki/Diffusion_welding"}, "a522": {"id": "a522", "title": "Geometry", "description": "A part of mathematics concerned with questions of size, shape, and relative position of figures and with properties of space", "note": "", "link": "http://en.wikipedia.org/wiki/Geometry"}, "a867": {"id": "a867", "title": "Parachute", "description": "A device used to slow the motion of an object through an atmosphere by creating drag, or in the case of ram-air parachutes, aerodynamic lift.", "note": "", "link": "http://en.wikipedia.org/wiki/Parachute"}, "a1256": {"id": "a1256", "title": "Tidal Power", "description": "A form of hydropower that converts the energy of tides into electricity or other useful forms of power.", "note": "", "link": "http://en.wikipedia.org/wiki/Tidal_power"}, "a1276": {"id": "a1276", "title": "Turbulence Heating", "description": "When small-scale turbulance eddies (or wave packets) dissipate, their energy is converted into heat.", "note": "", "link": "http://www.gb.nrao.edu/~tminter/dig_heat/node2.html"}, "a667": {"id": "a667", "title": "Lagrangian Point", "description": "The Lagrangian points are the five positions in an orbital configuration where a small object affected only by gravity can theoretically be stationary relative to two larger objects (such as a satellite with respect to the Earth and Moon). The Lagrange points mark positions where the combined gravitational pull of the two large masses provides precisely the centripetal force required to rotate with them.", "note": "", "link": "http://en.wikipedia.org/wiki/Lagrangian_point"}, "a210": {"id": "a210", "title": "Coacervate", "description": "A tiny spherical droplet of assorted organic molecules (specifically, lipid molecules) which is held together by hydrophobic forces from a surrounding liquid.", "note": "", "link": "http://en.wikipedia.org/wiki/Coacervate"}, "a669": {"id": "a669", "title": "Laminar Flow", "description": "(sometimes known as streamline flow) Occurs when a fluid flows in parallel layers, with no disruption between the layers. In fluid dynamics, laminar flow is a flow regime characterized by high momentum diffusion, low momentum convection, pressure and velocity independent from time. It is the opposite of turbulent flow. In nonscientific terms laminar flow is 'smooth,' while turbulent flow is 'rough.'", "note": "", "link": "http://en.wikipedia.org/wiki/Laminar_flow"}, "a863": {"id": "a863", "title": "Ouzo Effect", "description": "(also louche effect and spontaneous emulsification) is a phenomenon observed when water is added to ouzo and other anise-flavored liqueurs and spirits, such as pastis, raki, arak and absinthe, forming a milky (louche) oil-in-water microemulsion. Such microemulsions occur with only minimal mixing and are highly stable.", "note": "", "link": "http://en.wikipedia.org/wiki/Ouzo_effect"}, "a1280": {"id": "a1280", "title": "Ultrasonic Capillary Effect", "description": "Abnormally high rise of a liquid and its penetration into capillary channels due to a high-intensity ultrasound field. Caused by the collapse of cavitation bubbles at the capillary inlet. A collaping bubble generates a liquid microjet, the penetration of which into capillary channel causes the height increment of the capillary liquid column. Summation of such increments lies behind the increase of a height and a velocity of the liquid rise in a capillary under the ultrasound action.", "note": "", "link": "http://www.physik3.gwdg.de/isna/poster-review-abstracts/N.Dezhkunov3.html"}, "a1328": {"id": "a1328", "title": "Weissenberg Effect", "description": "A phenomenon that occurs when a spinning rod is placed into a solution of liquid polymer. Instead of being thrown outward, entanglements cause the polymer chains to be drawn towards the rod.", "note": "", "link": "http://en.wikipedia.org/wiki/Weissenberg_effect"}, "a676": {"id": "a676", "title": "Laser Beam Welding", "description": "A welding technique used to join multiple pieces of metal through the use of a laser. The beam provides a concentrated heat source, allowing for narrow, deep welds and high welding rates. The process is frequently used in high volume applications, such as in the automotive industry.", "note": "", "link": "http://en.wikipedia.org/wiki/Laser_beam_welding"}, "a732": {"id": "a732", "title": "Magnetic River", "description": "An electrodynamic suspension magnetic levitation system consisting of a thin conductive plate on an AC linear induction motor. Transverse flux and geometry, gives lift, stability and propulsion. The levitation is 5 axis stable, and the 6th axis neutrally stable, or can be biased to accelerate in either way along the motor. Laterally it exhibits a 'river bank' effect, where moving the plate sideways causes it to rise on that side so that it tries to return to the centre line under gravity.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_river"}, "a764": {"id": "a764", "title": "Meissner Effect", "description": "(also known as the Jared-Ochsenfeld effect) The expulsion of a magnetic field from a superconductor.", "note": "", "link": "http://en.wikipedia.org/wiki/Meissner_effect"}, "Nano-Velcro": {"id": "", "title": "Nano-Velcro", "description": "A reusable proposed material carpeted with hook-ended carbon nanotubes, each just millionths of a millimetre across.", "note": "", "link": ""}, "a66": {"id": "a66", "title": "Anisotropy", "description": "The property of being directionally dependent. It can be defined as a difference in a physical property (absorbance, refractive index, density, etc.) for some material when measured along different axes. An example is the light coming through a polarising lens.", "note": "Self-assembling systems use anisotropic joints to facilitate correct selection and orientation of components.", "link": "http://en.wikipedia.org/wiki/Anisotropy"}, "a175": {"id": "a175", "title": "Casimir Effect", "description": "Physical forces arising from a quantized field. The typical example is of two uncharged metallic plates in a vacuum, placed a few micrometers apart, without any external electromagnetic field", "note": "Potential use in nanotechnology.", "link": "http://en.wikipedia.org/wiki/Casimir_effect"}, "a147": {"id": "a147", "title": "Brownian Motor", "description": "A nano-scale or molecular device by which thermally activated processes (chemical reactions) are controlled and used to generate directed motion in space and to do mechanical or electrical work. Because this type of motor is so strongly dependent on random thermal noise, Brownian motors are feasible only at the nanometer scale.", "note": "", "link": "http://en.wikipedia.org/wiki/Brownian_motor"}, "a274": {"id": "a274", "title": "Darwin Drift", "description": "The phenomenon that a fluid parcel is permanently displaced after the passage of a body through a fluid \u0096 the fluid being at rest far away from the body.", "note": "", "link": "http://en.wikipedia.org/wiki/Darwin_drift"}, "a1011": {"id": "a1011", "title": "Rayleigh-Taylor Instability", "description": "An instability of an interface between two fluids of different densities, which occurs when the lighter fluid is pushing the heavier fluid.", "note": "In the case of a divided solid dispersed in a fluid.", "link": "http://en.wikipedia.org/wiki/Rayleigh%E2%80%93Taylor_instability"}, "a653": {"id": "a653", "title": "Kelvin-Helmholtz Instability", "description": "A fluid interface that can occur when there is velocity shear in a single continuous fluid, or where there is a velocity difference across the interface between two fluids. An example is wind blowing over water: The instability manifests in waves on the water surface. More generally, clouds, the ocean, Saturn's bands, and the sun's corona show this instability.", "note": "", "link": "http://en.wikipedia.org/wiki/Kelvin%E2%80%93Helmholtz_instability"}, "a1038": {"id": "a1038", "title": "Richtmyer-Meshkov Instability", "description": "An instability in the interface between between fluids of differing density that occurs when they are impulsively accelerated, e.g. by the passage of a shock wave.", "note": "", "link": "http://en.wikipedia.org/wiki/Richtmyer-Meshkov_instability"}, "a1298": {"id": "a1298", "title": "Venturi Effect", "description": "The reduction in fluid pressure that results when a fluid flows through a constricted section of pipe. The fluid velocity must increase through the constriction to satisfy the equation of continuity, while its pressure must decrease due to conservation of energy: the gain in kinetic energy is balanced by a drop in pressure or a pressure gradient force.", "note": "", "link": "http://en.wikipedia.org/wiki/Venturi_effect"}, "a315": {"id": "a315", "title": "Diffusiophoresis", "description": "A spontaneous motion of dispersed particles in a fluid induced by a diffusion gradient (concentration gradient) of molecular substances that are dissolved in the fluid. This gradient affects structure of the particles in an interfacial double layer and causes sliding motion of the fluid relative to the particle surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Diffusiophoresis"}, "a373": {"id": "a373", "title": "Electrohydrodynamic Thruster", "description": "(EHD) A propulsion device based on ionic fluid propulsion, that works without moving parts, using only electrical energy. The basic components of an EHD thruster are two: an ioniser and an ion accelerator. EHD thrusters are not restricted to air as their main propulsion fluid, and work perfectly in other fluids, such as oil.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrohydrodynamic_thruster"}, "a586": {"id": "a586", "title": "Hydraulic Ram", "description": "A cyclic water pump powered by hydropower. It functions as a hydraulic transformer that takes in water at one hydraulic head and flow-rate, and outputs water at a different hydraulic-head and flow-rate.", "note": "For a divided solid suspended in a fluid.", "link": "http://en.wikipedia.org/wiki/Hydraulic_ram"}, "a700": {"id": "a700", "title": "Linear Motor", "description": "Essentially a multi-phase alternating current (AC) electric motor that has had its stator 'unrolled' so that instead of producing a torque (rotation) it produces a linear force along its length.", "note": "", "link": "http://en.wikipedia.org/wiki/Linear_motor"}, "Opto-hydraulic Effect": {"id": "", "title": "Opto-hydraulic Effect", "description": "When laser pulses are absorbed in a liquid layer, high power acoustic pulses are generated. They produce a high hydrostatic pressure which causes the liquid to be ejected in the direction of the laser beam", "note": "In the case of a divided solid dispersed in the liquid.", "link": ""}, "a1162": {"id": "a1162", "title": "Stokes Drift", "description": "The movement of a specific fluid parcel as it travels with the fluid flow due to wave motion.", "note": "For a divided solid floating in a liquid.", "link": "http://en.wikipedia.org/wiki/Stokes_drift"}, "a1334": {"id": "a1334", "title": "Wheel and Axle", "description": "A simple torque multiplier consisting of a wheel turned by an axle (or an axle turned by a wheel)", "note": "", "link": "http://en.wikipedia.org/wiki/Wheel_and_axle"}, "a167": {"id": "a167", "title": "Capillary Wave Effect", "description": "A wave travelling along the interface between two fluids, whose dynamics are dominated by the effects of surface tension. Capillary waves are common in nature and home, and are often referred to as ripple. The wavelength of capillary waves is typically less than a few centimeters. A gravity-capillary wave on a fluid interface is influenced by both the effects of surface tension and gravity, as well as by the fluid inertia.", "note": "", "link": "http://en.wikipedia.org/wiki/Capillary_wave"}, "a447": {"id": "a447", "title": "Fast Ion Conductor", "description": "(also known as solid electrolytes and superionic conductors) Solid state electrical conductors which conduct due to the movement of ions through voids (or empty crystallographic positions)in their crystal lattice. One component of the structure, cationic or anionic, is essentially free to move throughout the structure, acting as charge carrier.", "note": "", "link": "http://en.wikipedia.org/wiki/Fast_ion_conductor"}, "a343": {"id": "a343", "title": "Effusion", "description": "The process where individual molecules flow through a hole without collisions between molecules. This occurs if the diameter of the hole is considerably smaller than the mean free path of the molecules.", "note": "", "link": "http://en.wikipedia.org/wiki/Effusion"}, "a166": {"id": "a166", "title": "Capillary Pressure", "description": "The difference in pressure across the interface between two immiscible fluids. This pressure difference is proportional to the surface tension and inversely proportional to the effective radius of the interface. It also depends on the wetting angle of the liquid on the surface of the capillary.", "note": "", "link": "http://en.wikipedia.org/wiki/Capillary_pressure"}, "a778": {"id": "a778", "title": "Microelectromechanical Systems", "description": "(MEMS) is the technology of the very small, and merges at the nano-scale into nanoelectromechanical systems (NEMS) and nanotechnology. MEMS are made up of components between 1 to 100 micrometers in size (i.e. 0.001 to 0.1 mm) and MEMS devices generally range in size from a 20 micrometers (20 millionth of a meter) to a millimeter.", "note": "For example, inkjet printer heads", "link": "http://en.wikipedia.org/wiki/MEMS"}, "a848": {"id": "a848", "title": "Onnes Effect", "description": "The ability of superfluid liquids to cross obstacles that lie at a higher level. The Onnes Effect is enabled by the capillary forces dominating the gravity and viscous forces.", "note": "", "link": "http://en.wikipedia.org/wiki/Onnes-effect"}, "a1048": {"id": "a1048", "title": "Rollin Film", "description": "A 30 nm-thick liquid film of helium in the helium II state. It exhibits a 'creeping' effect in response to surfaces extending past the film's level (propagation). Rollin films are involved in the fountain effect where superfluid helium leaks out of a container in a fountain-like manner.", "note": "", "link": "http://en.wikipedia.org/wiki/Rollin_film"}, "a1182": {"id": "a1182", "title": "Superfluidity", "description": "A state of matter in which viscosity of a fluid vanishes, while thermal conductivity becomes infinite. These unusual effects are observed when liquids, typically of helium-4 or helium-3, overcome friction in surface interaction at a stage (known as the 'lambda point', which is temperature and pressure, for helium-4) at which the liquid's viscosity becomes zero.", "note": "", "link": "http://en.wikipedia.org/wiki/Superfluid"}, "a1243": {"id": "a1243", "title": "Thermomechanical Effect", "description": "One of the most spectacular results of the properties of superfluids is known as the thermomechanical or 'fountain effect'. If a capillary tube is placed into a bath of superfluid helium and then heated, even by shining a light on it, the superfluid helium will flow up through the tube and out the top.", "note": "", "link": "http://en.wikipedia.org/wiki/Superfluid"}, "a253": {"id": "a253", "title": "Crankshaft", "description": "A bent portion of an axle, or shaft, or an arm keyed at right angles to the end of a shaft, by which motion is imparted to or received from it. Typically used to translate reciprocating linear motion into rotation or vice versa.", "note": "", "link": "http://en.wikipedia.org/wiki/Crankshaft"}, "a267": {"id": "a267", "title": "Curve of Constant Width", "description": "A convex planar shape whose width, defined as the perpendicular distance between two distinct parallel lines each intersecting its boundary in at least one point but not touching the interior, is the same regardless of the orientation of the curve.", "note": "For example a roller having a cross-section in the form of a curve of constant width.", "link": "http://en.wikipedia.org/wiki/Curve_of_constant_width"}, "a427": {"id": "a427", "title": "Escapement", "description": "A device which converts continuous rotational motion into an oscillating or back and forth motion. An escapement drives the timekeeping element, usually a pendulum or balance wheel, in a clock or watch.", "note": "", "link": "http://en.wikipedia.org/wiki/Escapement"}, "a763": {"id": "a763", "title": "Meissner Body", "description": "A surface of constant width constructed by replacing three of the edge arcs of a Reuleaux tetrahedron by curved patches formed as the surfaces of rotation of a circular arc. It has been conjectured (but not yet proved) that Meissner Bodies are the minimum-volume three-dimensional shapes of constant width.", "note": "By acting as a rolling support of constant width.", "link": "http://en.wikipedia.org/wiki/Reuleaux_tetrahedron#Meissner_bodies"}, "a796": {"id": "a796", "title": "M\u00f6bius Strip", "description": "A surface with only one side and only one boundary component.", "note": "", "link": "http://en.wikipedia.org/wiki/M%C3%B6bius_strip"}, "a957": {"id": "a957", "title": "Precession", "description": "A change in the direction of the axis of a rotating object. There are two types of precession: torque-free and torque-induced. Torque-free precession occurs when the axis of rotation differs slightly from an axis about which the object can rotate stably. Torque-induced precession (gyroscopic precession) is the phenomenon in which the axis of a spinning object (e.g. a part of a gyroscope) 'wobbles' when a torque is applied to it.", "note": "", "link": "http://en.wikipedia.org/wiki/Precession"}, "a995": {"id": "a995", "title": "Rack and Pinion", "description": "A pair of gears which convert rotational motion into linear motion (or vice versa). The circular pinion engages teeth on a flat bar - the rack. Rotational motion applied to the pinion will cause the rack to move to the side, up to the limit of its travel.", "note": "", "link": "http://en.wikipedia.org/wiki/Rack_and_pinion"}, "a1004": {"id": "a1004", "title": "Railgun", "description": "A purely electrical gun that accelerates a conductive projectile along a pair of metal rails using the same principles as the homopolar motor.", "note": "", "link": "http://en.wikipedia.org/wiki/Railgun"}, "a1135": {"id": "a1135", "title": "Spheroid", "description": "A quadric surface obtained by rotating an ellipse about one of its principal axes; in other words, an ellipsoid with two equal semi-diameters. If the ellipse is rotated about its major axis, the result is a prolate (elongated) spheroid, somewhat similar to a rugby ball. If the ellipse is rotated about its minor axis, the result is an oblate (flattened) spheroid, somewhat similar to a lentil. If the generating ellipse is a circle, the surface is a sphere.", "note": "", "link": "http://en.wikipedia.org/wiki/Spheroid"}, "a1242": {"id": "a1242", "title": "Thermo-magnetic Motor", "description": "Thermo-magnetic motors work by heating a ferromagnetic material above its curie point (where it becomes non-magnetic) and then cooling it below that critical temperature. Experiments have only produced extremely inefficient working prototypes.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermo-magnetic_motor"}, "a1281": {"id": "a1281", "title": "Ultrasonic Motor", "description": "A type of electric motor powered by the ultrasonic vibration of a component, the stator, placed against another component, the rotor or slider depending on the scheme of operation (rotation or linear translation).", "note": "", "link": "http://en.wikipedia.org/wiki/Ultrasonic_motor"}, "a1315": {"id": "a1315", "title": "Walking", "description": "Walking is defined by an 'inverted pendulum' gait in which the body vaults over the stiff limb or limbs with each step. This applies regardless of the number of limbs - even arthropods with six, eight or more limbs.", "note": "", "link": "http://en.wikipedia.org/wiki/Walking"}, "a1340": {"id": "a1340", "title": "Wing in Ground Effect", "description": "A vehicle that attains level flight near the surface of the Earth, made possible by a cushion of high-pressure air created by the aerodynamic interaction between the wings and the surface (ground effect).", "note": "", "link": "http://en.wikipedia.org/wiki/Ground_effect_vehicle"}, "a1039": {"id": "a1039", "title": "Rifling", "description": "Helix-shaped pattern in the barrel of a gun or firearm, which imparts a spin to a projectile around its long axis. This spin serves to gyroscopically stabilize the projectile, improving its aerodynamic stability and accuracy.", "note": "", "link": "http://en.wikipedia.org/wiki/Rifling"}, "a1051": {"id": "a1051", "title": "Ruled Surface", "description": "A surface S is ruled if through every point of S there is a straight line that lies on S. The most familiar examples are the plane and the curved surface of a cylinder or cone. A ruled surface can always be described (at least locally) as the set of points swept by a moving straight line. For example, a cone is formed by keeping one end-point of a line fixed whilst moving the other end-point in a circle.", "note": "", "link": "http://en.wikipedia.org/wiki/Ruled_surface"}, "a830": {"id": "a830", "title": "Nernst Effect", "description": "The Nernst Effect (or First Nernst-Ettingshausen Effect) is a thermoelectric (or thermomagnetic) phenomenon observed when a sample allowing electrical conduction is subjected to a magnetic field and a temperature gradient normal (perpendicular) to each other. An electric field will be induced normal to both. The inverse is the Ettingshausen Effect (or Second Nernst-Ettingshausen Effect).", "note": "", "link": "http://en.wikipedia.org/wiki/Nernst_effect"}, "a176": {"id": "a176", "title": "Cat Righting Reflex", "description": "A cat's innate ability to orient itself as it falls in order to land on its feet. Cats use combinations of bending and relative rotation of body sections to minimise angular momentum and orient themselves for a (relatively) safe landing.", "note": "", "link": "http://en.wikipedia.org/wiki/Cat_righting_reflex"}, "a799": {"id": "a799", "title": "Moir\u00e9 Effect", "description": "An interference pattern created, for example, when two grids are overlaid at an angle, or when they have slightly different mesh sizes.", "note": "", "link": "http://en.wikipedia.org/wiki/Moire_effect"}, "a662": {"id": "a662", "title": "Knurling", "description": "A manufacturing process, typically conducted on a lathe, whereby a visually-attractive diamond-shaped (criss-cross) pattern is cut or rolled into metal. Occasionally, the knurled pattern is a series of straight ridges or a helix of 'straight' ridges rather than the more-usual criss-cross pattern.", "note": "As a by-product.", "link": "http://en.wikipedia.org/wiki/Knurling"}, "a102": {"id": "a102", "title": "Barnett Effect", "description": "The magnetisation of a ferromagnetic body when spun on its axis. The magnetisation occurs parallel to the axis of spin.", "note": "", "link": "http://en.wikipedia.org/wiki/Barnett_Effect"}, "a385": {"id": "a385", "title": "Electromethanogenesis", "description": "Electromethanogenesis is a form of electrofuel production where methane is produced by direct biological conversion from electrical current and carbon dioxide", "note": "", "link": "http://en.wikipedia.org/wiki/Electromethanogenesis"}, "a512": {"id": "a512", "title": "Garshelis Effect", "description": "The effect wherein a circumferentially magnetized rod of ferromagnetic, magnetostrictive material generates a net axial magnetic field in response to an applied torque.", "note": "", "link": "http://en.wikipedia.org/wiki/Garshelis_Effect"}, "a621": {"id": "a621", "title": "Inverse Compton Scattering", "description": "The increase in energy (decrease in wavelength) of an X-ray or gamma ray photon, when it interacts with matter.", "note": "", "link": "http://en.wikipedia.org/wiki/Compton_scattering"}, "a622": {"id": "a622", "title": "Inverse Faraday Effect", "description": "The effect opposite to the Faraday effect. A static magnetisation is induced by an external oscillating electrical field which can be achieved with a high intensity laser pulse for example", "note": "", "link": "http://en.wikipedia.org/wiki/Inverse_Faraday_effect"}, "a755": {"id": "a755", "title": "Matteucci Effect", "description": "One of a group of Inverse Magnetoelastic Effects.  The creation of a helical anisotropy of the susceptibility of a magnetostrictive material (and e.m.f.) when subjected to a torque.", "note": "", "link": "https://en.wikipedia.org/wiki/Matteucci_effect"}, "Nagaoka-Honda Effect": {"id": "", "title": "Nagaoka-Honda Effect", "description": "One of a group of Magnetoelastic Effects. Change in the magnetic state due to a change in the volume. The inverse of the Magnetovolume Effect.", "note": "In the case of a magnetic field.", "link": ""}, "a855": {"id": "a855", "title": "Organic Light-emitting Diode", "description": "(or Light Emitting Polymer (LEP) or Organic Electro Luminescence (OEL)) A Light Emitting Diode (LED) whose emissive electroluminescent layer is composed of a film of organic compounds. The layer usually contains a polymer substance that allows suitable organic compounds to be deposited. They are deposited in rows and columns onto a flat carrier by a simple 'printing' process. The resulting matrix of pixels can emit light of different colors.", "note": "", "link": "http://en.wikipedia.org/wiki/Organic_light-emitting_diode"}, "a895": {"id": "a895", "title": "Phosphor Thermometry", "description": "An optical method for surface temperature measurement. The method exploits luminescence emitted by phosphor material. Phosphors are fine white or pastel-colored inorganic powders which may be stimulated by any of a variety of means to luminesce, i.e. emit light. Certain characteristics of the emitted light change with temperature, including brightness, color, and afterglow duration. The latter is most commonly used for temperature measurement.", "note": "", "link": "http://en.wikipedia.org/wiki/Phosphor_thermometry"}, "a1199": {"id": "a1199", "title": "Synchrotron Radiation", "description": "Electromagnetic radiation  generated by the acceleration of ultrarelativistic (i.e., moving near the speed of light) charged particles through magnetic fields.", "note": "", "link": "http://en.wikipedia.org/wiki/Synchrotron_radiation"}, "a1269": {"id": "a1269", "title": "Tritium", "description": "A radioactive isotope of hydrogen. The nucleus of tritium contains one proton and two neutrons, whereas the nucleus of protium (by far the most abundant hydrogen isotope) contains one proton and no neutrons. Tritium decays into helium-3 by beta decay.", "note": "", "link": "http://en.wikipedia.org/wiki/Tritium"}, "a1303": {"id": "a1303", "title": "Villari Effect", "description": "(or Inverse Magnetostrictive Effect) The change of the magnetic susceptibility of a material when subjected to a mechanical stress.", "note": "In the case of a magnetic field.", "link": "http://en.wikipedia.org/wiki/Inverse_magnetostrictive_effect"}, "a300": {"id": "a300", "title": "Diamond-like Carbon", "description": "(DLC) exists in seven different forms of amorphous carbon materials that display some of the unique properties of natural diamond. They are usually applied as coatings to other materials. All seven contain significant amounts of sp3 hybridized carbon atoms. As well as excellent hadness and wear resistance, DLC is claimed to be have the lowest coefficient of friction of any known solid material.", "note": "", "link": "http://en.wikipedia.org/wiki/Diamond-like_carbon"}, "a960": {"id": "a960", "title": "Preservative", "description": "A naturally occurring or synthetic substance that is added to products such as foods, pharmaceuticals, paints, biological samples, wood, etc. to prevent decomposition by microbial growth or by undesirable chemical changes.", "note": "", "link": "http://en.wikipedia.org/wiki/Preservative"}, "a1018": {"id": "a1018", "title": "Redundancy", "description": "The duplication of critical components of a system with the intention of increasing reliability of the system, usually in the case of a backup or fail-safe.", "note": "", "link": "http://en.wikipedia.org/wiki/Redundancy_(engineering)"}, "Zero Thermal Expansion": {"id": "", "title": "Zero Thermal Expansion", "description": "A material, structure or system that does not expand or contract in response to changes in temperature.", "note": "", "link": ""}, "a68": {"id": "a68", "title": "Anodising", "description": "An electrolytic passivation process used to increase the thickness of the natural oxide layer on the surface of metal parts. Anodizing increases corrosion resistance and wear resistance, and provides better adhesion for paint primers and glues than bare metal. Anodic films can also be used for a number of cosmetic effects, either with thick porous coatings that can absorb dyes or with thin transparent coatings that add interference effects to reflected light.", "note": "", "link": "http://en.wikipedia.org/wiki/Anodising"}, "a171": {"id": "a171", "title": "Carbonitriding", "description": "A metallurgical surface modification technique that is used to increase the surface hardness of a metal, thereby reducing wear. During the process, atoms of carbon and nitrogen diffuse interstitially into the metal, creating barriers to slip, increasing the hardness and modulus near the surface. Often applied to inexpensive, easily machined low carbon steel to impart the surface properties of more expensive and difficult to work grades of steel.", "note": "", "link": "http://en.wikipedia.org/wiki/Carbonitriding"}, "a172": {"id": "a172", "title": "Carburizing", "description": "A heat treatment process in which iron or steel is heated in the presence of another material (but below the metal's melting point) which liberates carbon as it decomposes. The outer surface or case will have higher carbon content than the original material. When the iron or steel is cooled rapidly by quenching, the higher carbon content on the outer surface becomes hard, while the core remains soft and tough.", "note": "", "link": "http://en.wikipedia.org/wiki/Carburization"}, "a174": {"id": "a174", "title": "Case Hardening", "description": "The process of hardening the surface of a metal, often a low carbon steel, by infusing elements into the material's surface, forming a thin layer of a harder alloy. Case hardening is usually done after the part in question has been formed into its final shape, but can also be done to increase the hardening element content of bars to be used in a pattern welding or similar process.", "note": "", "link": "http://en.wikipedia.org/wiki/Case_hardening"}, "a467": {"id": "a467", "title": "Flourographene", "description": "Fluorographene is fully-fluorinated graphene and is basically a two-dimensional version of Teflon, showing similar properties including chemical inertness and thermal stability.", "note": "", "link": "http://en.wikipedia.org/wiki/Fluorographene"}, "a532": {"id": "a532", "title": "Grain Boundary Strengthening", "description": "A method of strengthening materials by changing their average crystallite (grain) size. It is based on the observation that grain boundaries impede dislocation movement and that the number of dislocations within a grain have an effect on how easily dislocations can traverse grain boundaries and travel from grain to grain. Changing grain size can influence dislocation movement and yield strength.", "note": "", "link": "http://en.wikipedia.org/wiki/Grain_boundary_strengthening"}, "a559": {"id": "a559", "title": "Heat Treatment", "description": "A method used to alter the physical, and sometimes chemical, properties of a material through the use of heating or chilling, normally to extreme temperatures, to achieve a desired result such as hardening or softening of a material. Heat treatment techniques include annealing, case hardening, precipitation strengthening, tempering and quenching.", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_treatment"}, "a708": {"id": "a708", "title": "Lonsdaleite", "description": "(also called Hexagonal diamond in reference to the crystal structure) An allotrope of carbon with a hexagonal lattice. In Nature, it forms from graphite present in meteorites upon their impact to Earth. Lonsdaleite might be 58% harder than diamond.", "note": "", "link": "http://en.wikipedia.org/wiki/Lonsdaleite"}, "a836": {"id": "a836", "title": "Nitriding", "description": "A heat treating process that alloys nitrogen into the surface of a metal to create a case hardened surface. It is predominantly used on steel, but also titanium, aluminum and molybdenum.", "note": "", "link": "http://en.wikipedia.org/wiki/Nitriding"}, "a959": {"id": "a959", "title": "Precipitation Hardening", "description": "(also called age hardening) A heat treatment technique used to strengthen malleable materials, including most structural alloys of aluminium, magnesium, nickel and titanium, and some stainless steels. It relies on changes in solid solubility with temperature to produce fine particles of an impurity phase, which impede the movement of dislocations, or defects in a crystal's lattice.", "note": "", "link": "http://en.wikipedia.org/wiki/Precipitation_hardening"}, "a1181": {"id": "a1181", "title": "Superdiamagnetism", "description": "A phenomenon occurring in certain materials at low temperatures, characterised by the complete absence of magnetic permeability (i.e. a magnetic susceptibility ?v = -1) and the exclusion of the interior magnetic field. Superdiamagnetism is a feature of superconductivity.", "note": "", "link": "http://en.wikipedia.org/wiki/Superdiamagnetism"}, "a620": {"id": "a620", "title": "Invar", "description": "Invar\u00ae, also known generically as FeNi36 (64FeNi in the US), is a nickel steel alloy notable for its uniquely low coefficient of thermal expansion.", "note": "In the case of a thermal field.", "link": "http://en.wikipedia.org/wiki/Invar"}, "a422": {"id": "a422", "title": "Epicyclic Gearing", "description": "(or planetary gearing) A gear system that consists of one or more outer gears, or planet gears, revolving about a central, or sun gear. Typically, the planet gears are mounted on a movable arm or carrier which itself may rotate relative to the sun gear. Epicyclic gearing systems may also incorporate the use of an outer ring gear or annulus, which meshes with the planet gears.", "note": "", "link": "http://en.wikipedia.org/wiki/Epicyclic_gearing"}, "a974": {"id": "a974", "title": "Pulley", "description": "A wheel with a groove between two flanges around its circumference. A rope, cable or belt usually runs inside the groove. Pulleys are used to change the direction of an applied force, transmit rotational motion, or realize a mechanical advantage in either a linear or rotational system of motion.", "note": "", "link": "http://en.wikipedia.org/wiki/Pulley"}, "a1068": {"id": "a1068", "title": "Segner Turbine", "description": "A simple type of water turbine, driven by the reation to water ejected from shaped nozzles.", "note": "", "link": "http://en.wikipedia.org/wiki/Segner-wheel"}, "a944": {"id": "a944", "title": "Plateau-Rayleigh Instability", "description": "(often just called the Rayleigh instability). A falling stream of fluid breaks up into smaller packets with the same volume but less surface area by virtue of its surface tension  Related to the Rayleigh-Taylor instability.", "note": "", "link": "http://en.wikipedia.org/wiki/Plateau-Rayleigh_instability"}, "a93": {"id": "a93", "title": "Backlash", "description": "Clearance between mating components, sometimes described as the amount of lost motion due to clearance or slackness when movement is reversed and contact is re-established.", "note": "", "link": "http://en.wikipedia.org/wiki/Backlash_(engineering)"}, "a714": {"id": "a714", "title": "Lubrication", "description": "A process, or technique to reduce wear of one or both surfaces in close proximity, and moving relative to each other, by interposing a substance (lubricant) between the surfaces to carry or to help carry the load (pressure generated) between the opposing surfaces. The interposed lubricant film can be a solid, (e.g. graphite) a solid/liquid dispersion, a liquid, a liquid-liquid dispersion (a grease) or, exceptionally, a gas.", "note": "", "link": "http://en.wikipedia.org/wiki/Lubrication"}, "a544": {"id": "a544", "title": "Gunn Effect", "description": "(also known as a transferred electron device or TED) A form of diode used in high-frequency electronics.", "note": "", "link": "http://en.wikipedia.org/wiki/Gunn_effect"}, "a205": {"id": "a205", "title": "Cholesteric Liquid Crystal", "description": "(or chiral nematic liquid crystal) a type of liquid crystal with a helical structure (and is therefore chiral).  They organize in layers with a director axis which varies with layers. The variation of the director axis tends to be periodic in nature. The period of this variation varies with temperature and it can also be affected by the boundary conditions.", "note": "", "link": "http://en.wikipedia.org/wiki/Cholesteric_liquid_crystal"}, "a122": {"id": "a122", "title": "Blanching", "description": "Blanching is the whitening of metal, by various means, such as soaking in acid or by coating with tin. This term is commonly used in coinage, in which pieces are given a lustre and brilliance before images are struck into the surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Blanching_(coinage)"}, "a947": {"id": "a947", "title": "Pleochroism", "description": "An optical phenomenon in which a substance appears to be different colors when observed at different angles, especially with polarized light.", "note": "", "link": "http://en.wikipedia.org/wiki/Pleochroism"}, "a342": {"id": "a342", "title": "Efflorescence", "description": "The loss of water (or a solvent) of crystallisation from a hydrated or solvated salt to the atmosphere on exposure to air.", "note": "", "link": "http://en.wikipedia.org/wiki/Efflorescence"}, "a1053": {"id": "a1053", "title": "Salt Fingering", "description": "A mixing process that occurs when relatively warm, salty water overlies relatively colder, fresher water. It is driven by the fact that heated water diffuses more readily than salty water. A small parcel of warm, salty water sinking downwards into a colder, fresher region will lose its heat before losing its salt, making the parcel of water increasingly denser than the water around it and sinking further. Likewise, a small parcel of colder, fresher water will be displaced upwards and gain heat by diffusion from surrounding water, which will then make it lighter than the surrounding waters, and cause it to rise further.", "note": "", "link": "http://en.wikipedia.org/wiki/Salt_fingering"}, "a48": {"id": "a48", "title": "Air Lubrication", "description": "A system that reduces a ship's aerodynamic drag by blowing air bubbles below the hull of the ship. This reduces frictional resistance between the hull and the seawater.", "note": "", "link": "https://en.wikipedia.org/wiki/Mitsubishi_Air_Lubrication_System"}, "a530": {"id": "a530", "title": "Golf Ball Dimples", "description": "There is a range of fluid velocities where a rough-surfaced golf ball experiences less drag than a smooth ball.", "note": "", "link": "http://en.wikipedia.org/wiki/Golf_ball#Design"}, "a1090": {"id": "a1090", "title": "Shear Thinning", "description": "(or Pseudoplasticy) The property of a material for which which viscosity decreases with increasing rate of shear. This property is found in certain complex solutions, such as ketchup, whipped cream, blood, paint, and nail polish. It is also a common property of polymer solutions and molten polymers.", "note": "", "link": "http://en.wikipedia.org/wiki/Shear_thinning"}, "Thoms Effect": {"id": "", "title": "Thoms Effect", "description": "Improvement to laminar flow in a pipeline through the addition of polymer(s). Involves the creation, at the boundary between the liquid and the solid body of molecular solutions that repress stream turbulance.", "note": "", "link": ""}, "a72": {"id": "a72", "title": "Antifuse", "description": "An electrical device that performs the opposite function to a fuse. Whereas a fuse starts with a low resistance and is designed to permanently break an electrically conductive path (typically when the current through the path exceeds a specified limit), an antifuse starts with a high resistance and is designed to permanently create an electrically conductive path (typically when the voltage across the antifuse exceeds a certain level).", "note": "", "link": "http://en.wikipedia.org/wiki/Antifuse"}, "a277": {"id": "a277", "title": "Debye-Falkenhagen Effect", "description": "The increase in the conductance of an electrolytic solution when the applied voltage has a very high frequency", "note": "", "link": "http://en.wikipedia.org/wiki/Debye-Falkenhagen_effect"}, "a325": {"id": "a325", "title": "Dopants", "description": "A trace impurity element inserted into a substance (in very low concentrations) in order to alter the electrical or optical properties of the substance.", "note": "", "link": "http://en.wikipedia.org/wiki/Dopants"}, "a386": {"id": "a386", "title": "Electron Avalanche", "description": "A process in which a number of free electrons in a medium (usually a gas) are subjected to strong acceleration by an electric field, ionizing the medium's atoms by collision (impact ionization), forming 'new' electrons to undergo the same process in successive cycles. Electron avalanches are essential to dielectric breakdown of gases. The process can culminate in corona discharges, streamers, leaders, or in a spark or continuous arc that completely bridges the gap.", "note": "", "link": "http://en.wikipedia.org/wiki/Electron_avalanche"}, "Thermo-resistive Effect": {"id": "", "title": "Thermo-resistive Effect", "description": "Variation in electrical resistance of metals and semiconductors with temperature.", "note": "", "link": ""}, "a1074": {"id": "a1074", "title": "Senftleben-Beenakker Effect", "description": "The Senftleben-Beenakker effect is the dependence on a magnetic or electric field of transport properties (such as viscosity and heat conductivity) of polyatomic gases. The Senftleben-Beenakker effect is analogous to the thermal Hall effect for neutral particles in polyatomic gases.", "note": "", "link": "http://en.wikipedia.org/wiki/Senftleben-Beenakker_effect"}, "a309": {"id": "a309", "title": "Differential Windlass", "description": "In a differential windlass (or Chinese windlass) there are two coaxial drums of different radii r and r'. The rope is wound onto one drum while it unwinds from the other, with a movable pulley hanging in the bight between the drums. Since each turn of the crank raises the pulley and attached weight by only p(r - r') / 2, very large mechanical advantages can be obtained.", "note": "", "link": "http://en.wikipedia.org/wiki/Differential_windlass"}, "a412": {"id": "a412", "title": "Ellipse", "description": "The locus of points, or path traced out, in a plane such that the sum of the distances from the moving point to two fixed points remains constant. Technically a circle is a special case of an ellipse, although in this context the ellipse is seen as an alternative to circular forms.", "note": "For example, through the use of an elliptical rotating component.", "link": "http://en.wikipedia.org/wiki/Ellipse"}, "a1186": {"id": "a1186", "title": "Superlubricity", "description": "A regime of motion in which friction vanishes or very nearly vanishes. Superlubricity may occur when two crystalline surfaces slide over each other in dry incommensurate contact (also called structural lubricity). A state of ultralow friction can also be achieved when a sharp tip slides over a flat surface and the applied load is below a certain threshold. Such 'superlubric' threshold depends on the tip-surface interaction and the stiffness of the materials in contact.", "note": "", "link": "http://en.wikipedia.org/wiki/Superlubricity"}, "a106": {"id": "a106", "title": "Bauschinger Effect", "description": "A property of materials where the material's stress-strain characteristics change as a result of the microscopic stress distribution of the material. For example, an increase in tensile yield strength at the expense of compressive yield strength. The Bauschinger effect is normally associated with conditions where the yield strength of a metal decreases when the direction of strain is changed. It is a general phenomenon found in most polycrystalline metals.", "note": "", "link": "http://en.wikipedia.org/wiki/Bauschinger_effect"}, "a680": {"id": "a680", "title": "Laser Peening", "description": "(or laser shock peening, LSP) The process of hardening or peening metal using a powerful laser. Laser peening can impart a layer of residual compressive stress on a surface that is four times deeper than that attainable from conventional shot peening treatments. A coating, usually black tape or paint, is applied to absorb the energy. Short energy pulses are then focused to explode the ablative coating, producing a shock wave. The beam is then repositioned and the process is repeated, creating an array of slight indents of compression and depth.", "note": "", "link": "http://en.wikipedia.org/wiki/Laser_peening"}, "a1091": {"id": "a1091", "title": "Shock Hardening", "description": "A process used to strengthen metals and alloys, wherein a shock wave produces atomic-scale defects in the material's crystalline structure. As in cold work, these defects interfere with the normal processes by which metallic materials yield (plasticity), making materials stiffer, but more brittle.", "note": "", "link": "http://en.wikipedia.org/wiki/Shock_hardening"}, "a1094": {"id": "a1094", "title": "Shot Peening", "description": "A process used to produce a compressive residual stress layer and modify mechanical properties of metals. It entails impacting a surface with shot (round metallic, glass or ceramic particles) with force sufficient to create plastic deformation. It is similar to sandblasting, except that it operates by the mechanism of plasticity rather than abrasion. In practice, this means that less material is removed by the process, and less dust created.", "note": "", "link": "http://en.wikipedia.org/wiki/Shot_peening"}, "a1114": {"id": "a1114", "title": "Solid Solution Strengthening", "description": "A type of alloying that can be used to improve the strength of a pure metal. The technique works by adding atoms of one element (the alloying element) to the crystalline lattice another element (the base metal). The alloying element diffuses into the matrix, forming a solid solution.", "note": "", "link": "http://en.wikipedia.org/wiki/Solid_solution_strengthening"}, "Photoplastic Effect": {"id": "", "title": "Photoplastic Effect", "description": "A change in the deforming stress due to illumination. Occurs in many semiconductors and dielectrics.", "note": "", "link": ""}, "Hopkinson Effect": {"id": "", "title": "Hopkinson Effect", "description": "The magnetic permeability of a ferromagnetic material at low field strengths, measured as a function of temperature, reaches a maximum at a temperature a little below the Curie temperature.", "note": "", "link": ""}, "a825": {"id": "a825", "title": "N\u00e9el Temperature", "description": "The temperature at which an antiferromagnetic material becomes paramagnetic \u0097 that is, the thermal energy becomes large enough to destroy the macroscopic magnetic ordering within the material.The N\u00e9el temperature is analogous to the Curie temperature for ferromagnetic materials.", "note": "", "link": "http://en.wikipedia.org/wiki/N%C3%A9el_temperature"}, "a724": {"id": "a724", "title": "Magnetic Circular Dichroism", "description": "The differential absorption of left and right circularly polarized light in the presence of a magnetic field. In general, this means wrapping a circular dichrometer in a large electromagnet.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_circular_dichroism"}, "a646": {"id": "a646", "title": "Kalina Cycle", "description": "A thermodynamic cycle for converting thermal energy to mechanical power, optimized for use with thermal sources at relatively low temperature compared to heat sink (or ambient) temperature. The cycle uses a working fluid comprised of two or more components (typically water and ammonia) whose ratio is varied in different parts of the system to increase thermodynamic reversibility and hence overall thermodynamic efficiency. There are multiple variants of Kalina cycle systems.", "note": "", "link": "http://en.wikipedia.org/wiki/Kalina_cycle"}, "a73": {"id": "a73", "title": "Anti-Reflective Coating", "description": "A type of optical coating applied to the surface of lenses and other optical devices to reduce reflection.", "note": "", "link": "http://en.wikipedia.org/wiki/Anti-reflective_coating"}, "a1257": {"id": "a1257", "title": "Time Dilation", "description": "In the theory of relativity, time dilation is an actual difference of elapsed time between two events as measured by observers either moving relative to each other or differently situated from gravitational masses.", "note": "", "link": "http://en.wikipedia.org/wiki/Time_dilation"}, "a248": {"id": "a248", "title": "Cotton-Mouton Effect", "description": "The double refraction of light in a liquid in the presence of a constant transverse magnetic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Cotton-Mouton_effect"}, "a109": {"id": "a109", "title": "Beat (acoustics)", "description": "An interference between two sounds of slightly different frequencies, perceived as periodic variations in volume whose rate is the difference between the two frequencies", "note": "", "link": "http://en.wikipedia.org/wiki/Beat_%28acoustics%29"}, "a1169": {"id": "a1169", "title": "Sulphur-Microwave Lamp", "description": "A highly efficient full-spectrum electrodeless lighting system whose light is generated by sulphur plasma excited by microwave radiation", "note": "", "link": "http://en.wikipedia.org/wiki/Sulfur_lamp"}, "a594": {"id": "a594", "title": "Hydrometer", "description": "An instrument used to measure the specific gravity (or relative density) of liquids; that is, the ratio of the density of the liquid to the density of water.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydrometer"}, "a1133": {"id": "a1133", "title": "Speed of Sound", "description": "The distance traveled during a unit of time by a sound wave propagating through an elastic medium.", "note": "For example, sound travels more slowly in fresh water than in sea water", "link": "http://en.wikipedia.org/wiki/Speed_of_sound"}, "a1285": {"id": "a1285", "title": "U-Tube Viscometer", "description": "A U-shaped glass tube held vertically at fixed temperature. One arm of the U has a section of precise capillary. Above this is a bulb. Another bulb is lower down in the other arm. Liquid is drawn into the upper bulb by suction and allowed to flow through the capillary into the lower bulb. The time taken for the liquid to pass marks on each side of the upper bulb (indicating a known volume) is proportional to the kinematic viscosity.", "note": "Where concentration is related to viscosity.", "link": "http://en.wikipedia.org/wiki/Falling_Ball_Viscometer#U-tube_viscometers"}, "a1332": {"id": "a1332", "title": "Wheatstone Bridge", "description": "A measuring instrument used to measure an unknown electrical resistance by balancing two legs of a bridge circuit, one leg of which includes the unknown component. Its operation is similar to the original potentiometer except that in potentiometer circuits the meter used is a sensitive galvanometer.", "note": "In many cases, the significance of measuring the unknown resistance is related to measuring the impact of some physical phenomenon - such as force, temperature, pressure, etc. - which thereby allows the use of Wheatstone bridge in measuring those elements indirectly.", "link": "http://en.wikipedia.org/wiki/Wheatstone_bridge"}, "a1346": {"id": "a1346", "title": "Zahn Cup", "description": "A viscosity measurement device widely used in the paint industry. It is commonly a stainless steel cup with a tiny hole drilled in the center of the bottom of the cup. To determine the viscosity of a liquid, the cup is dipped and completely filled with the substance. After lifting the cup out of the substance the user measures the time until the liquid streaming out of it breaks up. This time is then converted to kinematic viscosity.", "note": "Where concentration is related to viscosity.", "link": "http://en.wikipedia.org/wiki/Zahn_cup"}, "a151": {"id": "a151", "title": "Bubble Viscometer", "description": "Used to quickly determine kinematic viscosity of known liquids such as resins and varnishes. The time required for an air bubble to rise is inversely proportional to the visosity of the liquid, so the faster the bubble rises, the lower the viscosity.", "note": "The time for the bubble to rise is also related to the relative density of the gas in the bubble and the liquid.", "link": "http://en.wikipedia.org/wiki/Falling_Ball_Viscometer#Bubble_viscometer"}, "a440": {"id": "a440", "title": "Falling Sphere Viscometer", "description": "A method for measuring viscosity of a liquid. Stokes' law is the basis of the falling sphere viscometer, in which the fluid is stationary in a vertical glass tube. A sphere of known size and density is allowed to descend through the liquid. If correctly selected, it reaches terminal velocity, which can be measured by the time it takes to pass two marks on the tube.", "note": "The speed of the falling sphere is related to the relative densities of the sphere and the liquid.", "link": "http://en.wikipedia.org/wiki/Falling_Ball_Viscometer#Falling_sphere_viscometers"}, "a907": {"id": "a907", "title": "Photogrammetry", "description": "The practice of determining the geometric properties of objects from photographic images.", "note": "By determining the volume of an object.", "link": "http://en.wikipedia.org/wiki/Photogrammetry"}, "a681": {"id": "a681",
