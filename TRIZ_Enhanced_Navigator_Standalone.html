<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIZ Enhanced Navigator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --light-bg: #ecf0f1;
            --text-color: #2c3e50;
            --white: #ffffff;
            --border-radius: 8px;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary-color); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: var(--secondary-color); padding: 0.5rem 2rem; gap: 1rem; }
        .tab-btn { background: none; border: none; color: #bdc3c7; padding: 0.75rem 1.5rem; cursor: pointer; border-radius: var(--border-radius); }
        .tab-btn.active { background: var(--accent-color); color: white; }
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .panel { display: none; background: white; padding: 2rem; border-radius: var(--border-radius); box-shadow: var(--shadow); }
        .panel.active { display: block; }
        .card { border: 1px solid #eee; padding: 1.5rem; border-radius: var(--border-radius); background: #f9f9f9; margin-bottom: 1.5rem; }
        .principle-id { background: var(--accent-color); color: white; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
        .sub-principle { margin-top: 1rem; border-left: 4px solid var(--accent-color); padding-left: 1rem; }
        .example { list-style: disc; margin-left: 2rem; color: #555; }
        select, input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: var(--border-radius); margin-bottom: 1rem; }
        .matrix-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    </style>
</head>
<body>
<header><h1>TRIZ Enhanced Navigator</h1><input type="text" id="globalSearch" placeholder="Search principles or effects..."></header>
<div class="tabs">
    <button class="tab-btn active" onclick="showPanel('effects')">Scientific Effects</button>
    <button class="tab-btn" onclick="showPanel('technical')">Technical Contradictions</button>
    <button class="tab-btn" onclick="showPanel('physical')">Physical Contradictions</button>
</div>
<main>
    <div id="effects" class="panel active">
        <h2>Scientific Effects</h2>
        <div class="matrix-controls">
            <select id="effectMode" onchange="updateEffectOptions()">
                <option value="Function">Function</option><option value="Parameter">Parameter</option><option value="Transform">Transform</option>
            </select>
            <select id="effectTask" onchange="renderEffects()"></select>
            <select id="effectTarget" onchange="renderEffects()"></select>
        </div>
        <div id="effectResults"></div>
    </div>
    <div id="technical" class="panel">
        <h2>Technical Matrix</h2>
        <div class="matrix-controls">
            <select id="improveParam" onchange="renderPrinciples()"></select>
            <select id="worsenParam" onchange="renderPrinciples()"></select>
        </div>
        <div id="principleResults"></div>
    </div>
    <div id="physical" class="panel">
        <h2>Physical Contradictions</h2>
        <select id="sepPrinciple" onchange="renderPhysical()">
            <option value="Space">Space</option><option value="Time">Time</option><option value="Scale">Scale</option><option value="Condition">Condition</option>
        </select>
        <div id="physicalResults"></div>
    </div>
</main>
<script>
    const trizData = {"scientific_effects": {"effects": {"a26": {"id": "a26", "title": "Activated Alumina", "description": "A manufactured form of alumina (aluminium oxide) having a nanoporous structure.", "note": "", "link": "http://en.wikipedia.org/wiki/Activated_alumina"}, "a27": {"id": "a27", "title": "Activated Carbon", "description": "(or activated charcoal, activated coal, carbo activatus) A form of carbon processed to be riddled with small, low-volume pores that increase the surface area available for adsorption or chemical reactions. Due to its high degree of microporosity, just one gram of activated carbon has a surface area in excess of 500 square meters. An activation level sufficient for useful application may be attained solely from high surface area; however, further chemical treatment often enhances adsorption properties.", "note": "", "link": "http://en.wikipedia.org/wiki/Activated_carbon"}, "a29": {"id": "a29", "title": "Adhesive", "description": "A compound that adheres or bonds two items together. Adhesives may come from either natural or synthetic sources. Some modern adhesives are extremely strong, and are becoming increasingly important in modern construction and industry.", "note": "", "link": "http://en.wikipedia.org/wiki/Adhesive"}, "a42": {"id": "a42", "title": "Aerogels", "description": "A manufactured material with the lowest bulk density of any known porous solid. It is derived from a gel in which the liquid component of the gel has been replaced with a gas. The result is an extremely low-density solid, with a notable effectiveness as a thermal insulator.", "note": "In the case of very fine powders.", "link": "http://en.wikipedia.org/wiki/Aerogel"}, "a58": {"id": "a58", "title": "Amphiphiles", "description": "A chemical compound possessing both hydrophilic and hydrophobic properties. Common amphiphilic substances are soap and detergent.", "note": "", "link": "http://en.wikipedia.org/wiki/Amphiphile"}, "a116": {"id": "a116", "title": "Binder", "description": "An ingredient used to bind together two or more other materials in mixtures. Its two principal properties are adhesion and cohesion.", "note": "", "link": "http://en.wikipedia.org/wiki/Binder_(material)"}, "a117": {"id": "a117", "title": "Bingham Plastic", "description": "A viscoplastic material that behaves as a rigid body at low stresses but flows as a viscous fluid at high stress. A common example is toothpaste, which will not be extruded until a certain pressure is applied to the tube. It then is pushed out as a solid plug.", "note": "", "link": "http://en.wikipedia.org/wiki/Bingham_plastic"}, "a148": {"id": "a148", "title": "Brush", "description": "A device with bristles, wire or other filaments, used for cleaning, grooming hair, applying liquids such as paint, sealing gaps between moving surfaces, deburring and other kinds of surface finishing, and for many other purposes.", "note": "", "link": "http://en.wikipedia.org/wiki/Brush"}, "a254": {"id": "a254", "title": "Creaming", "description": "The migration of the dispersed phase of an emulsion, under the influence of buoyancy. The particles float upwards or sink, depending on how large they are and how much less dense or more dense they may be than the continuous phase, and also how viscous or how thixotropic the continuous phase might be. For as long as the particles remain separated, the process is called creaming.", "note": "", "link": "http://en.wikipedia.org/wiki/Creaming_(chemistry)"}, "a271": {"id": "a271", "title": "Cyclone Separation", "description": "A method of removing particulates from an air, gas or water stream, without the use of filters, through vortex separation. Rotational effects and gravity are used to separate mixtures of solids and fluids.", "note": "", "link": "http://en.wikipedia.org/wiki/Cyclonic_separation"}, "a312": {"id": "a312", "title": "Diffusion", "description": "The movement of particles from a high concentration to a low concentration.", "note": "", "link": "http://en.wikipedia.org/wiki/Diffusion"}, "a348": {"id": "a348", "title": "Electret", "description": "An Electret is a dielectric material that has a quasi-permanent electric charge or dipole polarisation. An electret generates internal and external electric fields, and is the electrostatic equivalent of a permanent magnet.", "note": "", "link": "http://en.wikipedia.org/wiki/Electret"}, "a395": {"id": "a395", "title": "Electrophoresis", "description": "The motion of dispersed particles relative to a fluid under the influence of an electric field.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrophoresis"}, "a478": {"id": "a478", "title": "Foam", "description": "A substance that is formed by trapping many gas bubbles in a liquid or solid.", "note": "", "link": "http://en.wikipedia.org/wiki/Foam"}, "a487": {"id": "a487", "title": "Fractal Forms", "description": "A fractal is generally 'a rough or fragmented geometric shape that can be split into parts, each of which is (at least approximately) a reduced-size copy of the whole,' a property called self-similarity. A mathematical fractal is based on an equation that undergoes iteration, a form of feedback based on recursion.", "note": "", "link": "http://en.wikipedia.org/wiki/Fractal"}, "a518": {"id": "a518", "title": "Gel", "description": "A gel is a solid, jelly-like material that can have properties ranging from soft and weak to hard and tough. Gels are defined as a substantially dilute crosslinked system, which exhibits no flow when in the steady-state. By weight, gels are mostly liquid, yet they behave like solids due to a three-dimensional crosslinked network within the liquid. It is the crosslinks within the fluid that give a gel its structure (hardness) and contribute to stickiness (tack).", "note": "", "link": "http://en.wikipedia.org/wiki/Gel"}, "a523": {"id": "a523", "title": "Gettering", "description": "A process for removal of impurities by reacting them with or attracting them to a suitable agent or part of the system (a 'getter'), with the result that their harmful effect is eliminated. Gettering originated in vaccuum tubes, where Ti was used to getter trace remnant gasses. Gettering is important today for the removal of unwanted trace elements (typically metals) from Silicon integrated circuits.", "note": "", "link": "http://dunham.ee.washington.edu/ee528/notes/getter.pdf"}, "a770": {"id": "a770", "title": "Metal Foam", "description": "A cellular structure consisting of a solid metal, frequently aluminium, containing a large volume fraction of gas-filled pores. The pores can be sealed (closed-cell foam), or they can form an interconnected network (open-cell foam).", "note": "", "link": "http://en.wikipedia.org/wiki/Metal_foam"}, "a819": {"id": "a819", "title": "Nanoporous Material", "description": "Materials consisting of a regular organic or inorganic framework supporting a regular, porous structure. Pores are by definition roughly in the nanometre range.", "note": "", "link": "http://en.wikipedia.org/wiki/Nanoporous"}, "a824": {"id": "a824", "title": "Nap", "description": "The raised (fuzzy) surface on certain kinds of cloth (such as velvet) or other materials.", "note": "", "link": "http://en.wikipedia.org/wiki/Nap_%28textile%29"}, "a861": {"id": "a861", "title": "Ostwald Ripening", "description": "An observed phenomenon in solid solutions or liquid sols that describes the change of an inhomogeneous structure over time, i.e., small crystals or sol particles dissolve, and redeposit onto larger crystals or sol particles. Occurs because larger particles are more energetically favored than smaller particles. This stems from the fact that molecules on the surface of a particle are energetically less stable than the ones in the interior. Ostwald ripening is also observed in liquid-liquid systems, causing diffusion of monomers (i.e. individual molecules or atoms) from smaller droplets to larger droplets due to greater solubility of the single monomer molecules in the larger monomer droplets.", "note": "", "link": "http://en.wikipedia.org/wiki/Ostwald_ripening"}, "a864": {"id": "a864", "title": "Oxidation", "description": "A chemical reaction that involves the loss of electrons or an increase in the oxidation state by a molecule, atom or ion.", "note": "", "link": "http://en.wikipedia.org/wiki/Redox"}, "a923": {"id": "a923", "title": "Physisorption", "description": "(or physical adsorption) A type of adsorption in which the adsorbate adheres to the surface only through Van der Waals (weak intermolecular) interactions, which are also responsible for the non-ideal behaviour of real gases.", "note": "", "link": "http://en.wikipedia.org/wiki/Physisorption"}, "a954": {"id": "a954", "title": "Porosity", "description": "The quality of being porous - i.e. having voids or spaces within a solid substance within or through which fluids can be present.", "note": "", "link": "http://en.wikipedia.org/wiki/Porosity"}, "a1017": {"id": "a1017", "title": "Reduction", "description": "A chemical reaction that involves the gain of electrons or a decrease in the oxidation state by a molecule, atom or ion.", "note": "", "link": "http://en.wikipedia.org/wiki/Redox"}, "a1027": {"id": "a1027", "title": "Reticulated Foam", "description": "A very porous, low density solid foam. Reticulated foams are extremely open foams i.e. there are few, if any, intact bubbles or cell windows. In contrast, the foam formed by soap bubbles is composed solely of intact (fully enclosed) bubbles. In a reticulated foam only the linear boundaries where the bubbles meet remain.", "note": "Within the cavities within the foam.", "link": "http://en.wikipedia.org/wiki/Reticulated_foam"}, "a1116": {"id": "a1116", "title": "Solvation", "description": "(commonly called dissolution) The process of attraction and association of molecules of a solvent with molecules or ions of a solute. As ions dissolve in a solvent they spread out and become surrounded by solvent molecules. The bigger the ion, the more solvent molecules are able to surround it and the more it becomes solvated.", "note": "", "link": "http://en.wikipedia.org/wiki/Solvation"}, "a1125": {"id": "a1125", "title": "Sorption", "description": "The action of both absorption and adsorption taking place simultaneously, i.e. the effect of gases or liquids being incorporated into a material of a different state and adhering to the surface of another molecule. Absorption is the incorporation of a substance in one state into another of a different state (e.g., liquids  absorbed by solid or gas absorbed by liquid). Adsorption is the physical adherence or bonding of ions and molecules onto the surface of another molecule.", "note": "", "link": "http://en.wikipedia.org/wiki/Sorption"}, "a1142": {"id": "a1142", "title": "Sponge", "description": "A tool or cleaning aid consisting of porous material.", "note": "", "link": "http://en.wikipedia.org/wiki/Sponge_%28material%29"}, "a1177": {"id": "a1177", "title": "Supercritical Fluid", "description": "Any substance at a temperature and pressure above its critical point. It can diffuse through solids like a gas, and dissolve materials like a liquid. Additionally, close to the critical point, small changes in pressure or temperature result in large changes in density, allowing many properties to be 'tuned'.", "note": "", "link": "http://en.wikipedia.org/wiki/Supercritical_fluid"}, "a1178": {"id": "a1178", "title": "Supercritical Fluid Extraction", "description": "Process for separating one component (the extractant) from another (the matrix) using supercritical fluids as the extracting solvent. Extraction is usually from a solid matrix, but can be from liquids. Can be used for sample preparation for analytical purposes, or on a larger scale to strip unwanted material from a product (e.g. decaffeination) or collect a desired product (e.g. essential oils).", "note": "", "link": "http://en.wikipedia.org/wiki/Supercritical_fluid_extraction"}, "a1190": {"id": "a1190", "title": "Supersaturation", "description": "A solution that contains more of the dissolved material than could be dissolved by the solvent under normal circumstances. It can also refer to a vapour of a compound that has a higher (partial) pressure than the vapour pressure of that compound.", "note": "", "link": "http://en.wikipedia.org/wiki/Supersaturation"}, "a1197": {"id": "a1197", "title": "Suspension", "description": "A heterogeneous fluid containing solid particles that are sufficiently large for sedimentation. Usually they must be larger than 1 micrometer. The internal phase (solid) is dispersed throughout the external phase (fluid - which may be liquid or gas) through mechanical agitation, with the use of certain excipients or suspending agents.", "note": "", "link": "http://en.wikipedia.org/wiki/Suspension_(chemistry)"}, "a1286": {"id": "a1286", "title": "Vacuum", "description": "A volume of space that is essentially empty of matter, such that its gaseous pressure is much less than atmospheric pressure. A perfect vacuum would be one with no particles in it at all, which is impossible to achieve in practice. Physicists often discuss ideal test results that would occur in a perfect vacuum, which they simply call 'vacuum' or 'free space', and use the term partial vacuum to refer to real vacuum.", "note": "", "link": "http://en.wikipedia.org/wiki/Vacuum"}, "a1348": {"id": "a1348", "title": "Zeolite", "description": "Microporous, aluminosilicate minerals commonly used as commercial adsorbents. Widely used in industry for water purification, as catalysts, for the preparation of advanced materials and in nuclear reprocessing.", "note": "", "link": "http://en.wikipedia.org/wiki/Zeolite"}, "a3": {"id": "a3", "title": "Ablation", "description": "The removal of material from the surface of an object by vaporisation, chipping, or other erosive processes. The term occurs in space physics associated with atmospheric reentry, in glaciology, medicine and passive fire protection. In space vehicle design, ablation is used to both cool and protect mechanical parts and/or payloads that would otherwise be adversely affected by extremely high temperatures.", "note": "", "link": "http://en.wikipedia.org/wiki/Ablation"}, "a6": {"id": "a6", "title": "Absorption (EM radiation)", "description": "The process by which the energy of a photon is taken up by matter, typically the electrons of an atom. The electromagnetic energy is transformed to another form of energy, e.g. to heat.", "note": "", "link": "http://en.wikipedia.org/wiki/Absorption_(electromagnetic_radiation)"}, "a9": {"id": "a9", "title": "Absorptive Filter", "description": "A filter that absorbes some wavelengths of incident radiation whilst transmitting others.", "note": "", "link": "http://en.wikipedia.org/wiki/Optical_filter#Absorptive"}, "a11": {"id": "a11", "title": "Accumulator (energy)", "description": "An apparatus by means of which energy can be stored, such as a rechargeable battery or a hydraulic accumulator. May be electrical, fluidic or mechanical. Sometimes used to convert a small continuous power source into a short surge of energy or vice versa. Other examples  include capacitors, compulsators, steam accumulator, wave energy machines and pumped-storage hydroelectric plants.", "note": "", "link": "http://en.wikipedia.org/wiki/Accumulator_(energy)"}, "a12": {"id": "a12", "title": "Acoustic Absorption", "description": "The process by which a material, structure, or object takes in sound energy when sound waves are encountered, as opposed to reflecting the energy. Part of the absorbed energy is transformed into heat and part is transmitted through the absorbing body.", "note": "", "link": "https://en.wikipedia.org/wiki/Absorption_(acoustics)"}, "a24": {"id": "a24", "title": "Acoustics", "description": "The the use of structures or other systems to affect the generation, propagation and reception of mechanical waves and vibrations.", "note": "For example, the use of sound-absorbing materials.", "link": "http://en.wikipedia.org/wiki/Acoustics"}, "a25": {"id": "a25", "title": "Acousto-optic Effect", "description": "A specific case of photoelasticity, where there is a change of a material's permittivity due to a mechanical strain resulting from an acoustic wave which has been excited within a transparent medium giving rise to variation of the refractive index. This creates a diffraction grating moving with the velocity given by the spread on the sound wave in the medium which defracts light forming a prominent diffraction pattern.", "note": "Through Bragg cell deflection into an absorbent region", "link": "http://en.wikipedia.org/wiki/Acousto-optic_effect#The_Acousto-optic_effect"}, "a45": {"id": "a45", "title": "Aerosol", "description": "A suspension of fine solid particles or liquid droplets in a gas.", "note": "For example, an aerosol of liquid droplets in air can be used to absorb or attenuate radiation, such as light.", "link": "http://en.wikipedia.org/wiki/Aerosol"}, "a61": {"id": "a61", "title": "Anechoic Chamber", "description": "A room designed to stop reflections of either sound or electromagnetic waves. They are also insulated from exterior sources of noise. Used to simulate a quiet open-space of infinite dimension. Originally used in the context of acoustics (sound waves), their radiofrequency counterpart is also used, for example to test antennas, radars, or electromagnetic interference.", "note": "", "link": "http://en.wikipedia.org/wiki/Anechoic_chamber"}, "a65": {"id": "a65", "title": "Angular Momentum Conservation", "description": "In a closed system angular momentum is constant. The conservation of angular momentum explains the angular acceleration of an ice skater as she brings her arms and legs close to the vertical axis of rotation. By bringing part of mass of her body closer to the axis she decreases her body's moment of inertia. Because angular momentum is constant the angular velocity (rotational speed) of the skater has to increase.", "note": "", "link": "http://en.wikipedia.org/wiki/Angular_momentum#Conservation_of_angular_momentum"}, "a81": {"id": "a81", "title": "Artificial Photosynthesis", "description": "A chemical process that replicates the natural process of photosynthesis, a process that converts sunlight, water, and carbon dioxide into carbohydrates and oxygen. The term is commonly used to refer to any scheme for capturing and storing the energy from sunlight in the chemical bonds of a fuel", "note": "", "link": "https://en.wikipedia.org/wiki/Artificial_photosynthesis"}, "a87": {"id": "a87", "title": "Auxetic Materials", "description": "Materials which, when stretched, become thicker perpendicularly to the applied force, i.e. they have a negative Poisson's ratio. Such materials  have interesting mechanical properties such as high energy absorption and fracture resistance. This may be useful in applications such as body armor, packing material, knee and elbow pads, robust shock absorbing material and sponge mops.", "note": "Though the use of energy to 'power' the auxetic change.", "link": "http://en.wikipedia.org/wiki/Auxetic"}, "a88": {"id": "a88", "title": "Auxetic Structures", "description": "Structures which, when stretched, become thicker perpendicularly to the applied force. That is, they have a negative Poisson's ratio. These can include composites, keyed-brick structures, microporous ploymers, auxetic foams or honeycombs.", "note": "Though the use of energy to 'power' the auxetic change.", "link": "http://www.azom.com/details.asp?ArticleID=167"}, "a105": {"id": "a105", "title": "Battery (electricity)", "description": "A combination of two or more electrochemical cells which store chemical energy which can be converted into electrical energy.", "note": "An electrical battery may be used to store energy.", "link": "http://en.wikipedia.org/wiki/Battery_(electricity)"}, "a120": {"id": "a120", "title": "Biot-Savart Effect", "description": "The generation of a magnetic field by a steady current i.e. an unchanging continual flow of charges (for example through a wire).", "note": "", "link": "http://en.wikipedia.org/wiki/Biot%E2%80%93Savart_law"}, "a125": {"id": "a125", "title": "Boiling", "description": "A type of phase transition. The rapid vaporisation of a liquid, which typically occurs when a liquid is heated to its boiling point, the temperature at which the vapour pressure of the liquid is equal to the pressure exerted on the liquid by the surrounding environmental pressure.", "note": "The phase change associated with boiling requires the use of energy.", "link": "http://en.wikipedia.org/wiki/Boiling"}, "a128": {"id": "a128", "title": "Bolometer", "description": "A device for measuring the energy of incident electromagnetic radiation. It consists of an 'absorber' connected to a heat sink (area of constant temperature) through an insulating link. The result is that any radiation absorbed by the absorber raises its temperature above that of the heat sink - the higher the energy absorbed, the higher the temperature will be.", "note": "", "link": "http://en.wikipedia.org/wiki/Bolometer"}, "Bong Cooler": {"id": "", "title": "Bong Cooler", "description": "A bong-shaped device that is able to cool water to temperatures below room temperature (sub-ambient) via evaporative cooling.", "note": "", "link": ""}, "a133": {"id": "a133", "title": "Bourdon Spring", "description": "A coiled tube, which, as it expands or contracts due to pressure change, causes a rotation.", "note": "", "link": "http://en.wikipedia.org/wiki/Pressure_measurement#Bourdon"}, "a141": {"id": "a141", "title": "Brewster's Angle", "description": "Brewster's angle (also known as the polarisation angle) is an angle of incidence at which light with a particular polarisation is perfectly transmitted through a transparent dielectric surface, with no reflection. When unpolarised light is incident at this angle, the light that is reflected from the surface is therefore perfectly polarised.", "note": "For example, polarised sunglasses use the principle of Brewster's angle to reduce glare from the sun reflecting off horizontal surfaces such as water or road.", "link": "http://en.wikipedia.org/wiki/Brewster%27s_angle"}, "a142": {"id": "a142", "title": "Bridgman Effect", "description": "(or internal Peltier effect) A phenomenon that occurs when an electric current passes through an anisotropic crystal - there is an absorption or liberation of heat because of the non-uniformity in current distribution", "note": "", "link": "https://en.wikipedia.org/wiki/Bridgman_effect"}, "a153": {"id": "a153", "title": "Buckypaper", "description": "A thin sheet made from an aggregate of carbon nanotubes. The nanotubes are approximately 50,000 times thinner than a human hair. Originally, it was fabricated as a way to handle carbon nanotubes, but it is also being studied and developed into applications by several research groups, showing promise as an armor in vehicle armor and personal armor and next-generation electronics and displays.", "note": "", "link": "http://en.wikipedia.org/wiki/Buckypaper"}, "a158": {"id": "a158", "title": "Capacitance", "description": "The property of a device or material medium to store an electric charge as a result of an electric potential. The most common form of charge storage device is a two-plate capacitor.", "note": "", "link": "http://en.wikipedia.org/wiki/Capacitance"}, "a185": {"id": "a185", "title": "Centrifugal Govenor", "description": "A specific type of governor that controls the speed of an engine by regulating the amount of fuel (or working fluid) admitted, so as to maintain a near constant speed whatever the load or fuel supply conditions. It uses the principle of proportional control.", "note": "", "link": "http://en.wikipedia.org/wiki/Centrifugal_governor"}, "a198": {"id": "a198", "title": "Chemical Bonding", "description": "The physical process responsible for the attractive interactions between atoms and molecules, and which confers stability to diatomic and polyatomic chemical compounds. In general, chemical bonding is associated with the sharing of electrons between the participating atoms. Molecules, crystals, and diatomic gases and most of the physical environment around us are held together by chemical bonds.", "note": "The forming of chemical bonds generally requires energy.", "link": "http://en.wikipedia.org/wiki/Chemical_bond"}, "a206": {"id": "a206", "title": "Christiansen Effect", "description": "A narrow bandpass or monochromatic optical filter which consists of an optical cell which is stuffed with a crushed substance (e.g. glass) and a (mostly organic) liquid.", "note": "", "link": "http://en.wikipedia.org/wiki/Christiansen_effect"}, "a219": {"id": "a219", "title": "Cold-forming", "description": "A metalworking process in which metal is shaped at a temperature below its recrystallisation temperature, usually at the ambient temperature. Cold forming techniques are usually classified into four major groups: squeezing, bending, drawing, and shearing.", "note": "", "link": "http://en.wikipedia.org/wiki/Cold_forming"}, "a231": {"id": "a231", "title": "Compression", "description": "The result of the subjection of a material to compressive stress, resulting in reduction of volume. The opposite of compression is tension. In simple terms, compression is a pushing force.", "note": "", "link": "http://en.wikipedia.org/wiki/Physical_compression"}, "a233": {"id": "a233", "title": "Concentrated Photovoltaics", "description": "Concentrated photovoltaic systems focus a large amount of sunlight onto a small area of solar photovoltaic materials to generate electricity. Unlike traditional, more conventional flat panel systems, CPV systems are often much less expensive to produce, because the concentration allows for the production of a much smaller area of solar cells.", "note": "", "link": "http://en.wikipedia.org/wiki/Concentrated_photovoltaics"}, "a240": {"id": "a240", "title": "Converse Piezoelectric Effect", "description": "Materials exhibiting the direct piezoelectric effect (the production of electricity when stress is applied) also exhibit the converse piezoelectric effect (the production of stress and/or strain when an electric field is applied). For example, lead zirconate titanate crystals will exhibit a maximum shape change of about 0.1% of the original dimension.", "note": "", "link": "http://en.wikipedia.org/wiki/Piezoelectricity"}, "a245": {"id": "a245", "title": "Corona Discharge", "description": "An electrical discharge brought on by the ionization of a fluid surrounding a conductor, which occurs when the potential gradient (the strength of the electric field) exceeds a certain value, but conditions are insufficient to cause complete electrical breakdown or arcing.", "note": "", "link": "http://en.wikipedia.org/wiki/Corona_discharge"}, "a265": {"id": "a265", "title": "Curie Point (ferromagnetic)", "description": "The Curie point of a ferromagnetic material is the temperature above which it loses its characteristic ferromagnetic ability", "note": "Energy is required for the state change at the curie point.", "link": "http://en.wikipedia.org/wiki/Curie_point"}, "a266": {"id": "a266", "title": "Curie Point (piezoelectric)", "description": "The Curie point of a piezoelectric material is the temperature above which the material loses its spontaneous polarisation and piezoelectric characteristics", "note": "Energy is required for the state change at the curie point.", "link": "http://en.wikipedia.org/wiki/Curie_point"}, "a273": {"id": "a273", "title": "Damping", "description": "Damping is any effect, either deliberately engendered or inherent to a system, that tends to reduce the amplitude of oscillations of an oscillatory system.", "note": "", "link": "http://en.wikipedia.org/wiki/Damping"}, "a281": {"id": "a281", "title": "Deformation", "description": "A change in the shape or size of an object due to an applied force. This can be a result of tensile (pulling) forces, compressive (pushing) forces, shear, bending or torsion (twisting). Deformation is often described in terms of strain.", "note": "Energy is required to deform an object.", "link": "http://en.wikipedia.org/wiki/Deformation_(engineering)"}, "a283": {"id": "a283", "title": "Dellinger Effect", "description": "A fadeout of short-wave radios, caused by increased ionization of the D region of the ionosphere due to solar flares.", "note": "", "link": "http://en.wikipedia.org/wiki/Dellinger_effect"}, "a307": {"id": "a307", "title": "Dielectric Permittivity", "description": "The measure of how much resistance is encountered when forming an electric field in a medium. In other words, permittivity is a measure of how an electric field affects, and is affected by, a dielectric medium. Permittivity is determined by the ability of a material to polarize in response to the field, and thereby reduce the total electric field inside the material. Thus, permittivity relates to a material's ability to transmit (or 'permit') an electric field.", "note": "In the case of an electric field.", "link": "http://en.wikipedia.org/wiki/Permittivity"}, "a317": {"id": "a317", "title": "Dilatant", "description": "(also termed shear thickening) A material for which viscosity increases with the rate of shear. Such a shear thickening fluid, also known by the acronym STF, is an example of a non-Newtonian fluid.", "note": "In the case of mechanical force.", "link": "http://en.wikipedia.org/wiki/Dilatant"}, "a320": {"id": "a320", "title": "Diode", "description": "A device that allows an electric current to pass in one direction (called the forward biased condition) and blocks the current in the opposite direction (the reverse biased condition). Real diodes do not display such a perfect on-off directionality but have a more complex non-linear electrical characteristic, which depends on the particular type of diode technology. Diodes also have many other functions in which they are not designed to operate in this on-off manner.", "note": "", "link": "http://en.wikipedia.org/wiki/Diode"}, "a321": {"id": "a321", "title": "Dispersion (of waves)", "description": "In optics, dispersion is the phenomenon in which the phase velocity of a wave depends on its frequency. Media having such a property are termed dispersive media. Dispersion is most often described for light waves, but it may occur for any kind of wave that interacts with a medium or passes through an inhomogeneous geometry (e.g. a waveguide), such as sound waves.", "note": "", "link": "http://en.wikipedia.org/wiki/Dispersion_(optics)"}, "a330": {"id": "a330", "title": "Drag", "description": "A drag (sometimes called fluid resistance) is the force that resists the movement of a solid object through a fluid (a liquid or gas). The most familiar form of drag is made up of friction forces, which act parallel to the object's surface, plus pressure forces, which act in a direction perpendicular to the object's surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Drag_(physics)"}, "a337": {"id": "a337", "title": "Earthing", "description": "The connection of an electrical conductor to ground or earth. Used to provide a reference point in an electrical circuit from which other voltages are measured, or a common return path for electric current, or a direct physical connection to the Earth.", "note": "", "link": "http://en.wikipedia.org/wiki/Ground_(electricity)"}, "a339": {"id": "a339", "title": "Echo", "description": "A reflection of sound, arriving at the listener some time after the direct sound. Typical examples are the echo produced by the bottom of a well, by a building, or by the walls of an enclosed room. A true echo is a single reflection of the sound source. The time delay is the extra distance divided by the speed of sound.", "note": "", "link": "http://en.wikipedia.org/wiki/Echo_(phenomenon)"}, "a341": {"id": "a341", "title": "Eddy Currents", "description": "An electrical phenomenon caused when a conductor is exposed to a changing magnetic field due to relative motion of the field source and conductor; or due to variations of the field with time. This can cause eddys of circulating current within the conductor which create electromagnets with magnetic fields that opposes the change of the magnetic field.", "note": "Eddy Currents produce a magnetic field opposite to that inducing the eddy current.", "link": "http://en.wikipedia.org/wiki/Eddy_current"}, "a347": {"id": "a347", "title": "Elasticity", "description": "The physical property of a material when it deforms under stress (e.g. external forces), but returns to its original shape when the stress is removed. The amount of deformation is called the strain. The elastic regime is characterized by a linear relationship between stress and strain, denoted linear elasticity.", "note": "", "link": "http://en.wikipedia.org/wiki/Elasticity_(physics)"}, "a354": {"id": "a354", "title": "Electrical Accumulator", "description": "An apparatus for stroring electrical energy.", "note": "", "link": "http://en.wikipedia.org/wiki/Lead-acid_battery"}, "a357": {"id": "a357", "title": "Electrical Resistance", "description": "The degree to which an object opposes an electric current flowing through it (usually measured in Ohms). A function of both its physical geometry and the resistivity of the material the object is made from.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrical_resistance"}, "a390": {"id": "a390", "title": "Electro-Optic Effects", "description": "A change in the optical properties of a material in response to an electric field that varies slowly compared with the frequency of light. The term encompasses a number of distinct phenomena, which can be subdivided into a) change of the absorption (electroabsorption, Franz-Keldysh effect, Quantum-confined Stark effect, electro-chromatic effect) and b) change of the refractive index(Pockels effect, Kerr Effect, electro-gyration)", "note": "", "link": "http://en.wikipedia.org/wiki/Electro-optic_effect"}, "a365": {"id": "a365", "title": "Electrochromism", "description": "A type of electro-optic effect. The creation of an absorption band at some wavelengths in a material in response to an electric field, which gives rise to a change in colour (i.e. the phenomenon displayed by some chemical species of reversibly changing color when a burst of charge is applied).", "note": "", "link": "http://en.wikipedia.org/wiki/Electrochromism"}, "a374": {"id": "a374", "title": "Electrohydrodynamics", "description": "Includes the following types of particle and fluid transport mechanisms:Electrophoresis, electrokinesis, dielectrophoresis, electro-osmosis, and electrorotation. In general, the phenomena relate to the direct conversion of electrical energy into kinetic energy, and vice versa.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrohydrodynamics"}, "a377": {"id": "a377", "title": "Electrolysis", "description": "A method of separating chemically bonded elements and compounds by passing an electric current through them. Electrolysis involves the passage of an electric current through an ionic substance that is either molten or dissolved in a suitable solvent, resulting in chemical reactions at the electrodes.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrolysis"}, "a381": {"id": "a381", "title": "Electromagnetic Induction", "description": "The generation of electromotive force (EMF) in a current-carrying conductor exposed to a changing magnetic field", "note": "Eddy Currents produce a magnetic field opposite to that inducing the eddy current.", "link": "https://en.wikipedia.org/wiki/Electromagnetic_induction"}, "a399": {"id": "a399", "title": "Electrorheological Effect", "description": "Electrorheological (ER) fluids are suspensions of extremely fine non-conducting particles (up to 50 micrometres diameter) in an electrically insulating fluid. The apparent viscosity of ER fluids changes reversibly by an order of up to 100,000 in response to an electric field. A typical ER fluid can go from the consistency of a liquid to that of a gel, and back, with response times of the order of ms. Sometimes called the Winslow Effect.", "note": "It has been proposed to create bullet-proof vests using an ER fluid because the ability to soak the fluid into cloth creates the potential for a very light vest that can change from a normal cloth into a hard covering almost instantaneously", "link": "http://en.wikipedia.org/wiki/Electrorheological_fluid"}, "a409": {"id": "a409", "title": "Electrostriction", "description": "A property of all electrical non-conductors, or dielectrics, that causes them to change their shape under the application of an electric field. All dielectrics exhibit some electrostriction, but certain engineered ceramics, known as relaxor ferroelectrics, have extraordinarily high electrostrictive constants,e.g. Lead magnesium niobate (PMN), Lead magnesium niobate-lead titanate (PMN-PT), Lead lanthanum zirconate titanate (PLZT).", "note": "", "link": "http://en.wikipedia.org/wiki/Electrostriction"}, "a410": {"id": "a410", "title": "Electroviscous Effect", "description": "Change in a liquid's viscosity induced by a strong electrostatic field.", "note": "", "link": "https://en.wikipedia.org/wiki/Electroviscous_effects"}, "a414": {"id": "a414", "title": "Endothermic Reaction", "description": "A process or reaction that absorbs energy typically (but not always) in the form of heat. The concept is frequently applied in physical sciences to e.g. chemical reactions, where thermal energy (heat) is converted to chemical bond energy.", "note": "By using the energy of the field to enable an endothermic reation.", "link": "http://en.wikipedia.org/wiki/Endothermic_reaction"}, "a431": {"id": "a431", "title": "Evaporative Cooler", "description": "A device that cools air through the evaporation of water.  Evaporative cooling works by employing water's large enthalpy of vaporisation.", "note": "In the case of a thermal field.", "link": "http://en.wikipedia.org/wiki/Evaporative_cooler"}, "a438": {"id": "a438", "title": "Extrusion", "description": "A process used to create objects of a fixed cross-sectional profile. A material is pushed or drawn through a die of the desired cross-section. Can be used to create very complex cross-sections and work materials that are brittle, because the material only encounters compressive and shear stresses.", "note": "", "link": "http://en.wikipedia.org/wiki/Extrusion"}, "a443": {"id": "a443", "title": "Faraday Cage", "description": "An enclosure formed by conducting material or by a mesh of such material. Such an enclosure blocks out external static electric fields. To a large degree they also shield the interior from external electromagnetic radiation if the conductor is thick enough and any holes are significantly smaller than the radiation's wavelength.", "note": "", "link": "http://en.wikipedia.org/wiki/Faraday_Cage"}, "a445": {"id": "a445", "title": "Faraday Wave", "description": "(or Faraday Ripples) Nonlinear standing waves that appear on liquids enclosed by a vibrating receptacle. When the vibration frequency exceeds a critical value, the flat hydrostatic surface becomes unstable. The waves can take the form of stripes, close-packed hexagons, or even squares or quasiperiodic patterns.", "note": "", "link": "https://en.wikipedia.org/wiki/Faraday_wave"}, "a448": {"id": "a448", "title": "Fatigue", "description": "The progressive and localised structural damage that occurs when a material is subjected to cyclic loading. The maximum stress values are less than the ultimate tensile stress limit, and may be below the yield stress limit of the material.", "note": "", "link": "http://en.wikipedia.org/wiki/Fatigue_(material)"}, "a458": {"id": "a458", "title": "Filter (electronic)", "description": "Electronic circuits which perform signal processing functions, specifically intended to remove unwanted signal components and/or enhance wanted ones.", "note": "", "link": "http://en.wikipedia.org/wiki/Electronic_filter"}, "a459": {"id": "a459", "title": "Filter (optical)", "description": "Optical filters selectively transmits light having certain properties (often, a particular range of wavelengths, that is, range of colours of light), while blocking the remainder. Optical filters, generally, belong to one of two categories. The simplest, physically, is the absorptive filter, while the latter category, that of interference or dichroic filters, can be quite complex.", "note": "", "link": "http://en.wikipedia.org/wiki/Filter_(optics)"}, "a468": {"id": "a468", "title": "Flow Battery", "description": "A form of rechargeable battery in which electrolyte containing one or more dissolved electroactive species flows through a power cell / reactor that converts chemical energy to electricity. Additional electrolyte is stored externally and typically pumped through the cell(s) of the reactor. Can be rapidly 'recharged' by replacing the electrolyte (analogous to refilling a fuel tank) while  recovering the spent material for re-energisation.", "note": "", "link": "http://en.wikipedia.org/wiki/Flow_battery"}, "a473": {"id": "a473", "title": "Fluorescence", "description": "Fluorescence is a luminescence that is mostly found as an optical phenomenon in cold bodies, in which the molecular absorption of a photon triggers the emission of a photon with a longer (less energetic) wavelength. The energy difference between the absorbed and emitted photons ends up as molecular rotations, vibrations or heat. Sometimes the absorbed photon is in the ultraviolet range, and the emitted light is in the visible range.", "note": "", "link": "http://en.wikipedia.org/wiki/Flourescence"}, "a477": {"id": "a477", "title": "Flywheel", "description": "A mechanical device with significant moment of inertia used as a storage device for rotational energy. Flywheels resist changes in their rotational speed, which helps steady the rotation of the shaft when a fluctuating torque is exerted on it by its power source such as a piston-based (reciprocating) engine, or when the load placed on it is intermittent (such as a piston pump).", "note": "By transfering energy from the field into the kinetic rotational energy of the flywheel.", "link": "http://en.wikipedia.org/wiki/Flywheel"}, "Folding": {"id": "", "title": "Folding", "description": "Bending of a planar material or structure, typically along a straight line, resulting in an angle acrosss the fold line <> 180 degrees.", "note": "Folding of solids requres the use of mechanical energy.", "link": ""}, "a491": {"id": "a491", "title": "Franz-Keldysh Effect", "description": "A change in optical absorption by a semiconductor when an electric field is applied. Used to create electroabsorption modulators.", "note": "An electroabsorption modulator can be used for modulating the intensity of a laser beam via an electric voltage. Its principle of operation is based on the Franz-Keldysh effect.", "link": "http://en.wikipedia.org/wiki/Franz-Keldysh_effect"}, "a502": {"id": "a502", "title": "Friction", "description": "The force resisting the relative motion of two surfaces in contact or a surface in contact with a fluid (e.g. air on an aircraft or water in a pipe).", "note": "", "link": "http://en.wikipedia.org/wiki/Friction"}, "a508": {"id": "a508", "title": "Fullerenes", "description": "A family of carbon allotropes, molecules composed entirely of carbon, in the form of a hollow sphere, ellipsoid, tube, or plane.", "note": "", "link": "http://en.wikipedia.org/wiki/Fullerines"}, "a516": {"id": "a516", "title": "Gear", "description": "A gear (or more correctly a gear wheel) is a rotating machine part having cut teeth, or cogs, which mesh with another toothed part in order to transmit torque. Two or more gears working in tandem are called a transmission and can produce a mechanical advantage through a gear ratio and thus may be considered a simple machine. Geared devices can change the speed, magnitude, and direction of a power source.", "note": "For example, absorbing a mechanical field.", "link": "http://en.wikipedia.org/wiki/Gear"}, "a525": {"id": "a525", "title": "Gimbal", "description": "A pivoted support that allows the rotation of an object about a single axis. A set of two gimbals, one mounted on the other with pivot axes orthogonal, may be used to allow an object mounted on the innermost gimbal to remain immobile  regardless of the motion of its support.", "note": "", "link": "http://en.wikipedia.org/wiki/Gimbal"}, "a553": {"id": "a553", "title": "Harmonic Oscillator", "description": "A system which, when displaced from its equilibrium position, experiences a restoring force proportional to the displacement. Mechanical examples include pendula (with small angles of displacement) and masses connected to springs.", "note": "", "link": "http://en.wikipedia.org/wiki/Harmonic_oscillator"}, "a555": {"id": "a555", "title": "Heat Engine", "description": "A system that performs the conversion of heat energy to mechanical work by exploiting the temperature gradient between a hot 'source' and a cold 'sink'. Heat is transferred from the source, through the 'working body' of the engine, to the sink, and in this process some of the heat is converted into work by exploiting the properties of a working substance (usually a gas or liquid).", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_engine"}, "a556": {"id": "a556", "title": "Heat Exchanger", "description": "A device built for efficient heat transfer from one medium to another, whether the media are separated by a solid wall so that they never mix, or the media are in direct contact", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_exchanger"}, "a558": {"id": "a558", "title": "Heat Sink", "description": "A component or assembly that transfers heat generated within a solid material to a fluid medium, such as air or a liquid.", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_sink"}, "Heating": {"id": "", "title": "Heating", "description": "The act of increasing temperature.", "note": "", "link": ""}, "a577": {"id": "a577", "title": "Hooke's Law", "description": "Hooke's law of elasticity is an approximation that states that the extension of a spring is in direct proportion with the load added to it as long as this load does not exceed the elastic limit. Materials for which Hooke's law is a useful approximation are known as linear-elastic or 'Hookean' materials.", "note": "", "link": "http://en.wikipedia.org/wiki/Hooke%27s_law"}, "a583": {"id": "a583", "title": "Hydraulic Accumulator", "description": "An energy storage device. A pressure storage reservoir in which a non-compressible hydraulic fluid is held under pressure by an external source. That external source can be, for example,  a spring, a raised weight, or a compressed gas.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydraulic_accumulator"}, "a608": {"id": "a608", "title": "Inclined Plane", "description": "A flat surface whose endpoints are at different heights. By moving an object up an inclined plane rather than completely vertically, the amount of force required is reduced, at the expense of increasing the distance the object must travel.", "note": "", "link": "http://en.wikipedia.org/wiki/Inclined_plane"}, "a612": {"id": "a612", "title": "Inductor", "description": "A passive electrical component that can store energy in a magnetic field created by the electric current passing through it. Typically an inductor is a conducting wire shaped as a coil, the loops helping to create a strong magnetic field inside the coil due to Ampere's Law. Due to the time-varying magnetic field inside the coil, a voltage is induced, according to Faraday's law of electromagnetic induction, which by Lenz's Law opposes the change in current that created it.", "note": "", "link": "http://en.wikipedia.org/wiki/Inductor"}, "a619": {"id": "a619", "title": "Intumescent Materials", "description": "An intumescent is a substance which swells as a result of heat exposure, thus increasing in volume, and decreasing in density. Intumescents are typically used in passive fire protection.", "note": "", "link": "http://en.wikipedia.org/wiki/Intumescent"}, "a643": {"id": "a643", "title": "Joule Heating", "description": "The process by which the passage of an electric current through a conductor releases heat. Heat generated is a function of current, resistance and time. Also known as the Joule-Lenz effect, Ohmic heating or resitive heating.", "note": "", "link": "http://en.wikipedia.org/wiki/Joule_heating"}, "a675": {"id": "a675", "title": "Laser Ablation", "description": "The process of removing material from a solid (or occasionally liquid) surface by irradiating it with a laser beam. At low laser flux, the material is heated by the absorbed laser energy and evaporates or sublimates. At high laser flux, the material is typically converted to a plasma. Usually, laser ablation refers to removing material with a pulsed laser, but it is possible to ablate material with a continuous wave laser beam if the laser intensity is high enough.", "note": "", "link": "http://en.wikipedia.org/wiki/Laser_ablation"}, "a682": {"id": "a682", "title": "Latent Heat", "description": "Energy released or absorbed, by a body or a thermodynamic system, during a constant-temperature process. An example is a state of matter change, meaning a phase transition, such as ice melting or water boiling.", "note": "For example, using ice to absorb the heat from a drink.", "link": "http://en.wikipedia.org/wiki/Latent_heat"}, "a690": {"id": "a690", "title": "Lever", "description": "A rigid object that is used with an appropriate fulcrum or pivot point to multiply the mechanical force that can be applied to another object.", "note": "", "link": "http://en.wikipedia.org/wiki/Lever"}, "a703": {"id": "a703", "title": "Liquid Crystals", "description": "Substances that exhibit a phase of matter that has properties between those of a conventional liquid, and those of a solid crystal.", "note": "Liquid crystals are use to absorb (attenuate) light.", "link": "http://en.wikipedia.org/wiki/Liquid_crystal"}, "a710": {"id": "a710", "title": "Lorentz Force", "description": "The force on a point charge due to electromagnetic fields. When a wire carrying an electrical current is placed in a magnetic field, each of the moving charges, which comprise the current, experiences the Lorentz force, and together they can create a macroscopic force on the wire (sometimes called the Laplace force).", "note": "", "link": "http://en.wikipedia.org/wiki/Lorentz_force"}, "a731": {"id": "a731", "title": "Magnetic Reluctance", "description": "Analogous to the way an electric field causes an electric current to follow the path of least resistance, a magnetic field causes magnetic flux to follow the path of least magnetic reluctance.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_reluctance"}, "a733": {"id": "a733", "title": "Magnetic Saturation", "description": "Seen in some magnetic materials, saturation is the state reached when an increase in applied external magnetising field cannot increase the magnetisation of the material further, so the total magnetic field levels off. It is a characteristic particularly of ferromagnetic materials, such as iron, nickel, cobalt and their alloys.", "note": "", "link": "http://en.wikipedia.org/wiki/Saturation_%28magnetic%29"}, "a736": {"id": "a736", "title": "Magnetocaloric Effect", "description": "(or Magnetothermal Effect) A magneto-thermodynamic phenomenon in which a reversible change in temperature of a suitable material is caused by exposing the material to a changing magnetic field. Also known as adiabatic demagnetisation. Can be used to attain extremely low temperatures (well below 1 K), as well as the ranges used in common refrigerators.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_refrigeration"}, "a744": {"id": "a744", "title": "Magnetorheological Elastomer", "description": "(or magnetosensitive elastomers) A class of solids that consist of polymeric matrix with embedded micro- or nano-sized ferromagnetic particles such as carbonyl iron. As a result of this composite microstructure, the mechanical properties of these materials can be controlled by the application of magnetic field.", "note": "", "link": "https://en.wikipedia.org/wiki/Magnetorheological_elastomer"}, "a746": {"id": "a746", "title": "Magnetorheological Fluid", "description": "A suspension of micrometer-sized magnetic particles in a carrier fluid, usually a type of oil. When subjected to a magnetic field, the fluid greatly increases its apparent viscosity, to the point of becoming a viscoelastic solid. The yield stress of the fluid when in its active ('on') state can be controlled very accurately by varying the magnetic field intensity, hence the fluid's ability to transmit force can be controlled with an electromagnet, which gives rise to its many possible control-based applications.", "note": "If the shock absorbers of a vehicle's suspension are filled with MR fluid instead of plain oil, and the whole device surrounded with an electromagnet, the viscosity of the fluid (and hence the amount of damping provided by the shock absorber) can be varied depending on driver preference or the weight being carried by the vehicle - or it may be dynamically varied in order to provide stability control.", "link": "http://en.wikipedia.org/wiki/Magnetorheological_fluid"}, "Mechanical Accumulator": {"id": "", "title": "Mechanical Accumulator", "description": "A mechancial device for the storage of energy. Examples include springs and hydraulic accumulators.", "note": "", "link": ""}, "a757": {"id": "a757", "title": "Mechanical Advantage", "description": "Force amplification achieved by using a tool, mechanical device or machine system. Ideally, the device preserves the input power and simply trades off forces against movement to obtain a desired amplification in the output force.", "note": "", "link": "http://en.wikipedia.org/wiki/Mechanical_advantage"}, "a759": {"id": "a759", "title": "Mechanical Force", "description": "A mechanical influence that causes a free body to undergo an acceleration.", "note": "", "link": "http://en.wikipedia.org/wiki/Force"}, "a766": {"id": "a766", "title": "Melting", "description": "A process that results in the phase change of a substance from a solid to a liquid. The internal energy of a solid substance is increased (typically by the absorbtion of heat) to a specific temperature (called the melting point) at which it changes to the liquid phase.", "note": "", "link": "http://en.wikipedia.org/wiki/Melting"}, "a775": {"id": "a775", "title": "Metastability", "description": "A general scientific concept which describes states of delicate equilibrium. A system is in a metastable state when it is in equilibrium (not changing with time) but is susceptible to fall into lower-energy states with only slight interaction. It is analogous to being at the bottom of a small valley when there is a deeper valley close by", "note": "", "link": "http://en.wikipedia.org/wiki/Metastability"}, "a792": {"id": "a792", "title": "Mirage (photothermal deflection)", "description": "A naturally occurring optical phenomenon in which light rays are bent to produce a displaced image of distant objects or the sky.", "note": "", "link": "http://en.wikipedia.org/wiki/Mirage"}, "a795": {"id": "a795", "title": "M\u00f6bius Resistor", "description": "An electrical component made up of two conductive surfaces separated by a dielectric material, twisted 180\u00b0 and connected to form a M\u00f6bius strip. It provides a resistor that has no residual self-inductance, meaning that it can resist the flow of electricity without causing magnetic interference at the same time.", "note": "", "link": "http://en.wikipedia.org/wiki/M%C3%B6bius_resistor"}, "a802": {"id": "a802", "title": "Moment of Inertia", "description": "(or mass moment of inertia, rotational inertia, polar moment of inertia of mass, or the angular mass). The inertia of a rotating body with respect to its rotation. The moment of inertia plays much the same role in rotational dynamics as mass does in linear dynamics,", "note": "", "link": "http://en.wikipedia.org/wiki/Moment_of_inertia"}, "a813": {"id": "a813", "title": "Nanofoam", "description": "A class of nanostructured, porous materials containing a significant population of pores with diameters less than 100 nm. Aerogels are one example of nanofoam.", "note": "Carbon aerogels are extremely 'black' in the infrared spectrum making them efficient for solar energy collectors.", "link": "http://en.wikipedia.org/wiki/Nanofoam"}, "a837": {"id": "a837", "title": "Non-Newtonian Fluids", "description": "Fluids whose flow properties are not described by a single constant value of viscosity. In a non-Newtonian fluid, the relation between the shear stress and the strain rate is nonlinear, and can even be time-dependent. Therefore a constant coefficient of viscosity can not be defined. A ratio between shear stress and rate of strain (or shear-dependent viscosity) can be defined, this being more useful for fluids without time-dependent behavior.", "note": "For example, mechanical force, in the case of body armour.", "link": "http://en.wikipedia.org/wiki/Non-Newtonian_fluid"}, "a879": {"id": "a879", "title": "Peltier Effect", "description": "Heat is evolved or absorbed at the junction of two dissimilar metals carrying a small current, depending upon the direction of the current. One of a number of thermoelectric effects (See Seebeck Effect and Thompson Effect).", "note": "Either by absorbing a thermal field, or by absorbing the electrical field used to power the Peltier effect.", "link": "http://en.wikipedia.org/wiki/Thermoelectric_effect#Peltier_effect"}, "a888": {"id": "a888", "title": "Phase Change", "description": "The transformation of a thermodynamic system from one phase to another. Most commonly used to describe transitions between solid, liquid and gaseous states of matter, in rare cases including plasma.", "note": "", "link": "http://en.wikipedia.org/wiki/Phase_change"}, "a894": {"id": "a894", "title": "Phononic Crystal", "description": "A phononic crystal is a material which exhibits stop bands for phonons, preventing phonons of selected ranges of frequencies from being transmitted through the material.", "note": "", "link": "http://en.wikipedia.org/wiki/Phononic_crystal"}, "a896": {"id": "a896", "title": "Phosphorescence", "description": "A specific type of photoluminescence related to fluorescence. Unlike fluorescence, a phosphorescent material does not immediately re-emit the radiation it absorbs.", "note": "", "link": "http://en.wikipedia.org/wiki/Phosphorescence"}, "a898": {"id": "a898", "title": "Photoacoustic Effect", "description": "The formation of sound waves, following light absorption in a material sample. Most generally, electromagnetic radiation of any kind can give rise to a photoacoustic effect. This includes the whole range of electromagnetic frequencies, from gamma radiation and x-rays to microwave and radio.", "note": "", "link": "http://en.wikipedia.org/wiki/Photoacoustic_effect"}, "a900": {"id": "a900", "title": "Photochromism", "description": "The reversible transformation of a chemical species between two forms by the absorption of electromagnetic radiation, where the two forms have different absorption spectra. Trivially, this can be described as a reversible change of colour upon exposure to light.", "note": "", "link": "http://en.wikipedia.org/wiki/Photochromism"}, "a901": {"id": "a901", "title": "Photoconductivity", "description": "An optical and electrical phenomenon in which a material becomes more electrically conductive due to the absorption of electromagnetic radiation such as visible light, ultraviolet light, infrared light, or gamma radiation.", "note": "", "link": "http://en.wikipedia.org/wiki/Photoconductivity"}, "a902": {"id": "a902", "title": "Photodissociation", "description": "A chemical reaction in which a chemical compound is broken down by photons. Any photon with sufficient energy can affect the chemical bonds of a chemical compound. Since a photon's energy is inversely proportional to its wavelength, electromagnetic waves with the energy of visible light or higher, such as ultraviolet light, x-rays and gamma rays are usually involved in such reactions.", "note": "", "link": "https://en.wikipedia.org/wiki/Photodissociation"}, "a905": {"id": "a905", "title": "Photoelectric Effect", "description": "The emission of electrons from matter (metals and non-metallic solids, liquids or gases) as a consequence of their absorption of energy from electromagnetic radiation of very short wavelength, such as visible or ultraviolet light.", "note": "", "link": "http://en.wikipedia.org/wiki/Photoelectric_effect"}, "a909": {"id": "a909", "title": "Photoionisation", "description": "The physical process in which an incident photon ejects one or more electrons from an atom, ion or molecule. This is essentially the same process that occurs with the photoelectric effect with metals. In the case of a gas, the term photoionisation is more common.", "note": "", "link": "http://en.wikipedia.org/wiki/Photoelectrochemical_processes#Photoionization"}, "a911": {"id": "a911", "title": "Photoluminescence", "description": "A process in which a substance absorbs photons (electromagnetic radiation) and then re-radiates photons. Quantum mechanically, this can be described as an excitation to a higher energy state and then a return to a lower energy state accompanied by the emission of a photon. One of many forms of luminescence (light emission) and is distinguished by photoexcitation (excitation by photons).", "note": "", "link": "http://en.wikipedia.org/wiki/Photoluminescence"}, "a913": {"id": "a913", "title": "Photonic Crystal", "description": "Periodic optical (nano)structures that affect the propagation of electromagnetic waves, useful for controlling and manipulating the flow of light.", "note": "", "link": "http://en.wikipedia.org/wiki/Photonic_Crystal"}, "a915": {"id": "a915", "title": "Photophoresis", "description": "The phenomenon that small particles suspended in gas (aerosols) or liquids (hydrocolloids) starts to migrate when illuminated by a sufficiently intense beam of light. The existence of this phenomenon is owed to a non-uniform distribution of temperature of an illuminated particle in a fluid medium.", "note": "", "link": "http://en.wikipedia.org/wiki/Photophoresis"}, "a919": {"id": "a919", "title": "Photosynthesis", "description": "A process used by plants and other organisms to convert the light energy captured from the sun into chemical energy that can be used to fuel the organism's activities.", "note": "", "link": "http://en.wikipedia.org/wiki/Photosynthesis"}, "a920": {"id": "a920", "title": "Photovoltaic Effect", "description": "The creation of a voltage (or a corresponding electric current) in a material upon exposure to light. Though directly related to the photoelectric effect, the two processes are different and should be distinguished. In the photoelectric effect, electrons are ejected from a material's surface upon exposure to radiation of sufficient energy. The photovoltaic effect is different in that the generated electrons are transferred between different bands (i.e. from the valence to conduction bands) within the material, resulting in the buildup of a voltage between two electrodes.", "note": "", "link": "http://en.wikipedia.org/wiki/Photovoltaic_effect"}, "a926": {"id": "a926", "title": "Piezoelectric Effect", "description": "Generation of electrical charge  in certain solid materials (notably crystals, certain ceramics, and biological matter such as bone, DNA and various proteins) in response to applied mechanical strain.  The piezoelectric effect is a reversible process in that materials also exhibit the reverse piezoelectric effect (the internal generation of a mechanical force resulting from an applied electrical field).", "note": "", "link": "http://en.wikipedia.org/wiki/Piezoelectric_effect"}, "a946": {"id": "a946", "title": "Plenoptic Camera", "description": "(also called a light-field camera) A camera that uses a microlens array to capture 4D light field information about a scene. Such light field information can be used to improve the solution of computer graphics and vision-related problems.", "note": "", "link": "http://en.wikipedia.org/wiki/Plenoptic_camera"}, "a948": {"id": "a948", "title": "Pockels Effect", "description": "Produces birefringence in an optical medium induced by a constant or varying electric field. Used to make Pockels cells, which are voltage-controlled wave plates.", "note": "", "link": "http://en.wikipedia.org/wiki/Pockels_effect"}, "a949": {"id": "a949", "title": "Poisson's Effect", "description": "When a material is compressed in one direction, it usually tends to expand in the other two directions perpendicular to the direction of compression.", "note": "", "link": "http://en.wikipedia.org/wiki/Poisson%27s_ratio"}, "a985": {"id": "a985", "title": "Pyroelectric Effect", "description": "The ability of certain materials to generate an electrical potential when they are heated or cooled. As a result of this change in temperature, positive and negative charges move to opposite ends through migration (i.e. the material becomes polarized) and hence, an electrical potential is established.", "note": "", "link": "http://en.wikipedia.org/wiki/Pyroelectric_effect"}, "a1008": {"id": "a1008", "title": "Ratchet", "description": "A mechanical device that allows linear or rotary motion in only one direction, while preventing motion in the opposite direction.", "note": "", "link": "http://en.wikipedia.org/wiki/Ratchet_(device)"}, "a1009": {"id": "a1009", "title": "Rayleigh Scattering", "description": "The elastic scattering of light or other electromagnetic radiation by particles much smaller than the wavelength of the light.", "note": "", "link": "http://en.wikipedia.org/wiki/Rayleigh_scattering"}, "a1012": {"id": "a1012", "title": "Reaction (physics)", "description": "In classical mechanics, Newton's third law states that forces occur in pairs: the Action and the Reaction. Both forces are equal in magnitude and opposite in direction. The distinction between action and reaction is purely arbitrary: any one of the two forces can be considered an action, in which case the other (corresponding) force automatically becomes its associated reaction.", "note": "", "link": "http://en.wikipedia.org/wiki/Reaction_(physics)"}, "a1013": {"id": "a1013", "title": "Reaction Wheel", "description": "A type of flywheel used primarily by spacecraft to change their angular momentum without rockets or other reaction devices. Cab provide very precise changes in angle and hence spacecraft's attitude. Also applicable to non-spacecraft systems.", "note": "", "link": "http://en.wikipedia.org/wiki/Reaction_wheel"}, "a1015": {"id": "a1015", "title": "Rectenna", "description": "A special type of antenna that is used to convert electromagnetic energy into direct current electricity", "note": "", "link": "https://en.wikipedia.org/wiki/Rectenna"}, "a1021": {"id": "a1021", "title": "Refractory Material", "description": "A (typicaly non-metallic) material that retains its strength at high temperatures. Refractory materials are used in linings for furnaces, kilns, incinerators and reactors. They are also used to make crucibles.", "note": "", "link": "http://en.wikipedia.org/wiki/Refractory"}, "a1025": {"id": "a1025", "title": "Resonance", "description": "The tendency of a system to oscillate with larger amplitude at some frequencies than at others. These are known as the system's resonant frequencies. At these frequencies, even small periodic driving forces can produce large amplitude oscillations, because the system stores vibrational energy.", "note": "", "link": "http://en.wikipedia.org/wiki/Resonance"}, "a1030": {"id": "a1030", "title": "Reverberation", "description": "The persistence of sound in a particular space after the original sound is removed. A reverberation, or reverb, is created when a sound is produced in an enclosed space causing a large number of echoes to build up and then slowly decay as the sound is absorbed by the walls and air.This is most noticeable when the sound source stops but the reflections continue, decreasing in amplitude, until they can no longer be heard.", "note": "", "link": "http://en.wikipedia.org/wiki/Reverberation"}, "a1037": {"id": "a1037", "title": "Rheopecty", "description": "(or rheopexy) The rare property of some non-Newtonian fluids to show a time-dependent change in viscosity; the longer the fluid undergoes shearing force, the higher its viscosity. Rheopectic fluids, such as some lubricants, thicken or solidify when shaken (the opposite type of behaviour, in which fluids become less viscous the longer they undergo shear, is called thixotropy and is much more common).", "note": "For example, mechanical force, in the case of body armour.", "link": "http://en.wikipedia.org/wiki/Rheopecty"}, "a1050": {"id": "a1050", "title": "Rubber Band Thermodynamics", "description": "Stretching a rubber band will cause it to release heat, while releasing it after it has been stretched will lead it to absorb heat, causing its surroundings to become cooler. Heating causes a rubber band to contract, and cooling causes expansion.", "note": "", "link": "http://en.wikipedia.org/wiki/Rubber_band#Thermodynamics"}, "a1057": {"id": "a1057", "title": "Scattering", "description": "A general physical process where some forms of radiation, such as light, sound, or moving particles, are forced to deviate from a straight trajectory by one or more localized non-uniformities in the medium through which they pass (includes deviation of reflected radiation from the angle predicted by the law of reflection).", "note": "", "link": "http://en.wikipedia.org/wiki/Scattering"}, "a1079": {"id": "a1079", "title": "Shadow", "description": "An area where direct light (or other radiation) from a source cannot reach due to obstruction by an object. The cross section of a shadow is a two-dimensional silhouette, or reverse projection of the object blocking the light (or radiation).", "note": "", "link": "http://en.wikipedia.org/wiki/Shadow"}, "a1089": {"id": "a1089", "title": "Shear Thickening", "description": "(or Dilitant) The property of a material for which viscosity increases with the rate of shear. Such a shear thickening fluid is an example of a non-Newtonian fluid.", "note": "For example, mechanical force, in the case of body armour.", "link": "http://en.wikipedia.org/wiki/Shear_thickening"}, "a1101": {"id": "a1101", "title": "Skin Effect", "description": "The tendency of an alternating electric current (AC) to distribute itself within a conductor so that the current density near the surface of the conductor is greater than that at its core. That is, the electric current tends to flow at the 'skin' of the conductor. The skin effect causes the effective resistance of the conductor to increase with the frequency of the current. Skin effect is due to eddy currents set up by the AC current.", "note": "", "link": "http://en.wikipedia.org/wiki/Skin_effect"}, "a1106": {"id": "a1106", "title": "Smoke", "description": "A collection of airborne solid and liquid particulates and gases emitted when a material undergoes combustion or pyrolysis, together with the quantity of air that is entrained or otherwise mixed into the mass.", "note": "", "link": "https://en.wikipedia.org/wiki/Smoke"}, "a1131": {"id": "a1131", "title": "Spatial Filter", "description": "An optical device which uses the principles of Fourier optics to alter the structure of a beam of coherent light or other electromagnetic radiation.", "note": "", "link": "http://en.wikipedia.org/wiki/Spatial_filter"}, "a1144": {"id": "a1144", "title": "Spring", "description": "An elastic object used to store mechanical energy.", "note": "", "link": "https://en.wikipedia.org/wiki/Spring_(device)"}, "a1151": {"id": "a1151", "title": "Static Friction", "description": "(or Stiction) Two solid objects pressing against each other (but not sliding) will require some threshold of force parallel to the surface of contact in order to overcome static cohesion. Static Friction is a threshold, not a continuous force.", "note": "", "link": "http://en.wikipedia.org/wiki/Stiction"}, "a1152": {"id": "a1152", "title": "Steam Explosion", "description": "A violent boiling or flashing of water into steam, occurring when water is either superheated, rapidly heated by fine hot debris produced within it, or the interaction of molten metals . The water changes from a liquid to a gas with extreme speed, increasing dramatically in volume.", "note": "", "link": "http://en.wikipedia.org/wiki/Steam_explosion"}, "a1155": {"id": "a1155", "title": "Stick-slip Phenomenon", "description": "The spontaneous jerking motion that can occur while two objects are sliding over each other.", "note": "", "link": "http://en.wikipedia.org/wiki/Stick-slip_phenomenon"}, "a1164": {"id": "a1164", "title": "Stress Relaxation", "description": "The decrease in stress with time in a viscoelatic material held at constant strain or deformation.", "note": "", "link": "http://en.wikipedia.org/wiki/Stress_relaxation"}, "a1166": {"id": "a1166", "title": "Sublimation", "description": "The change of the physical state of aggregation (or simply state) of matter directly from solid phase to gaseous phase without passing through an intermediate liquid phase.", "note": "", "link": "http://en.wikipedia.org/wiki/Sublimation_(phase_transition)"}, "a1171": {"id": "a1171", "title": "Super Black", "description": "A surface treatment (based upon chemically etching a nickel-phosphorus alloy) that reflects much less light than the darkest conventional matte black paints.Conventional black paint reflects about 2.5% of the incident light. Super black absorbs approximately 99.6% of light at normal incidence. At other angles of incidence, super black is even more effective.", "note": "", "link": "http://en.wikipedia.org/wiki/Super_black"}, "a1173": {"id": "a1173", "title": "Superconductivity", "description": "An electrical resistance of exactly zero which occurs in certain materials below a characteristic temperature. Like ferromagnetism and atomic spectral lines, superconductivity is a quantum mechanical phenomenon. It is also characterized by a phenomenon called the Meissner effect, the ejection of any sufficiently weak magnetic field from the interior of the superconductor as it transitions into the superconducting state.", "note": "", "link": "http://en.wikipedia.org/wiki/Superconductivity"}, "a1208": {"id": "a1208", "title": "Tension", "description": "The pulling force exerted by a string, cable, chain, or similar object on another object. It is the opposite of compression.", "note": "", "link": "http://en.wikipedia.org/wiki/Tension_(physics)"}, "a1210": {"id": "a1210", "title": "Terminal Velocity", "description": "A free falling object achieves its terminal velocity when the downward force of gravity equals the upward force of drag. This causes the net force on the object to be zero, resulting in an acceleration of zero. Mathematically an object asymptotically approaches and can never reach its terminal velocity.", "note": "", "link": "http://en.wikipedia.org/wiki/Terminal_velocity"}, "a1216": {"id": "a1216", "title": "Thermal Energy Storage", "description": "A number of technologies that store energy in a thermal reservoir for later reuse.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermal_energy_storage"}, "a1217": {"id": "a1217", "title": "Thermal Expansion", "description": "The tendency of matter to cha
