 right angles within one another, with the distance between the centers of the disks equal to their radius. The only known object other than some members of the sphericon family that develops its entire surface while rolling.", "note": "An oloid develops a tumbling motion when rolled along a plane. This may be exploited to compress granular solids placed on the plane..", "link": "http://en.wikipedia.org/wiki/Oloid"}, "a874": {"id": "a874", "title": "Pascal's Law", "description": "(or the Principle of transmission of fluid-pressure) Pressure exerted anywhere in a confined incompressible fluid is transmitted equally in all directions throughout the fluid such that the pressure ratio (initial difference) remains same.", "note": "In the case of a divided solid dispersed within a liquid.", "link": "http://en.wikipedia.org/wiki/Pascal%27s_law"}, "a884": {"id": "a884", "title": "Peristalsis", "description": "A radially symmetrical contraction and relaxation of muscles which propagates in a wave down the muscular tube, in an anterograde fashion.", "note": "", "link": "http://en.wikipedia.org/wiki/Peristalsis"}, "a930": {"id": "a930", "title": "Piezomagnetism", "description": "A phenomenon observed in some antiferromagnetic crystals. It is characterised by a linear coupling between the system's magnetic polarisation and mechanical strain. In a piezomagnetic, one may induce a spontaneous magnetic moment by applying physical stress, or a physical deformation by applying a magnetic field. Piezomagnetism differs from the related property of magnetostriction.", "note": "", "link": "http://en.wikipedia.org/wiki/Piezomagnetism"}, "a1060": {"id": "a1060", "title": "Screw", "description": "A helical inclined plane. A screw can convert a rotational force (torque) to a linear force and vice versa.", "note": "", "link": "http://en.wikipedia.org/wiki/Screw_(simple_machine)"}, "a1134": {"id": "a1134", "title": "Sphericon", "description": "A three-dimensional solid with one side and two edges. May be constructed from a bicone (a double cone) with an apex of 90 degrees, by splitting the bicone along a plane through both apexes, rotating one of the two halves by 90 degrees, and reattaching the two halves. When rolled on a flat surface, every point on the surface of a sphericon comes in contact with the surface it is rolling on.", "note": "", "link": "http://en.wikipedia.org/wiki/Sphericon"}, "a1170": {"id": "a1170", "title": "Sun and Planet Gear", "description": "A method of converting between reciprocal motion and rotary motion", "note": "", "link": "http://en.wikipedia.org/wiki/Sun_and_planet_gear"}, "a1192": {"id": "a1192", "title": "Surface of Constant Width", "description": "A convex form whose width, measured by the distance between two opposite parallel planes touching its boundary, is the same regardless of the direction of those two parallel planes. The three-dimensional analogue of a curve of constant width, a two-dimensional shape with a constant distance between pairs of parallel tangent lines. A sphere is obviously a surface of constant width, but there are others, such as Meissner Bodies.", "note": "", "link": "http://en.wikipedia.org/wiki/Surface_of_constant_width"}, "a1213": {"id": "a1213", "title": "Tessellation", "description": "A tessellation or tiling of the plane is a collection of plane figures that fills the plane with no overlaps and no gaps.", "note": "", "link": "http://en.wikipedia.org/wiki/Tessellation"}, "a143": {"id": "a143", "title": "Brillouin Scattering", "description": "Occurs when light in a medium (such as air, water or a crystal) interacts with time dependent optical density variations and changes its energy (frequency) and path.", "note": "", "link": "http://en.wikipedia.org/wiki/Brillouin_scattering"}, "a303": {"id": "a303", "title": "Dielectric", "description": "An electrical insulator that can be polarized by an applied electric field.Can be used for the storage and dissipation of electric and magnetic energy.", "note": "", "link": "https://en.wikipedia.org/wiki/Dielectric"}, "a439": {"id": "a439", "title": "Fabry-Perot Interferometer", "description": "A system consisting of two parallel reflecting surfaces resulting in interference between the multiple reflections of light between the two reflecting surfaces. Also known as an Etalon.", "note": "", "link": "http://en.wikipedia.org/wiki/Fabry-P%C3%A9rot_interferometer"}, "a834": {"id": "a834", "title": "Newton's Rings", "description": "An interference pattern caused by the reflection of light between two surfaces - a spherical surface and an adjacent flat surface. When viewed with monochromatic light it appears as a series of concentric, alternating light and dark rings centered at the point of contact between the two surfaces. When viewed with white light, it forms a concentric ring pattern of rainbow colors because the different wavelengths of light interfere at different thicknesses of the air layer between the surfaces.", "note": "", "link": "http://en.wikipedia.org/wiki/Newton%27s_rings"}, "a1026": {"id": "a1026", "title": "Resonant-Macrosonic Synthesis", "description": "A technique by which extremely energetic standing sound waves resonating in specially shaped closed cavities can be produced.", "note": "", "link": "http://www.aip.org/png/html/macroson.htm"}, "a1063": {"id": "a1063", "title": "Second Harmonic Generation", "description": "(or frequency doubling) A nonlinear optical process, in which photons interacting with a nonlinear material are effectively combined to form new photons with twice the energy, and therefore twice the frequency and half the wavelength of the initial photons.", "note": "", "link": "http://en.wikipedia.org/wiki/Second-harmonic_generation"}, "a1115": {"id": "a1115", "title": "Soliton", "description": "A self-reinforcing solitary wave (a wave packet or pulse) that maintains its shape while it travels at constant speed. Solitons are caused by a cancellation of nonlinear and dispersive effects in the medium. (The term 'dispersive effects' refers to a property of certain systems where the speed of the waves varies according to frequency.)", "note": "", "link": "http://en.wikipedia.org/wiki/Soliton"}, "a135": {"id": "a135", "title": "Boyle's Law", "description": "(also known as the the Boyle-Mariotte law). At constant temperature, the absolute pressure and the volume of a gas are inversely proportional. The law can also be stated in a slightly different manner: that the product of absolute pressure and volume is always constant.", "note": "", "link": "http://en.wikipedia.org/wiki/Boyle%27s_law"}, "a384": {"id": "a384", "title": "Electromechanical Film", "description": "A thin membrane whose thickness is related to an electric voltage. It can be used as a pressure sensor, microphone, or a speaker. It can also convert electrical energy to vibration, functioning as an actuator.", "note": "", "link": "http://en.wikipedia.org/wiki/Electromechanical_film"}, "a470": {"id": "a470", "title": "Fluid Hammer", "description": "A pressure surge or wave resulting when a fluid in motion is forced to stop or change direction suddenly (Momentum Change). Water hammer commonly occurs when a valve is closed suddenly at an end of a pipeline system, and a pressure wave propagates in the pipe.", "note": "", "link": "http://en.wikipedia.org/wiki/Water_hammer"}, "a542": {"id": "a542", "title": "Ground Effect", "description": "Aircraft may be affected by a number of ground effects, or aerodynamic effects due to a flying body's proximity to the ground.", "note": "", "link": "http://en.wikipedia.org/wiki/Ground_effect_(aircraft)"}, "a543": {"id": "a543", "title": "Guided Rotor Compressor", "description": "A positive displacement rotary gas compressor. The compression volume is defined by the trochoidally rotating rotor mounted on an eccentric drive shaft.", "note": "", "link": "http://en.wikipedia.org/wiki/Guided_rotor_compressor"}, "a585": {"id": "a585", "title": "Hydraulic Press", "description": "A hydraulic mechanism for applying a large lifting or compressive force. It is the hydraulic equivalent of a mechanical lever.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydraulic_press"}, "a587": {"id": "a587", "title": "Hydride Compressor", "description": "A hydrogen compressor based on metal hydrides with absorption of hydrogen at low pressure and desorption of hydrogen at high pressure by raising the temperature with an external heat source like a heated waterbed or electric coil.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydride_compressor"}, "a751": {"id": "a751", "title": "Magnus Effect", "description": "The phenomenon whereby a spinning object flying in a fluid creates a whirlpool of fluid around itself, and experiences a force perpendicular to the line of motion and away from the direction of spin. The overall behaviour is similar to that around an aerofoil with a circulation which is generated by the mechanical rotation, rather than by aerofoil action.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnus_effect"}, "a844": {"id": "a844", "title": "Oblique Shock Wave", "description": "A shock wave inclined with respect to the incident upstream flow direction. Occurs when a supersonic flow encounters a corner that effectively turns the flow into itself and compresses. Can be made by placing a wedge into supersonic, compressible flow. Consists of a very thin region across which nearly discontinuous changes in the thermodynamic properties of a gas occur.", "note": "", "link": "http://en.wikipedia.org/wiki/Oblique_shock"}, "a860": {"id": "a860", "title": "Osmotic Pressure", "description": "Osmotic pressure is the pressure applied by a solution to prevent the inward flow of water across a semipermeable membrane.", "note": "", "link": "http://en.wikipedia.org/wiki/Osmotic_pressure"}, "a934": {"id": "a934", "title": "Pitot Tube", "description": "A pressure measurement instrument used to measure fluid flow velocity. Consists of a tube pointing directly into the fluid flow.", "note": "", "link": "http://en.wikipedia.org/wiki/Pitot_tube"}, "a1198": {"id": "a1198", "title": "Swashplate", "description": "A device used in mechanical engineering to translate the motion of a rotating shaft into reciprocating motion, or to translate a reciprocating motion into a rotating one to replace the crankshaft in engine designs.", "note": "", "link": "http://en.wikipedia.org/wiki/Swashplate"}, "a1211": {"id": "a1211", "title": "Tesla Turbine", "description": "(or boundary layer turbine, cohesion-type turbine or Prandtl layer turbine) A bladeless centrifugal flow turbine expander that uses the boundary layer effect and not a fluid impinging upon the blades as in a conventional turbine.  Consists of a set of smooth disks, with nozzles applying a moving gas to the edge of the disk. The gases drag on the disk by viscosity and adhesion of the surface layer of the gas. As the gas slows and adds energy to the disks, it spirals in to the center exhaust. Since the rotor has no projections, it is very sturdy.", "note": "Using the turbine as a pump.", "link": "http://en.wikipedia.org/wiki/Tesla_turbine"}, "a1270": {"id": "a1270", "title": "Trompe", "description": "A water-powered gas compressor. A vertical pipe or shaft goes down to a separation chamber, a pipe coming away from that chamber allows the water to exit at a lower level, and another pipe coming from the chamber allows the compressed air to exit as needed. The compressed air is both cool and dry.", "note": "", "link": "http://en.wikipedia.org/wiki/Trompe"}, "a1311": {"id": "a1311", "title": "Voitenko Compressor", "description": "A shaped charge adapted from its original purpose of piercing thick steel armour to the task of accelerating shock waves. It slightly resembles a wind tunnel.", "note": "", "link": "http://en.wikipedia.org/wiki/Voitenko_compressor"}, "a1320": {"id": "a1320", "title": "Wave Power", "description": "The transport of energy by ocean surface waves, and the capture of that energy to do useful work \u0097 for example for electricity generation, water desalination, or the pumping of water (into reservoirs).", "note": "", "link": "http://en.wikipedia.org/wiki/Wave_power"}, "a392": {"id": "a392", "title": "Electro-Osmotic Flow", "description": "The motion of liquid induced by an applied potential across a capillary tube or microchannel. Electroosmotic flow is an essential component in chemical separation techniques, notably capillary electrophoresis. Electroosmotic flow can occur in natural unfiltered water, as well as buffered solutions.", "note": "", "link": "http://en.wikipedia.org/wiki/Electroosmotic_flow"}, "a393": {"id": "a393", "title": "Electroosmotic Pump", "description": "(or EO pump) Used for removing liquid flooding water from channels and gas diffusion layers and direct hydration of the proton exchange membrane in the membrane electrode assembly (MEA) of the proton exchange membrane fuel cells. Fabricated from silica nanospheres or hydrophilic porous glass, the pumping mechanism is generated by an external electric field applied on an electric double layer", "note": "", "link": "http://en.wikipedia.org/wiki/Electroosmotic_pump"}, "a67": {"id": "a67", "title": "Annealing", "description": "(metallurgy and materials science) A heat treatment wherein a material is altered, causing changes in its properties such as strength and hardness. It is a process that produces conditions by heating and maintaining a suitable temperature, and then cooling. Annealing is used to induce ductility, relieve internal stresses, refine the structure and improve cold working properties.", "note": "For example, by changing the properties of a material to make it more easily compressed.", "link": "http://en.wikipedia.org/wiki/Annealing_(metallurgy)"}, "a76": {"id": "a76", "title": "Arc Evaporation", "description": "A high current, low voltage electric arc on the surface of a cathode gives rise to a small highly energetic emitting area (a cathode spot) at which the high temperature results in a high velocity  jet of vapourised cathode material, leaving a crater. The cathode spot is only active for a short period of time, then it self-extinguishes and re-ignites in a new area close to the previous crater causing apparent motion of the arc.", "note": "", "link": "http://www.pvd-coatings.co.uk/theory-of-pvd-coatings-arc-evaporation.htm"}, "a86": {"id": "a86", "title": "Autofrettage", "description": "A metal fabrication technique in which a pressure vessel is subjected to enormous pressure causing internal portions of the part to yield and resulting in internal compressive residual stresses. The goal of autofrettage is to increase durability of the final product. The technique is commonly used in manufacturing high-pressure pump cylinders, battleship and tank cannon barrels and fuel injection systems for diesel engines.", "note": "", "link": "http://en.wikipedia.org/wiki/Autofrettage"}, "a124": {"id": "a124", "title": "Block and Tackle", "description": "A system of two or more pulleys with a rope or cable threaded between them, usually used to lift or pull heavy loads.", "note": "", "link": "http://en.wikipedia.org/wiki/Block_and_tackle"}, "a255": {"id": "a255", "title": "Creep", "description": "The tendency of a solid material to slowly move or deform permanently under the influence of stresses. A result of long term exposure to levels of stress that are below the yield strength of the material. Creep is more severe in materials that are subjected to heat for long periods, and near the melting point. Creep always increases with temperature. The rate of deformation is a function of the material properties, exposure time, exposure temperature and the applied structural load.", "note": "", "link": "http://en.wikipedia.org/wiki/Creep_(deformation)"}, "a511": {"id": "a511", "title": "Galvanometer", "description": "An analog electromechanical transducer that produces a rotary deflection, through a limited arc, in response to electric current flowing through its coil.", "note": "", "link": "http://en.wikipedia.org/wiki/Galvanometer"}, "a693": {"id": "a693", "title": "Lewis", "description": "A type of lifting device used to lift large stones from above. It is inserted into a specially prepared hole or 'seating' in the top of a stone, directly above its centre of mass. It works by applying principles of the lever and utilises the weight of the stone to act on the long lever-arms which in turn results in a very high reaction force and friction where the short lever-arms make contact with the stone inside the hole thereby preventing slipping.", "note": "", "link": "http://en.wikipedia.org/wiki/Lewis_(lifting_appliance)"}, "Nesting": {"id": "", "title": "Nesting", "description": "An arrangement of mechanical components such that one or more components is located within, or moves through a cavity in, another. The telescopic aerial is a common example.", "note": "", "link": ""}, "a1341": {"id": "a1341", "title": "Worm Drive", "description": "A gear arrangement in which a worm (which is a gear in the form of a screw) meshes with a worm gear (which is similar in appearance to a spur gear). Like other gear arrangements, a worm drive can reduce rotational speed or allow higher torque to be transmitted.", "note": "", "link": "http://en.wikipedia.org/wiki/Worm_drive"}, "a345": {"id": "a345", "title": "Ekman layer", "description": "The layer in a fluid where there is a force balance between pressure gradient force, Coriolis force and turbulent drag.  In addition to enforcing the zero velocity condition at the wall, these Ekman layers can also control long-range properties of the flow. A classical illustration is given by the everyday experience of how a cup of tea returns to rest after stirring.", "note": "", "link": "http://en.wikipedia.org/wiki/Ekman_layer"}, "a1054": {"id": "a1054", "title": "Saltation (geology)", "description": "A specific type of particle transport by fluids such as wind, or the denser fluid water. It occurs when loose material is removed from a bed and carried by the fluid, before being transported back to the surface. Examples include pebble transport by rivers, sand drift over desert surfaces, soil blowing over fields, or even snow drift over smooth surfaces such as those in the Arctic or Canadian Prairies.", "note": "", "link": "http://en.wikipedia.org/wiki/Saltation_(geology)"}, "a1130": {"id": "a1130", "title": "Spark Plasma Sintering", "description": "(or Field Assisted Sintering Technique (FAST) or Pulsed Electric Current Sintering (PECS)). The main characteristic of the Spark Plasma Sintering (SPS) is that the pulsed DC current directly passes through the graphite die, as well as the powder compact, in case of conductive samples. Therefore, the heat is generated internally which facilitates a very high heating or cooling rate (up to 1000k/min), hence the sintering process generally is very fast (within a few minutes).", "note": "", "link": "http://en.wikipedia.org/wiki/Spark_plasma_sintering"}, "a723": {"id": "a723", "title": "Magnetic Amplifier", "description": "An electromagnetic device for amplifying electrical signals. It makes use of magnetic saturation of the core, a non-linear property of a certain class of transformer cores. It is a static device with no moving parts, no wear-out mechanism and has a good tolerance to mechanical shock and vibration. It requires no warm-up time.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_amplifier"}, "a1029": {"id": "a1029", "title": "Reuleaux Triangle", "description": "A constant width curve based on an equilateral triangle. All points on a side are equidistant from the opposite vertex.", "note": "", "link": "http://en.wikipedia.org/wiki/Reuleaux_triangle"}, "a729": {"id": "a729", "title": "Magnetic Pulse Welding", "description": "A welding process that uses magnetic forces to drive two workpieces together and weld them together. The welding mechanism is most similar to that in explosion welding.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_pulse_welding"}, "a563": {"id": "a563", "title": "Heterodyne", "description": "In radio and signal processing, heterodyning is the generation of new frequencies by mixing, or multiplying, two oscillating waveforms. It is useful for modulation and demodulation of signals, or placing information of interest into a useful frequency range.", "note": "", "link": "http://en.wikipedia.org/wiki/Heterodyne"}, "a30": {"id": "a30", "title": "Adiabatic Cooling", "description": "Adiabatic cooling occurs when the pressure of a substance is decreased as it does work on its surroundings. Adiabatic cooling does not have to involve a fluid.", "note": "", "link": "http://en.wikipedia.org/wiki/Adiabatic_process#Adiabatic_heating_and_cooling"}, "a557": {"id": "a557", "title": "Heat Pipe", "description": "A heat pipe is a heat transfer mechanism that can transport heat with a very small difference in temperature between the hotter and colder interfaces. Inside a heat pipe, at the hot interface a fluid turns to vapour and the gas naturally flows and condenses on the cold interface. The liquid falls or is moved by capillary action back to the hot interface to evaporate again and repeat the cycle.", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_Pipe"}, "a644": {"id": "a644", "title": "Joule-Thomson Effect", "description": "The temperature change of a gas resulting from expansion without production of work or the transfer of heat. For example, when a gas or liquid is forced through a valve or porous plug while kept insulated.", "note": "", "link": "http://en.wikipedia.org/wiki/Joule%E2%80%93Thomson_effect"}, "a709": {"id": "a709", "title": "Loop Heat Pipe", "description": "A two-phase heat transfer device that uses capillary action to remove heat from a source and passively move it to a condenser or radiator. Similar to heat pipe but has advantage of being able provide reliable operation over long distance and ability to operate against gravity. Designs range from powerful & large to miniature (micro loop heat pipe). Widely used in both ground based as well as space applications.", "note": "", "link": "http://en.wikipedia.org/wiki/Loop_heat_pipe"}, "a1096": {"id": "a1096", "title": "Siemens Cycle", "description": "A technique used to cool or liquify gases. A gas is compressed, leading to an increase in its temperature (by Gay-Lussac's law relating pressure and temperature). The compressed gas is then cooled by a heat exchanger, then the cool, compressed gas is allowed to decompress, further cooling it (again by Gay-Lussac's law). This results in a gas (or liquified gas) that is colder than the original and at the same pressure.", "note": "", "link": "http://en.wikipedia.org/wiki/Siemens_cycle"}, "a1293": {"id": "a1293", "title": "Vapour Cone", "description": "(also referred to as shock collar, or shock egg) The creation of a visible condensation cloud caused by a sudden drop in air pressure. Occurs under the right atmospheric conditions - for example by an aircraft traveling at transonic speeds.", "note": "", "link": "https://en.wikipedia.org/wiki/Vapor_cone"}, "a21": {"id": "a21", "title": "Acoustic Radiation Pressure", "description": "A force on a particle suspended in the field of a sound wave arising from the scattering of the acoustic waves on the particle.", "note": "", "link": "http://en.wikipedia.org/wiki/Acoustic_tweezers#Acoustic_radiation_force"}, "a270": {"id": "a270", "title": "Cyanoacrylate", "description": "The generic name for cyanoacrylate based fast-acting adhesives such as methyl 2-cyanoacrylate, ethyl-2-cyanoacrylate (commonly sold under trade names like SuperGlue), and n-butyl cyanoacrylate (used in veterinary and skin glues).", "note": "", "link": "http://en.wikipedia.org/wiki/Cyanoacrylate"}, "a313": {"id": "a313", "title": "Diffusion Barrier", "description": "A thin layer (usually micrometres thick) of metal usually placed between two other metals. It is done to act as a \u0093barrier\u0094 to protect either one of the metals from corrupting the other.", "note": "", "link": "http://en.wikipedia.org/wiki/Diffusion_barrier"}, "a340": {"id": "a340", "title": "Eddy Current Damping", "description": "The use of eddy currents to provide a damping effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Eddy_current"}, "a640": {"id": "a640", "title": "Johnsen-Rahbek Effect", "description": "An attractive force that occurs when an electric potential is applied across the boundary between a metallic surface and the surface of a semiconducting material. The magnitude of the force depends on the voltage and the specific materials involved.", "note": "", "link": "http://en.wikipedia.org/wiki/Johnsen%E2%80%93Rahbek_effect"}, "a670": {"id": "a670", "title": "Lamination", "description": "A laminate is a material that can be constructed by uniting two or more layers of material together. The process of creating a laminate is lamination", "note": "", "link": "http://en.wikipedia.org/wiki/Lamination"}, "a853": {"id": "a853", "title": "Optical Tweezers", "description": "A scientific instrument that uses a focused laser beam to provide an attractive or repulsive force (typically on the order of piconewtons), depending on the refractive index mismatch to physically hold and move microscopic dielectric objects. Optical tweezers have been particularly successful in studying a variety of biological systems.", "note": "", "link": "http://en.wikipedia.org/wiki/Optical_tweezers"}, "a1111": {"id": "a1111", "title": "Soldering", "description": "A process in which two or more metal items are joined together by melting and flowing a filler metal into the joint, the filler metal having a relatively low melting point.", "note": "", "link": "http://en.wikipedia.org/wiki/Soldering"}, "a1329": {"id": "a1329", "title": "Welding", "description": "A process for joining materials, usually metals or thermoplastics, typically by melting the workpieces and adding a filler material to form a pool of molten material (the weld pool) that cools to become a strong joint, with pressure sometimes used in conjunction with heat, or by itself, to produce the weld (in contrast with soldering and brazing, which involve melting a lower-melting-point material between the workpieces, without melting the workpieces.", "note": "", "link": "http://en.wikipedia.org/wiki/Welding"}, "a545": {"id": "a545", "title": "Gyroscope", "description": "A device for measuring or maintaining orientation, based on the principles of angular momentum. The device is a spinning wheel or disk whose axle is free to take any orientation. This orientation changes much less in response to a given external torque than it would without the large angular momentum associated with the gyroscope's high rate of spin.", "note": "", "link": "http://en.wikipedia.org/wiki/Gyroscope"}, "a727": {"id": "a727", "title": "Magnetic Hysteresis", "description": "Hysteresis phenomena occur in magnetic and ferromagnetic materials, as well as in the elastic, electric, and magnetic behavior of materials, in which a lag occurs between the application and the removal of a force or field and its subsequent effect.\nMagnetic field hysteresis loss causes heating. This effect is used in induction cooking, where an alternating magnetic field causes a ferrite container to heat directly rather than being heated by an external heat-source.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_hysteresis#Magnetic_hysteresis"}, "a983": {"id": "a983", "title": "Purkinje effect", "description": "The tendency for the peak luminance sensitivity of the human eye to shift toward the blue end of the color spectrum at low illumination levels.This effect introduces a difference in color contrast under different levels of illumination.", "note": "", "link": "http://en.wikipedia.org/wiki/Purkinje_effect"}, "a1024": {"id": "a1024", "title": "Relay", "description": "An electrical switch that opens and closes under the control of another electrical circuit. In the original form, the switch is operated by an electromagnet to open or close one or many sets of contacts. Because a relay is able to control an output circuit of higher power than the input circuit, it can be considered to be, in a broad sense, a form of an electrical amplifier.", "note": "", "link": "http://en.wikipedia.org/wiki/Relay"}, "a69": {"id": "a69", "title": "Antibubble", "description": "A droplet of liquid surrounded by a thin film of gas, as opposed to a gas bubble, which is a sphere of gas surrounded by a thin film of liquid. Antibubbles are formed when liquid drops or flows turbulently into the same or another liquid. They can either skim across the surface of a liquid such as water (e.g. water globules), or be completely submerged in the liquid to which they are directed.", "note": "", "link": "http://en.wikipedia.org/wiki/Antibubble"}, "a528": {"id": "a528", "title": "Glassy Carbon", "description": "(also called vitreous carbon) A a non-graphitising carbon which combines glassy and ceramic properties with those of graphite. The most important properties are high temperature resistance, extreme resistance to chemical attack and impermeability to gases and liquids. Glassy carbon is widely used as an electrode material in electrochemistry, as well as for high temperature crucibles and as a component of some prosthetic devices.", "note": "", "link": "http://en.wikipedia.org/wiki/Glassy_carbon"}, "a873": {"id": "a873", "title": "Parylene", "description": "Parylene is the tradename for a variety of chemical vapour deposited poly(p-xylylene) polymers used as moisture barriers and electrical insulators. Among them, Parylene C is the most popular due to its combination of barrier properties, cost, and other manufacturing advantages.", "note": "", "link": "http://en.wikipedia.org/wiki/Parylene"}, "a951": {"id": "a951", "title": "Polytetrafluoroethylene (PTFE)", "description": "A synthetic fluoropolymer. As fluorocarbons are not as susceptible to van der Waals force (due to the high electronegativity of fluorine)  water and water-containing substances, and oil and oil-containing substances, like most foods do not wet PTFE. PTFE is very non-reactive.  PTFE's coefficient of friction is 0.1 or less, which is the second lowest of any known solid material.", "note": "Exploiting the low reactivity of PTFE", "link": "http://en.wikipedia.org/wiki/Polytetrafluoroethylene"}, "a1183": {"id": "a1183", "title": "Superheating", "description": "(sometimes referred to as boiling retardation, or boiling delay) The phenomenon in which a liquid is heated to a temperature higher than its boiling point, without boiling. Superheating is achieved by heating a homogeneous substance in a clean container, free of nucleation sites, while taking care not to disturb the liquid.", "note": "", "link": "http://en.wikipedia.org/wiki/Superheating"}, "a1205": {"id": "a1205", "title": "Tensarity", "description": "A foundational structure using inflated airbeams and attached stiffeners or cables that gains mechanical advantages for low mass", "note": "", "link": "http://en.wikipedia.org/wiki/Tensairity"}, "a1212": {"id": "a1212", "title": "Tesla Valvular Conduit", "description": "A one-way valve with no moving parts, using the geometry of the fluid path to redirect the flow of the fluid to oppose its own motion in one direction, but offering little resistance in the other.", "note": "", "link": "http://en.wikipedia.org/wiki/Tesla_valve"}, "a413": {"id": "a413", "title": "Emulsion", "description": "A a mixture of two or more immiscible (unblendable) liquids. One liquid (the dispersed phase) is dispersed in the other (the continuous phase).", "note": "", "link": "http://en.wikipedia.org/wiki/Emulsion"}, "a97": {"id": "a97", "title": "Ball Bearing", "description": "An annular bearing comprising an array of balls held within a track.", "note": "", "link": "http://en.wikipedia.org/wiki/Ball_bearing"}, "a192": {"id": "a192", "title": "Chain", "description": "A chain is a series of connected links.", "note": "", "link": "http://en.wikipedia.org/wiki/Chain"}, "a250": {"id": "a250", "title": "Coulomb Damping", "description": "A type of constant mechanical damping in which energy is absorbed via sliding friction. Friction generated by the relative motion of the two surfaces that press against each other is a source of energy dissipation. In general, damping is the dissipation of energy from a vibrating system where the kinetic energy is converted into heat by the friction. Coulomb damping is a common damping mechanism that occurs in machinery.", "note": "", "link": "http://en.wikipedia.org/wiki/Coulomb_damping"}, "a369": {"id": "a369", "title": "Electrodynamic Bearing", "description": "A system providing contactless electrodynamic suspension of rotating shafts based on the induction of eddy currents in a rotating conductor. When an electrically conducting material is moving in a magnetic field, a current will be generated in the material that counters the change in the magnetic field (known as Lenz' Law). This generates a current that will result in a magnetic field that is oriented opposite to the one from the magnet. The electrically conducting material is thus acting as a magnetic mirror.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrodynamic_bearing"}, "a504": {"id": "a504", "title": "Friction Welding", "description": "A class of solid-state welding processes that generates heat through mechanical friction between a moving workpiece and a stationary component, with the addition of a lateral force called 'upset' to plastically displace and fuse the materials. Technically, because no melt occurs, friction welding is not actually a welding process in the traditional sense, but a forging technique.", "note": "", "link": "http://en.wikipedia.org/wiki/Friction_welding"}, "a517": {"id": "a517", "title": "Gecko-Foot Bristle Array", "description": "The toes of the gecko adhere to a wide variety of surfaces, without the use of liquids or surface tension. The attractive forces that hold geckos to surfaces are van der Waals interactions between the finely divided spatula tipped setae (bristle array) and the surfaces themselves.", "note": "", "link": "http://en.wikipedia.org/wiki/Gecko#Gecko_toes:_setae_and_van_der_Waals_forces"}, "Hook": {"id": "", "title": "Hook", "description": "A mechanical device that is curved or bent to suspend or hold or pull something.", "note": "", "link": ""}, "a638": {"id": "a638", "title": "Jet Damping", "description": "(or Thrust Damping) is the effect of rocket exhaust removing energy from the transverse angular motion of a rocket. If a rocket has pitch or yaw motion then the exhaust must be accelerated laterally as it flows down the exhaust tube and nozzle. Once the exhaust leaves the nozzle this lateral momentum is lost to the vehicle and thus serves to damping the lateral oscillations.", "note": "", "link": "http://en.wikipedia.org/wiki/Jet_damping"}, "a721": {"id": "a721", "title": "Maglev", "description": "(magnetic levitation)  A system of transportation that suspends, guides and (usually) propels vehicles, predominantly trains, using magnetic forces.", "note": "", "link": "http://en.wikipedia.org/wiki/Maglev_(transport)"}, "a758": {"id": "a758", "title": "Mechanical Fastener", "description": "A device that mechanically joins or affixes two or more objects together.", "note": "", "link": "http://en.wikipedia.org/wiki/Fastener"}, "a768": {"id": "a768", "title": "Memory Foam", "description": "(visco-elastic polyurethane foam). Made from polyurethane with additional chemicals that increase its viscosity level, thereby increasing its density. Depending on the chemicals used and its overall density, it is firmer in cool temperatures and softer when warm. Higher density memory foam reacts to body heat which allows it to mould itself to the shape of a warm body within a few minutes. A lower density memory foam is pressure-sensitive and will mould more quickly to the shape of the body.", "note": "", "link": "http://en.wikipedia.org/wiki/Memory_foam"}, "Pin": {"id": "", "title": "Pin", "description": "A simple mechncial device for holding objects together.", "note": "", "link": ""}, "a1140": {"id": "a1140", "title": "Spin-stabilized Magnetic Levitation", "description": "A phenomenon of magnetic levitation whereby a magnet or array of magnets is levitated via magnetic forces above another magnet or array of magnets, and stabilised by gyroscopic effect due to a spin that is neither too fast, nor too slow.", "note": "", "link": "https://en.wikipedia.org/wiki/Spin-stabilized_magnetic_levitation"}, "a1154": {"id": "a1154", "title": "Stewart Platform", "description": "A type of parallel robot that incorporates six prismatic actuators, commonly hydraulic jacks. These actuators are mounted in pairs to the mechanism's base, crossing over to three mounting points on a top plate. Devices placed on the top plate can be moved in the six degrees of freedom in which it is possible for a freely-suspended body to move.", "note": "", "link": "http://en.wikipedia.org/wiki/Stewart_platform"}, "a1159": {"id": "a1159", "title": "Stockbridge Damper", "description": "A tuned mass damper used to suppress wind-induced vibrations on taut cables, such as overhead power lines. The dumbbell-shaped device consists of two masses at the ends of a short length of cable or flexible rod, which is clamped at its middle to the main cable. The damper is designed to dissipate the energy of oscillations in the main cable to an acceptable level.", "note": "", "link": "http://en.wikipedia.org/wiki/Stockbridge_damper"}, "a1175": {"id": "a1175", "title": "Supercooling", "description": "(also known as undercooling) The process of lowering the temperature of a liquid or a gas below its freezing point, without it becoming a solid. A liquid below its standard freezing point will crystallize in the presence of a seed crystal or nucleus around which a crystal structure can form. Without any such nucleus, the liquid phase can be maintained all the way down to the temperature at which crystal homogeneous nucleation occurs.", "note": "", "link": "http://en.wikipedia.org/wiki/Supercooling"}, "a1206": {"id": "a1206", "title": "Tensegrity", "description": "A structure formed by a finite network of compression, or rigid elements interconnected through tensile, or elastic elements which give the structure its overall integrity", "note": "", "link": "http://en.wikipedia.org/wiki/Tensegrity"}, "a1296": {"id": "a1296", "title": "Velcro", "description": "A brand name of fabric hook-and-loop fasteners. It consists of two layers: a 'hook' side, which is a piece of fabric covered with tiny hooks, and a 'loop' side, which is covered with even smaller and 'hairier' loops. When the two sides are pressed together, the hooks catch in the loops and hold the pieces together. When the layers are separated, the strips make a characteristic 'ripping' sound.", "note": "", "link": "http://en.wikipedia.org/wiki/Velcro"}, "Viscous Damping": {"id": "", "title": "Viscous Damping", "description": "A damping system based upon the passage of a viscous fluid through small apperture or other restriction (such as the gap between lubrictaed parts).", "note": "", "link": ""}, "a33": {"id": "a33", "title": "Adsorption Refrigerator", "description": "A refrigerator that uses a heat source to provide the energy needed to drive the cooling system. Sometimes used where electricity is unreliable, costly, or unavailable, where noise from the compressor is problematic, or where surplus heat is available (e.g., from turbine exhausts or industrial processes, or from solar plants).", "note": "", "link": "http://en.wikipedia.org/wiki/Absorption_refrigerator"}, "a363": {"id": "a363", "title": "Electrocaloric Effect", "description": "A phenomenon in which a material shows a reversible temperature change under an applied electric field. Often considered the physical inverse of the pyroelectric effect. The effect comes from the voltage raising or lowering the entropy of the system. Analogous to the magnetocaloric effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrocaloric_effect"}, "a510": {"id": "a510", "title": "Fusible Alloy", "description": "A fusible alloy is one that is capable of being fused, as well as being liquefied by heat. Examples: Wood's metal, Field's metal, Rose metal, Galinstan, NaK.", "note": "The melting of a fusible alloy (phase change from solid to liquid) requires heat", "link": "http://en.wikipedia.org/wiki/Fusible_alloy"}, "a534": {"id": "a534", "title": "Graphene", "description": "A one-atom-thick planar sheet of sp2-bonded carbon atoms that are densely packed in a honeycomb crystal lattice. It can be visualized as an atomic-scale chicken wire made of carbon atoms and their bonds. The name comes from graphite + -ene; graphite itself consists of many graphene sheets stacked together.", "note": "Graphene has exceptionally good heat conduction properties.", "link": "http://en.wikipedia.org/wiki/Graphene"}, "a1040": {"id": "a1040", "title": "Righi-Leduc Effect", "description": "A magnetic field applied at right angles to the the direction of a temperature gradient in an electrical conductor will produce a temperature difference at right angles to the direction of both the temperature gradient and the magnetic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Righi-Leduc_effect"}, "a1064": {"id": "a1064", "title": "Second Sound", "description": "A quantum mechanical phenomenon in which heat transfer occurs by wave-like motion, rather than by the more usual mechanism of diffusion. Heat takes the place of pressure in normal sound waves. This leads to a very high thermal conductivity. It is known as 'second sound' because the wave motion of heat is similar to the propagation of sound in air.", "note": "", "link": "http://en.wikipedia.org/wiki/Second_sound"}, "a1156": {"id": "a1156", "title": "Stirling Cycle", "description": "A thermodynamic cycle that describes the general class of Stirling devices. The cycle is reversible: if supplied with mechanical power, it can function as a heat pump for heating or refrigeration cooling, or cryogenic cooling. The cycle is a closed-cycle (the working fluid is permanently contained within the thermodynamic system) regenerative (uses an internal heat exchanger) cycle with a gaseous working fluid.", "note": "", "link": "http://en.wikipedia.org/wiki/Stirling_cycle"}, "a1218": {"id": "a1218", "title": "Thermal Hall Effect", "description": "The thermal analog of the Hall effect, i.e. a thermal gradient is produced across a solid instead of an electric field. When a magnetic field is applied, an orthogonal temperature gradient develops. For conductors, a significant portion of the thermal current is carried by the electrons. In particular, the Righi-Leduc Effect describes the heat flow resulting from a perpendicular temperature gradient and vice versa, and the Maggi-Righi-Leduc effect describes changes in thermal conductivity when placing a conductor in a magnetic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermal_Hall_effect"}, "a1230": {"id": "a1230", "title": "Thermoacoustic Engine", "description": "Thermoacoustic devices which use high-amplitude sound waves to pump heat from one place to another, or use a heat difference to induce high-amplitude sound waves. Can be divided into standing wave and travelling wave devices. These two types can again be divided in two thermodynamic classes, a prime mover (or simply heat engine), and a heat pump. The prime mover creates work using heat and a heat pump creates or moves heat using work.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermoacoustic_heat_engine"}, "a1231": {"id": "a1231", "title": "Thermoacoustics", "description": "The interaction between thermodynamic and acoustic phenomena, for example the relation between pressure changes, and temperature changes. A dynamic pressure would cause a dynamic temperature and vice versa.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermoacoustics"}, "a1240": {"id": "a1240", "title": "Thermomagnetic Convection", "description": "Ferrofluids can be used to transfer heat, since heat and mass transport in such magnetic fluids can be controlled using an external magnetic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermomagnetic_convection"}, "a1247": {"id": "a1247", "title": "Thermosyphon", "description": "A method of passive heat exchange based on natural convection which circulates liquid without the necessity of a mechanical pump. Can either be open-loop, as when liquid in a holding tank is passed in one direction via a heated transfer tube mounted at the bottom of the tank to a distribution point - even one mounted above the originating tank - or it can be a vertical closed-loop circuit with return to the original vessel.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermosiphon"}, "a1227": {"id": "a1227", "title": "Thermionic Energy Conversion", "description": "The direct production of electric power from heat by thermionic electron emission", "note": "", "link": "http://en.wikipedia.org/wiki/Thermionic_converter"}, "Dufour Effect": {"id": "", "title": "Dufour Effect", "description": "The development of a temperature gradient due to diffusion. Can be thought of as inverse thermophoresis.", "note": "", "link": ""}, "a429": {"id": "a429", "title": "Ettingshausen Effect", "description": "(or Second Nernst-Ettingshausen Effect) A thermoelectric (or thermomagnetic) phenomenon that affects electric current in a conductor when a magnetic field is present, resulting in a potential difference is induced normal to both the direction of the magnetic field and the current. Alternately, a temperature gradient is induced. The inverse of the Nernst Effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Ettingshausen_effect"}, "Mechanocaloric Effect": {"id": "", "title": "Mechanocaloric Effect", "description": "An effect resulting from the fact that a temperature gradient in helium II is invariably accompanied by a pressure gradient, and conversely; examples are the fountain effect, and the heating of liquid helium left behind in a container when part of it leaks out through a small orifice.", "note": "", "link": ""}, "a971": {"id": "a971", "title": "Pseudo Stirling Cycle", "description": "(also known as the adiabatic Stirling cycle), is a thermodynamic cycle with an adiabatic working volume and isothermal heater and cooler, in contrast to the Stirling cycle with an isothermal working space.The working fluid has no bearing on the maximum thermal efficiencies of the pseudo Stirling cycle.", "note": "", "link": "http://en.wikipedia.org/wiki/Pseudo_Stirling_cycle"}, "a1006": {"id": "a1006", "title": "Ranque-Hilsch Effect", "description": "The Ranque-Hilsch vortex tube (or vortex tube), is a mechanical device that separates a compressed gas into hot and cold streams. It has no moving parts. Pressurised gas is injected tangentially into a swirl chamber and accelerates to a high rate of rotation. Due to the conical nozzle at the end of the tube, only the outer shell of the compressed gas is allowed to escape at that end. The remainder of the gas is forced to return in an inner vortex of reduced diameter within the outer vortex.", "note": "", "link": "http://en.wikipedia.org/wiki/Vortex_tube"}, "a1007": {"id": "a1007", "title": "Rarefaction", "description": "(also called rarefraction) The reduction of a medium's density, or the opposite of compression. Has a variety of causes, such as the passage of a sound wave through a gas, of the diminishing effect of the earth's gravity on the atmosphere with altitude.", "note": "", "link": "http://en.wikipedia.org/wiki/Rarefaction"}, "a1236": {"id": "a1236", "title": "Thermocouple", "description": "A junction between two different metals that produces a voltage related to a temperature difference. Thermocouples are a widely used type of temperature sensor for measurement and control and can also be used to convert heat into electricity.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermocouple"}, "a1338": {"id": "a1338", "title": "Wind Chill", "description": "The apparent temperature felt on exposed skin, which is a function of the air temperature and wind speed. The wind chill temperature (often popularly called The wind chill factor) is always lower than the air temperature, except at higher temperatures where wind chill is considered less important.", "note": "", "link": "http://en.wikipedia.org/wiki/Wind_chill"}, "a1265": {"id": "a1265", "title": "Transpiration", "description": "The loss of water vapour from parts of plants (similar to sweating), especially in leaves but also in stems, flowers and roots. Leaf surfaces are dotted with openings called, collectively, stomata. Leaf transpiration occurs through stomata, and can be thought of as a necessary 'cost' associated with the opening of the stomata to allow the diffusion of carbon dioxide gas from the air for photosynthesis. Transpiration also cools plants and enables mass flow of mineral nutrients and water from roots to shoots.", "note": "", "link": "http://en.wikipedia.org/wiki/Transpiration"}, "a213": {"id": "a213", "title": "Coatings", "description": "A covering that is applied to an object. The aim of applying coatings is to improve surface properties of a bulk material usually referred to as a substrate. One can improve amongst others appearance, adhesion, wetability, corrosion resistance, wear resistance, scratch resistance, etc.. They may be applied as liquids, gases or solids.", "note": "", "link": "http://en.wikipedia.org/wiki/Coatings"}, "a1136": {"id": "a1136", "title": "Spin Coating", "description": "A procedure used to apply uniform thin films to flat substrates. In short, an excess amount of a solution is placed on the substrate, which is then rotated at high speed in order to spread the fluid by centrifugal force.", "note": "", "link": "http://en.wikipedia.org/wiki/Spin_coating"}, "a197": {"id": "a197", "title": "Chemical Beam Epitaxy", "description": "(CBE) An important class of deposition techniques for semiconductor layer systems. This form of epitaxial growth is performed in an ultrahigh vacuum system. The reactants are in the form of molecular beams of reactive gases, typically as the hydride or a metalorganic.", "note": "", "link": "http://en.wikipedia.org/wiki/Chemical_beam_epitaxy"}, "a426": {"id": "a426", "title": "ESAVD", "description": "(Electrostatic Spray Assisted Vapour Deposition) is a technique to deposit both thin and thick layers of a coating onto various substrates. In simple terms chemical precursors are sprayed across an electrostatic field towards a heated substrate, the chemicals undergo a controlled chemical reaction and are deposited on the substrate as the required coating.", "note": "", "link": "http://en.wikipedia.org/wiki/ESAVD"}, "a215": {"id": "a215", "title": "Coherent Light", "description": "Two light waves are said to be coherent if they have a constant relative phase, which also implies that they have the same frequency.", "note": "", "link": "http://en.wikipedia.org/wiki/Coherent_light"}, "a490": {"id": "a490", "title": "Fracture Mechanics", "description": "Fracture mechanics is an important tool in improving the mechanical performance of materials and components. It applies the physics of stress and strain, in particular the theories of elasticity and plasticity, to the microscopic crystallographic defects found in real materials in order to predict the macroscopic mechanical failure of bodies.", "note": "", "link": "http://en.wikipedia.org/wiki/Fracture_mechanics"}, "a8": {"id": "a8", "title": "Absorption Spectroscopy", "description": "Spectroscopic techniques that measure the absorption of radiation as a function of frequency or wavelength, due to its interaction with a sample.", "note": "", "link": "http://en.wikipedia.org/wiki/Absorption_spectroscopy"}, "a10": {"id": "a10", "title": "Accelerometer", "description": "A device for measuring acceleration and gravity induced reaction forces.", "note": "", "link": "http://en.wikipedia.org/wiki/Accelerometer"}, "a20": {"id": "a20", "title": "Acoustic Microscopy", "description": "A microscopy technique that employs very high or ultra high frequency ultrasound. Acoustic microscopes operate non-destructively and penetrate most solid materials to make visible images of internal features, including defects such as cracks, delaminations and voids.", "note": "", "link": "https://en.wikipedia.org/wiki/Acoustic_microscopy"}, "a44": {"id": "a44", "title": "Aerophonics", "description": "The geration of sound using a column of air vibrating in a tube, typically in the case of a musical wind instrument.", "note": "", "link": "http://www.nationmaster.com/encyclopedia/Aerophonic"}, "a78": {"id": "a78", "title": "Archimedes' Principle (Buoyancy)", "description": "The upward force on an object produced by the surrounding liquid or gas in which it is fully or partially immersed, due to the pressure difference of the fluid between the top and bottom of the object. The net upward buoyancy force is equal to the magnitude of the weight of fluid displaced by the body. This force enables the object to float or at least to seem lighter.", "note": "", "link": "http://en.wikipedia.org/wiki/Buoyancy"}, "a95": {"id": "a95", "title": "Balance", "description": "An instrument or method of comparing the weight (and hence, usually the mass) of two objects.", "note": "", "link": "http://en.wikipedia.org/wiki/Weighing_scale#Balance"}, "a118": {"id": "a118", "title": "Bioluminescence", "description": "The production and emission of light by a living organism as the result of a chemical reaction", "note": "", "link": "http://en.wikipedia.org/wiki/Bioluminescence"}, "a201": {"id": "a201", "title": "Chemiluminescence", "description": "The emission of light (luminescence) with limited emission of heat as the result of a chemical reaction.", "note": "", "link": "http://en.wikipedia.org/wiki/Chemoluminescence"}, "a221": {"id": "a221", "title": "Colloid Vibration Current", "description": "An electroacoustic phenomenon that arises when ultrasound propagates through a fluid that contains ions and either solid particles or emulsion droplets.", "note": "", "link": "http://en.wikipedia.org/wiki/Colloid_vibration_current"}, "a232": {"id": "a232", "title": "Compton Scattering", "description": "The decrease in energy (increase in wavelength) of an X-ray or gamma ray photon, when it interacts with matter.", "note": "", "link": "http://en.wikipedia.org/wiki/Compton_scattering"}, "a252": {"id": "a252", "title": "Coulter Counter", "description": "An apparatus for counting and sizing particles and cells. It is used, for example, for bacteria or prokaryotic cells and air quality particle size distributions. The counter detects change in electrical conductance of a small aperture as fluid containing cells is drawn through. Cells, being non-conducting particles, alter the effective cross-section of the conductive channel.", "note": "In the case of a divided solid suspended in a fluid.", "link": "http://en.wikipedia.org/wiki/Coulter_counter"}, "a272": {"id": "a272", "title": "Cyclotron Radiation", "description": "Electromagnetic radiation emitted by moving charged particles deflected by a magnetic field. Cyclotron radiation is emitted by all charged particles travelling through magnetic fields, not just those in cyclotrons.", "note": "", "link": "http://en.wikipedia.org/wiki/Cyclotron_radiation"}, "a327": {"id": "a327", "title": "Dorn Effect", "description": "(aka Sedimentation Potential). Potential difference resulting from motion of particles through water, typically due to gravity or centrifugation. The motion disrupts equilibrium symmetry of particle's double layer, viscous flow around the particles drags ions of the diffuse layer from them causing slight displacement between surface charge & electric charge of the diffuse layer, giving the particle a dipole moment, generating electric field.", "note": "", "link": "http://en.wikipedia.org/wiki/Sedimentation_potential"}, "a352": {"id": "a352", "title": "Electric Sonic Amplitude", "description": "Occurs in colloids, emulsions and other heterogeneous fluids under the influence of an oscillating electric field. This field moves particles relative to the liquid, which generates ultrasound.", "note": "", "link": "http://en.wikipedia.org/wiki/Electric_sonic_amplitude"}, "a356": {"id": "a356", "title": "Electrical Impedance Tomography", "description": "A medical imaging technique in which an image of the conductivity or permittivity of part of the body is inferred from surface electrical measurements. Typically, conducting electrodes are attached to the skin of the subject and small alternating currents are applied to some or all of the electrodes. The resulting electrical potentials are measured, and the process may be repeated for numerous different configurations of applied current.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrical_impedance_tomography"}, "a358": {"id": "a358", "title": "Electrical Resistivity Tomography", "description": "Electrical resistivity tomography (ERT) or electrical resistivity imaging (ERI) is a geophysical technique for imaging sub-surface structures from electrical measurements made at the surface, or by electrodes in one or more boreholes. It is closely related to the medical imaging technique electrical impedance tomography (EIT), and mathematically is the same inverse problem. In contrast to medical EIT however ERT is essentially a direct current method.", "note": "", "link": "https://en.wikipedia.org/wiki/Electrical_resistivity_tomography"}, "a376": {"id": "a376", "title": "Electroluminescence", "description": "An optical phenomenon and electrical phenomenon in which a material emits light in response to an electric current passed through it, or to a strong electric field.", "note": "", "link": "http://en.wikipedia.org/wiki/Electroluminescence"}, "a389": {"id": "a389", "title": "Electron Paramagnetic Resonance", "description": "(EPR) or electron spin resonance (ESR) spectroscopy is a technique for studying chemical species that have one or more unpaired electrons, such as organic and inorganic free radicals or inorganic complexes possessing a transition metal ion. The basic physical concepts of EPR are analogous to those of nuclear magnetic resonance (NMR), but it is electron spins that are excited instead of spins of atomic nuclei", "note": "", "link": "http://en.wikipedia.org/wiki/Electron_paramagnetic_resonance#Applications"}, "a449": {"id": "a449", "title": "Feedback", "description": "A circular causal process whereby some proportion of a system's output is returned (fed back) to the input. This is often used to control the dynamic behavior of the system.", "note": "", "link": "http://en.wikipedia.org/wiki/Feedback"}, "a484": {"id": "a484", "title": "Ford Viscosity Cup", "description": "A simple gravity device that permits the timed flow of a known volume of liquid passing through an orifice located at the bottom of the cup.", "note": "The presence of a divided solid suspended in a liquid may affect the flow of the liquid.", "link": "http://en.wikipedia.org/wiki/Ford_viscosity_cup"}, "a489": {"id": "a489", "title": "Fractoluminescence", "description": "The emission of light from the fracture (rather than rubbing) of a crystal. Depending upon the atomic and molecular composition of the crystal, when the crystal fractures a charge separation can occur making one side of the fractured crystal +ve charged and the other side -ve charged. As in triboluminescence, if the charge separation results in a large enough electric potential, a discharge across the gap and through the bath gas between the interfaces can occur.", "note": "Fractolumenescence may occur as a divided solid is formed from the fracturing of a crystal.", "link": "http://en.wikipedia.org/wiki/Fractoluminescence#Fractoluminescence"}, "a550": {"id": "a550", "title": "Hall Effect", "description": "The potential difference (Hall voltage) on the opposite sides of an electrical conductor through which there is an electric current, created by a magnetic field applied perpendicularly to the current.", "note": "In the case of magnetic particles.", "link": "http://en.wikipedia.org/wiki/Hall_effect"}, "a579": {"id": "a579", "title": "Hot Chocolate Effect", "description": "The pitch heard from tapping a cup of hot liquid rises after addition of a soluble powder. May be observed by stirring chocolate powder into a mug of hot milk, tapping bottom of mug with a spoon while milk is in motion. Pitch of the taps will increase progressively. Subsequent stirring decreases the pitch. Due to the effect of bubble density on the speed of sound in the liquid. The note heard is the frequency of standing wave with fixed wavelength of liquid column height.", "note": "", "link": "http://en.wikipedia.org/wiki/Hot_chocolate_effect"}, "a633": {"id": "a633", "title": "Iridescence", "description": "(also known as goniochromism) The property of certain surfaces which appear to change colour as the angle of view changes. Iridescence is commonly seen in items such as soap bubbles, butterfly wings, and sea shells. Caused by multiple reflections from multi-layered, semi-transparent surfaces in which phase shift and interference of the reflections modulates the incident light", "note": "", "link": "http://en.wikipedia.org/wiki/Iridescence"}, "a677": {"id": "a677", "title": "Laser Doppler Velocimetry", "description": "Using the Doppler shift in a laser beam to measure the velocity in transparent or semi-transparent fluid flows, or the linear or vibratory motion of opaque, reflecting, surfaces. Particles (either naturally occurring or induced) entrained in the fluid pass through interferance fringes generated by two monochromatic laser beams. The reflected light fluctuates in intensity, the frequency of which is equivalent to the Doppler shift between the incident and scattered light, and is thus proportional to the particle velocity.", "note": "In the case of a divided solid suspended in a moving fluid.", "link": "http://en.wikipedia.org/wiki/Laser_Doppler_velocimetry"}, "a715": {"id": "a715", "title": "Luminescence", "description": "The generation of light that usually occurs at low temperatures, and is thus a form of cold body radiation. It can be caused by chemical reactions, electrical energy, subatomic motions, or stress on a crystal. This distinguishes luminescence from incandescence, which is light generated by high temperatures.", "note": "", "link": "http://en.wikipedia.org/wiki/Luminescence"}, "a740": {"id": "a740", "title": "Magnetometer", "description": "An instrument used to measure the strength and/or direction of the magnetic field.", "note": "In the case of a magnetised divided solid or by the disturbance to an ambient magnetic field by a ferromagnetic divided solid.", "link": "http://en.wikipedia.org/wiki/Magnetometer"}, "a762": {"id": "a762", "title": "Mechanoluminescence", "description": "Light emission resulting from any mechanical action on a solid. It can be produced through ultrasound, or through other means.", "note": "", "link": "http://en.wikipedia.org/wiki/Mechanoluminescence"}, "a818": {"id": "a818", "title": "Nanopore", "description": "A small pore in an electrically insulating membrane, that can be used as a single-molecule detector. A nanopore is a Coulter counter for much smaller particles. It can be a biological protein channel in a lipid bilayer or a pore in a solid-state membrane. The detection principle is based on monitoring the ionic current of an electrolyte solution passing through the nanopore as a voltage is applied across the membrane.", "note": "", "link": "http://en.wikipedia.org/wiki/Nanopore"}, "a845": {"id": "a845", "title": "Ohmmeter", "description": "An electrical instrument that measures electrical resistance.", "note": "Indirectly by its electrical resistance", "link": "https://en.wikipedia.org/wiki/Ohmmeter"}, "a872": {"id": "a872", "title": "Particle Image Velocimetry", "description": "An optical method of flow visualisation used to obtain instantaneous velocity measurements and related properties in fluids. The fluid is seeded with tracer particles which, for sufficiently small particles, are assumed to faithfully follow the flow dynamics. The fluid with entrained particles is illuminated so that particles are visible. The motion of the seeding particles is used to calculate speed and direction (the velocity field) of the flow being studied.", "note": "", "link": "http://en.wikipedia.org/wiki/Particle_image_velocimetry"}, "a897": {"id": "a897", "title": "Photoacoustic Doppler Effect", "description": "A specific kind of Doppler effect, which occurs when an intensity modulated light wave induces a photoacoustic wave on moving particles with a specific frequency. The observed frequency shift is a good indicator of the velocity of the illuminated moving particles. A potential biomedical application is measuring blood flow.", "note": "", "link": "http://en.wikipedia.org/wiki/Photoacoustic_Doppler_effect"}, "a929": {"id": "a929", "title": "Piezoluminescence", "description": "Luminescence produced by the action of pressure on certain solids", "note": "", "link": "https://en.wikipedia.org/wiki/Piezoluminescence"}, "a931": {"id": "a931", "title": "Piezoresistive Effect", "description": "The changing electrical resistivity of a semiconductor due to applied mechanical stress.", "note": "", "link": "http://en.wikipedia.org/wiki/Piezoresistive_effect"}, "a953": {"id": "a953", "title": "Porosimetry", "description": "An analytical technique used to determine various quantifiable aspects of a material's porous nature, such as pore diameter, total pore volume, surface area, and bulk and absolute densities. Involves the intrusion of a non-wetting liquid (often mercury) at high pressure into a material through the use of a porosimeter. The pore size can be determined based on the external pressure needed to force the liquid into a pore against the opposing force of the liquid's surface tension.", "note": "The presence of a divided solid may affect the porosity of a material by blocking pores.", "link": "http://en.wikipedia.org/wiki/Porosimetry"}, "a984": {"id": "a984", "title": "Pycnometer", "description": "(also called pyknometer or specific gravity bottle) A flask, usually made of glass, with a close-fitting ground glass stopper with a capillary tube through it, so that air bubbles may escape from the apparatus. This enables the density of a fluid to be measured accurately, by reference to an appropriate working fluid such as water or mercury, using an analytical balance.", "note": "Indirectly by measurement of the density of a liquid in which the divided solid is dispersed.", "link": "http://en.wikipedia.org/wiki/Pycnometer"}, "a996": {"id": "a996", "title": "Radar", "description": "An object detection system that uses electromagnetic waves to identify the range, altitude, direction, or speed of both moving and fixed objects such as aircraft, ships, motor vehicles, weather formations, and terrain.", "note": "", "link": "http://en.wikipedia.org/wiki/Radar"}, "a1001": {"id": "a1001", "title": "Radioactive Tracing", "description": "(or radioactive label) A chemical compound in which one or more atoms have been replaced by a radioisotope. By virtue of its radioactivity it can be used to explore the mechanism of chemical reactions by tracing the path that the radioisotope follows from reactants to products.", "note": "", "link": "http://en.wikipedia.org/wiki/Radioactive_tracer"}, "a1003": {"id": "a1003", "title": "Radioluminescence", "description": "Luminescence produced in a material by the bombardment of ionizing radiation such as beta particles. Examples include the tritium-excited luminous paints used on watch dials and gun sights.", "note": "", "link": "http://en.wikipedia.org/wiki/Radioluminescence"}, "a1036": {"id": "a1036", "title": "Rheometer", "description": "A laboratory device used to measure the way in which a liquid, suspension or slurry flows in response to applied forces. It is used for those fluids which cannot be defined by a single value of viscosity and therefore require more parameters to be set and measured than is the case for a viscometer. It measures the rheology of the fluid.", "note": "In the case of a divided solid dispersed in a fluid.", "link": "http://en.wikipedia.org/wiki/Rheometer"}, "a1049": {"id": "a1049", "title": "Rotational Viscometer", "description": "Rotational viscometers use the idea that the torque required to turn an object in a fluid is a function of the viscosity of that fluid. They measure the torque required to rotate a disk or bob in a fluid at a known speed.", "note": "In the case of a divided solid dispersed in a fluid.", "link": "http://en.wikipedia.org/wiki/Falling_Ball_Viscometer#Rotational_viscometers"}, "a1058": {"id": "a1058", "title": "Scintillation", "description": "A flash of light produced in a transparent material by an ionization event.", "note": "", "link": "http://en.wikipedia.org/wiki/Scintillation_(physics)"}, "a1080": {"id": "a1080", "title": "Shadowgraph", "description": "An optical method that reveals non-uniformities in transparent media like air, water, or glass. In principle, we cannot directly see a difference in temperature, a different gas, or a shock wave in the transparent air. However, these disturbances refract light rays, so they can cast shadows. The plume of hot air rising from a fire, for example, can be seen by way of its shadow cast upon a nearby surface by the uniform sunlight.", "note": "In the case of a divided solid dispersed in a fluid.", "link": "http://en.wikipedia.org/wiki/Shadow_graph"}, "a1117": {"id": "a1117", "title": "Sonar", "description": "a technique that uses sound propagation (usually underwater) to navigate, communicate with or detect other vessels. There are two kinds of sonar: active and passive. Sonar may be used as a means of acoustic location and of measurement of the echo characteristics of 'targets' in the water.", "note": "", "link": "http://en.wikipedia.org/wiki/Sonar"}, "a1237": {"id": "a1237", "title": "Thermography", "description": "Thermal imaging cameras detect radiation in the infrared range of the electromagnetic spectrum (roughly 9000-14,000 nanometers or 9-14 \u00b5m) and produce images of that radiation, called thermograms.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermography"}, "a1259": {"id": "a1259", "title": "Tomography", "description": "Imaging by sections or sectioning, through the use of any kind of penetrating wave.  The method is used in radiology, archaeology, biology, geophysics, oceanography, materials science, astrophysics and other sciences.", "note": "", "link": "http://en.wikipedia.org/wiki/Tomography"}, "a1268": {"id": "a1268", "title": "Triboluminescence", "description": "An optical phenomenon in which light is generated via the breaking of asymmetrical bonds in a crystal when that material is scratched, crushed, or rubbed. This is a variant of luminescence.", "note": "", "link": "http://en.wikipedia.org/wiki/Triboluminescence"}, "a1279": {"id": "a1279", "title": "Tyndall Effect", "description": "Light scattering by colloidal particles or particles in suspension", "note": "", "link": "http://en.wikipedia.org/wiki/Tyndall_effect"}, "a1301": {"id": "a1301", "title": "Vibrational Viscometer", "description": "An instrument that operates by measuring the damping of an oscillating electromechanical resonator immersed in a fluid whose viscosity is to be determined. The resonator generally oscillates in torsion or transversely (as a cantilever beam or tuning fork). The higher the viscosity, the larger the damping imposed on the resonator.", "note": "In the case of a divided solid dispersed in the fluid.", "link": "http://en.wikipedia.org/wiki/Falling_Ball_Viscometer#Vibrational_viscometers"}, "a1306": {"id": "a1306", "title": "Viscometer", "description": "(also called viscosimeter)  An instrument used to measure the viscosity of a fluid. For liquids with viscosities which vary with flow conditions, an instrument called a rheometer is used. Viscometers only measure under one flow condition.", "note": "In the case of a divided solid dispersed in the fluid.", "link": "http://en.wikipedia.org/wiki/Viscometer"}, "a14": {"id": "a14", "title": "Acoustic Emission", "description": "Transient elastic waves within a material due to localised stress release. Acoustic Emission (AE) events can occur rapidly when materials begin to fail. AE events commonly studied include the extension of a fatigue crack, or fibre breakage in composite materials. AE is related to an irreversible release of energy, and can be generated from sources not involving material failure including friction, cavitation and impact.", "note": "", "link": "http://en.wikipedia.org/wiki/Acoustic_emission"}, "a100": {"id": "a100", "title": "Barkhausen Effect", "description": "Noise in the magnetic output of a ferromagnet when the magnetising force applied to it is changed. It is caused by rapid changes of size of magnetic domains (similarly magnetically oriented atoms in ferromagnetic materials).", "note": "", "link": "http://en.wikipedia.org/wiki/Barkhausen_effect"}, "a182": {"id": "a182", "title": "Cat's-whisker Detector", "description": "A thin wire that lightly touches a semiconducting crystal to make an imperfect contact-junction detector in a crystal radio. It is a relatively primitive and unstable metal-semiconductor point-contact junction forming a Schottky barrier diode.", "note": "", "link": "http://en.wikipedia.org/wiki/Cat%27s-whisker_detector"}, "a179": {"id": "a179", "title": "Catapult Effect", "description": "A current passing through two wires connected by a loose wire in a magnetic field causes the loose wire to be catapulted horizontally away from the magnetic field due to the magnetic forces acting in the wires and in the magnetic field itself.", "note": "", "link": "http://en.wikipedia.org/wiki/Catapult_effect"}, "a203": {"id": "a203", "title": "Cherenkov Effect", "description": "Electromagnetic radiation emitted when a charged particle (such as a electron) passes through an insulator at a speed greater than the speed of light in that medium.", "note": "Cherenkov radiation is used to detect high-energy charged particles. In pool-type nuclear reactors, the intensity of Cherenkov radiation is related to the frequency of the fission events that produce high-energy electrons, and hence is a measure of the intensity of the reaction.", "link": "http://en.wikipedia.org/wiki/%C4%8Cerenkov_radiation"}, "a243": {"id": "a243", "title": "Corbino Effect", "description": "A phenomenon similar to the Hall effect, but a disk-shaped metal sample plane of the disk, produces a 'circular' current through the disk.", "note": "", "link": "http://en.wikipedia.org/wiki/Corbino_effect#The_Corbino_effect"}, "a251": {"id": "a251", "title": "Coulomb's Law", "description": "The magnitude of the electrostatic force between two point electric charges is directly proportional to the product of the magnitudes of each charge and inversely proportional to the square of the distance between the charges.", "note": "", "link": "http://en.wikipedia.org/wiki/Coulomb%27s_law"}, "a258": {"id": "a258", "title": "Crookes Radiometer", "description": "(also known as the light mill) Consists of an airtight glass bulb, containing a partial vacuum. Inside are a set of vanes which are mounted on a spindle. The vanes rotate when exposed to light, with faster rotation for more intense light, providing a quantitative measurement of electromagnetic radiation intensity.", "note": "", "link": "http://en.wikipedia.org/wiki/Crookes_radiometer"}, "a570": {"id": "a570", "title": "Homodyne Detection", "description": "A method of detecting frequency-modulated radiation by non-linear mixing with radiation of a reference frequency, the same principle as for heterodyne detection.", "note": "", "link": "http://en.wikipedia.org/wiki/Homodyne_detection"}, "a610": {"id": "a610", "title": "Induction Heating", "description": "The process of heating an electrically conducting object (usually a metal) by electromagnetic induction, where eddy currents are generated within the metal and resistance leads to Joule heating of the metal.", "note": "", "link": "http://en.wikipedia.org/wiki/Induction_heating"}, "a642": {"id": "a642", "title": "Josephson Effect", "description": "The phenomenon of current flow across two weakly coupled superconductors, separated by a very thin insulating barrier.", "note": "", "link": "http://en.wikipedia.org/wiki/Josephson_effect"}, "a679": {"id": "a679", "title": "Laser Microphone", "description": "A surveillance device that uses a laser beam to detect sound vibrations in a distant object. The laser beam is reflected off the object and returns to a receiver that converts the beam to an audio signal.", "note": "Where the field is causing an object to vibrate.", "link": "https://en.wikipedia.org/wiki/Laser_microphone"}, "a698": {"id": "a698", "title": "Light Emitting Diode", "description": "A semiconductor diode that emits light when an electric current is applied in the forward direction of the device, as in the simple LED circuit. The effect is a form of electroluminescence where incoherent and narrow-spectrum light is emitted from the p-n junction in a solid state material.", "note": "LEDs can also be used as photodiodes.", "link": "http://en.wikipedia.org/wiki/Light-emitting_diode"}, "a720": {"id": "a720", "title": "Maggi-Righi-Leduc Effect", "description": "Changes in thermal conductivity when placing a conductor in a magnetic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Maggi%E2%80%93Righi%E2%80%93Leduc_effect"}, "a741": {"id": "a741", "title": "Magneto-Optic Effects", "description": "A number of phenomena in which an electromagnetic wave propagates through a medium that has been altered by the presence of a quasistatic magnetic field. Includes the Faraday Effect and the Magneto-Optic Kerr Effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Magneto-optic_effect"}, "a742": {"id": "a742", "title": "Magneto-Optic Kerr Effect", "description": "(MOKE) Light reflected from a magnetised surface can change in both polarisation and reflectivity. Identical to the Faraday effect except that the magneto-optical Kerr effect is a measurement of the reflected light, while the Faraday effect is a measurement of the transmitted light. Both effects result from the off-diagonal components of the dielectric tensor e.", "note": "", "link": "http://en.wikipedia.org/wiki/Magneto-optic_Kerr_effect"}, "a743": {"id": "a743", "title": "Magnetoresistance", "description": "The change of electrical resistance of a material when an external magnetic field is applied. Also called ordinary magnetoresistance (OMR).", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetoresistance"}, "a846": {"id": "a846", "title": "Ohm's Law", "description": "Ohm's law states that the current through a conductor between two points is directly proportional to the potential difference or voltage across the two points, and inversely proportional to the resistance between them.", "note": "", "link": "http://en.wikipedia.org/wiki/Ohms_law"}, "a871": {"id": "a871", "title": "Parasitic Capacitance", "description": "An unavoidable and usually unwanted capacitance between the parts of an electronic component or circuit because of their proximity to each other.", "note": "", "link": "http://en.wikipedia.org/wiki/Parasitic_capacitance"}, "a952": {"id":
