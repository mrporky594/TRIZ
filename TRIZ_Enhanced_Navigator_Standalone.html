cal operations by using any form of signal processing for which the input is an image, a series of images, or a video, such as a photograph or video frame The output of image processing may be either an image or a set of characteristics or parameters related to the image.", "note": "", "link": "https://en.wikipedia.org/wiki/Image_processing"}, "a647": {"id": "a647", "title": "K\u00e1rm\u00e1n Vortex Street", "description": "A repeating pattern of swirling vortices caused by the unsteady separation of flow of a fluid over bluff bodies. It is responsible for such phenomena as the 'singing' of suspended telephone or power lines, the vibration of a car antenna at certain speeds.", "note": "", "link": "http://en.wikipedia.org/wiki/Von_Karman_vortex_street"}, "a655": {"id": "a655", "title": "Kerr Effect", "description": "(or the quadratic electro-optic effect) A change in the refractive index of a material in response to an electric field. Distinct from the Pockels effect in that the induced index change is directly proportional to the square of the electric field instead of to the magnitude of the field. All materials show a Kerr effect, but certain liquids display the effect more strongly than other materials.", "note": "", "link": "http://en.wikipedia.org/wiki/Kerr_effect"}, "a688": {"id": "a688", "title": "Lens", "description": "An optical device with perfect or approximate axial symmetry which transmits and refracts light, converging or diverging the beam.", "note": "", "link": "http://en.wikipedia.org/wiki/Lens_(optics)"}, "a738": {"id": "a738", "title": "Magnetohydrodynamic Effect", "description": "A magnetic field can induce currents in a moving conductive fluid, which create forces on the fluid, and also change the magnetic field itself.", "note": "", "link": "http://en.wikipedia.org/wiki/Magneto-hydrodynamics"}, "a826": {"id": "a826", "title": "Negative Index Metamaterials", "description": "Artificial structures where the refractive index has a negative value over some frequency range. This does not occur in any known natural materials, and thus is only achievable with engineered structures known as metamaterials.", "note": "", "link": "http://en.wikipedia.org/wiki/Negative_index_metamaterials"}, "a827": {"id": "a827", "title": "Negative Refraction", "description": "An electromagnetic phenomenon where light rays are refracted at an interface in the reverse sense to that normally expected. Negative refraction occurs at interfaces between materials at which one has an ordinary positive phase velocity (i.e. a positive refractive index), and the other has the more exotic negative phase velocity (refractive index).", "note": "", "link": "http://en.wikipedia.org/wiki/Negative_refraction"}, "a850": {"id": "a850", "title": "Optical Fibre", "description": "A fibre (typically made of glass or plastic) that carries light along its length", "note": "", "link": "http://en.wikipedia.org/wiki/Optical_fiber"}, "a967": {"id": "a967", "title": "Prism", "description": "A transparent optical element with flat, polished surfaces that refract light. The exact angles between the surfaces depend on the application. The traditional geometrical shape is that of a triangular prism with a triangular base and rectangular sides, and in colloquial use 'prism' usually refers to this type.", "note": "", "link": "http://en.wikipedia.org/wiki/Prism_(optics)"}, "a1019": {"id": "a1019", "title": "Reflection", "description": "The change in direction of a wavefront at an interface between two different media so that the wavefront returns into the medium from which it originated. Common examples include the reflection of light, sound and water waves.", "note": "", "link": "http://en.wikipedia.org/wiki/Reflection_(physics)"}, "a1020": {"id": "a1020", "title": "Refraction", "description": "The change in direction of a wave due to a change in its speed. This is most commonly observed when a wave passes from one medium to another at any angle other than 90\u00b0 or 0\u00b0. Refraction of light is the most commonly observed phenomenon, but any type of wave can refract when it interacts with a medium, for example when sound waves pass from one medium into another or when water waves move into water of a different depth.", "note": "", "link": "http://en.wikipedia.org/wiki/Refraction"}, "a1028": {"id": "a1028", "title": "Retroreflector", "description": "A device or surface that reflects light, or other radiation, back to its source with minimum scattering.", "note": "", "link": "http://en.wikipedia.org/wiki/Retroreflective"}, "a1204": {"id": "a1204", "title": "Temperature Gradient", "description": "The variation in temperature over distance.", "note": "For example by creating a 'lens' based on variations in density due to termperature.", "link": "http://en.wikipedia.org/wiki/Temperature_gradient"}, "a1220": {"id": "a1220", "title": "Thermal Radiation", "description": "Electromagnetic radiation emitted from the surface of an object due to the object's temperature.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermal_radiation"}, "a1275": {"id": "a1275", "title": "Turbulence", "description": "A fluid regime characterised by chaotic, stochastic property changes. This includes low momentum diffusion, high momentum convection, and rapid variation of pressure and velocity in space and time (flow that is not turbulent is called laminar flow).", "note": "Though turbulence in the medium carrying the field.", "link": "http://en.wikipedia.org/wiki/Turbulence"}, "a1310": {"id": "a1310", "title": "Voigt Effect", "description": "A magneto-optical phenomenon whereby the polarisation of light may be rotated when passed through a vapour cell immersed in a magnetic field directed perpendicular to the beam direction.", "note": "", "link": "http://en.wikipedia.org/wiki/Voigt_Effect"}, "a1321": {"id": "a1321", "title": "Waveguide", "description": "A structure which guides waves, such as electromagnetic waves or sound waves. There are different types of waveguide for each type of wave: electromagnetic, optical or acoustic.", "note": "", "link": "http://en.wikipedia.org/wiki/Waveguide"}, "a1322": {"id": "a1322", "title": "Waveguide (optics)", "description": "Waveguides used at optical frequencies are typically dielectric waveguides, structures in which a dielectric material with high permittivity, and thus high index of refraction, is surrounded by a material with lower permittivity. The structure guides optical waves by total internal reflection. The most common optical waveguide is optical fibre.", "note": "", "link": "http://en.wikipedia.org/wiki/Waveguide#Optical_waveguides"}, "a28": {"id": "a28", "title": "Added Mass", "description": "(or Virtual Mass) The inertia added to a system because an accelerating or decelerating body must move (or deflect) some volume of surrounding fluid as it moves through it.", "note": "", "link": "http://en.wikipedia.org/wiki/Added_mass"}, "a35": {"id": "a35", "title": "Aeolipile", "description": "A rocket-like jet engine consisting  of an air-tight chamber (usually a sphere or cylinder) rotating on a bearing of some kind, with bent or curved nozzles projecting from it (tipjets), through which steam is expelled perpendicular to the bearing axis. The resulting thrust due to the rocket principle causes a torque which makes the device spin (Newton's third law).", "note": "", "link": "http://en.wikipedia.org/wiki/Aeolipile"}, "a40": {"id": "a40", "title": "Aeroelastic Flutter", "description": "A self-feeding and potentially destructive vibration where aerodynamic forces on an object couple with a structure's natural mode of vibration to produce rapid periodic motion. Flutter can occur in any object within a strong fluid flow, under the conditions that a positive feedback occurs between the structure's natural vibration and the aerodynamic forces.", "note": "The flow of the moving gas responsible for the aerolastic flutter is disturbed by the aeroelastic flutter.", "link": "http://en.wikipedia.org/wiki/Aeroelasticity#Flutter"}, "a41": {"id": "a41", "title": "Aerofoil", "description": "The shape of a wing or blade (of a propeller, rotor or turbine) or sail as seen in cross-section. An aerofoil-shaped body moved through a fluid produces a force perpendicular to the motion called lift.", "note": "", "link": "http://en.wikipedia.org/wiki/Aerofoil"}, "a104": {"id": "a104", "title": "Basset Force", "description": "The force due to the lagging boundary layer development with changing relative velocity (acceleration) of bodies moving through a fluid.", "note": "", "link": "http://en.wikipedia.org/wiki/Basset_force"}, "a112": {"id": "a112", "title": "Bernoulli Effect", "description": "For an inviscid flow, an increase in the speed of the fluid occurs simultaneously with a decrease in pressure or a decrease in the fluid's gravitational potential energy", "note": "", "link": "http://en.wikipedia.org/wiki/Bernoulli_effect"}, "a225": {"id": "a225", "title": "Comb", "description": "A toothed device used in hair care for straightening and cleaning hair or other fibres. More generally a device having a comb-like form.", "note": "A gas stream is dirturbed when passing though a comb.", "link": "http://en.wikipedia.org/wiki/Comb"}, "a226": {"id": "a226", "title": "Combustion", "description": "(or burning) A complex sequence of exothermic chemical reactions between a fuel and an oxidant accompanied by the production of heat or both heat and light in the form of either a glow or flames. Direct combustion by atmospheric oxygen is a reaction mediated by radical intermediates typically produced as a result of thermal runaway, where the heat generated by combustion is necessary to maintain the high temperature necessary for radical production.", "note": "", "link": "http://en.wikipedia.org/wiki/Combustion"}, "a249": {"id": "a249", "title": "Couette Flow", "description": "The laminar flow of a viscous fluid in the space between two parallel plates, one of which is moving relative to the other. The flow is driven by virtue of viscous drag force acting on the fluid and the applied pressure gradient parallel to the plates.", "note": "", "link": "http://en.wikipedia.org/wiki/Couette_flow"}, "a276": {"id": "a276", "title": "De Laval Nozzle", "description": "(or convergent-divergent, CD or con-di nozzle) A tube that is pinched in the middle, making a balanced, asymmetric hourglass-shape. Used to accelerate a hot, pressurised gas passing through it to a supersonic speed, and upon expansion, to shape the exhaust flow so that the heat energy propelling the flow is maximally converted into directed kinetic energy. Used in some types of steam turbine, rocket engines and supersonic jet engines.", "note": "", "link": "http://en.wikipedia.org/wiki/De_Laval_nozzle"}, "a280": {"id": "a280", "title": "Deflagration", "description": "A technical term describing subsonic combustion that usually propagates through thermal conductivity (hot burning material heats the next layer of cold material and ignites it). Most 'fire' found in daily life, from flames to explosions, is technically deflagration. Deflagration is different from detonation (which is supersonic and propagates through shock compression).", "note": "", "link": "http://en.wikipedia.org/wiki/Deflagration"}, "a286": {"id": "a286", "title": "Density Gradient", "description": "Variation of density across an area or through a volume.", "note": "", "link": "http://en.wikipedia.org/wiki/Density_Gradient"}, "Depressurisation": {"id": "", "title": "Depressurisation", "description": "Reduction in pressure. Rapid depressurisation can be used to create pressure differences.", "note": "", "link": ""}, "a296": {"id": "a296", "title": "Detonation", "description": "Detonation involves a supersonic exothermic front accelerating through a medium that eventually drives a shock front propagating directly in front of it. Detonations are observed in both conventional solid and liquid explosives, as well as in reactive gases.", "note": "", "link": "http://en.wikipedia.org/wiki/Detonation"}, "a404": {"id": "a404", "title": "Electrostatic Fluid Accelerator", "description": "A device which pumps a fluid such as air without any moving parts by using an electric field to propel electrically charged air molecules. There are three basic steps in the fluid acceleration process: ionize air molecules, use those ions to push many more neutral molecules in a desired direction, and then recapture and neutralize the ions to eliminate any net charge.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrostatic_fluid_accelerator"}, "a434": {"id": "a434", "title": "Exothermic Reaction", "description": "An exothermic reaction is a chemical reaction accompanied by the release of heat. In other words, the energy needed for the reaction to occur is less than the total energy released. As a result of this, the extra energy is released, usually in the form of heat.", "note": "", "link": "http://en.wikipedia.org/wiki/Exothermic_reaction"}, "a435": {"id": "a435", "title": "Explosion", "description": "A sudden increase in volume and release of energy in an extreme manner, usually with the generation of high temperatures and the release of gases.", "note": "", "link": "http://en.wikipedia.org/wiki/Explosion"}, "a436": {"id": "a436", "title": "Explosive Lens", "description": "A device composed of several explosive charges that are shaped in such a way as to change the shape of the detonation wave passing through it; conceptually similar to the effect of an optical lens on light", "note": "", "link": "http://en.wikipedia.org/wiki/Explosive_lens"}, "a469": {"id": "a469", "title": "Flow Separation", "description": "For a solid object travelling through a fluid (or alternatively a stationary object exposed to a moving fluid) flow separation occurs when the boundary layer travels far enough against an adverse pressure gradient that the speed of the boundary layer falls almost to zero.The fluid flow becomes detached from the surface of the object, and instead takes the forms of eddies and vortices.", "note": "", "link": "http://en.wikipedia.org/wiki/Flow_separation"}, "a474": {"id": "a474", "title": "Flutter", "description": "A dynamic instability of an elastic structure in a fluid flow, caused by positive feedback between the body's deflection and the force exerted by the fluid flow.", "note": "", "link": "http://en.wikipedia.org/wiki/Aeroelasticity#Flutter"}, "a480": {"id": "a480", "title": "Foil (fluid mechanics)", "description": "A surface designed to maximize lift (force generated perpendicular to the fluid flow) while minimizing drag (force generated in the direction of the fluid flow) in a given range of conditions. Foils may be designed to operate in any fluid, such as air or water.", "note": "", "link": "http://en.wikipedia.org/wiki/Foil_(fluid_mechanics)"}, "a537": {"id": "a537", "title": "Gravitational Convection (non heat)", "description": "Differential buoyancy forces which cause convection in gravity fields may result from sources of density variations in fluids other than those produced by heat, such as variable composition. For example, diffusion of a source of dry salt downward into wet soil assisted by the mechanism of the fact that saline is heavier than fresh water.", "note": "", "link": "http://en.wikipedia.org/wiki/Convection#Buoyancy_induced_convection_not_due_to_heat"}, "a606": {"id": "a606", "title": "Impeller", "description": "A rotating component used to increase the pressure and flow of a fluid. Typically the rotating component of a centrifugal pump. Transfers energy from the motor that drives the pump to the fluid being pumped by accelerating the fluid outwards from the center of rotation. The velocity achieved by the impeller transfers into pressure when the outward movement of the fluid is confined by the pump casing.", "note": "", "link": "http://en.wikipedia.org/wiki/Impeller"}, "a616": {"id": "a616", "title": "Injector", "description": "(or ejector) A pump-like device that uses the Venturi effect of a converging-diverging nozzle to convert pressure energy of a motive fluid to velocity energy, creating a low pressure zone that draws in and entrains a suction fluid. After passing through the throat of the injector, the mixed fluid expands and the velocity reduced, recompressing the mixed fluids by converting velocity energy back to pressure energy.", "note": "", "link": "http://en.wikipedia.org/wiki/Injector"}, "a630": {"id": "a630", "title": "Ion Wind", "description": "A stream of ionized fluid generated by a strong electric field (typically a sharp conductive point) exceeding the corona discharge inception voltage gradient, ionizing the air about the tip, creating a small jet of plasma. Ionised air molecules have the same polarity as the charged tip, so are replused as a like-charged ion cloud, that expands due to the repulsion between ions, creating an electric 'wind' and a hissing noise due to pressure change.", "note": "", "link": "http://en.wikipedia.org/wiki/Ion_wind"}, "a637": {"id": "a637", "title": "Jet", "description": "A coherent stream of fluid (e.g. gas or liquid) that is projected into a surrounding medium, usually from some kind of a nozzle or aperture. Jets can travel long distances without dissipating.", "note": "", "link": "http://en.wikipedia.org/wiki/Jet_(fluid)"}, "a794": {"id": "a794", "title": "Mixed Convection", "description": "Movement of fluids or gases (or particles carried by fluids or gasses) by a combination of Free and Forced Convection", "note": "", "link": "http://en.wikipedia.org/wiki/Convection"}, "a961": {"id": "a961", "title": "Pressure Drop", "description": "Pressure is an effect which occurs when a force is applied on a surface. Pressure is transmitted to solid boundaries or across arbitrary sections of fluid normal to these boundaries or sections at every point. Rapid pressure drop is a useful technique for applying force or breaking objects apart.", "note": "", "link": "http://en.wikipedia.org/wiki/Pressure"}, "a966": {"id": "a966", "title": "Pressurisation", "description": "The application of pressure in a given situation or environment; and more specifically refers to the process by which atmospheric pressure is maintained in an isolated or semi-isolated atmospheric environment (for instance, in an aircraft, or whilst scuba diving).", "note": "", "link": "http://en.wikipedia.org/wiki/Pressurization"}, "a1032": {"id": "a1032", "title": "Reverse Diffusion", "description": "A situation where the transport of particles (atoms or molecules) in a medium occurs towards regions of lower concentration gradients, opposite to that observed during diffusion. This phenomenon occurs during phase separation.", "note": "", "link": "http://en.wikipedia.org/wiki/Reverse_diffusion"}, "Stirring": {"id": "", "title": "Stirring", "description": "Agitation of a fluid using repetitive action - typically rotary, usually with the intent of mixing or preventing continuous contact of the fluid with a particular part of some object.", "note": "", "link": ""}, "a1215": {"id": "a1215", "title": "Thermal Contraction", "description": "The tendency of matter to reduce in volume (contract)  in response to a change in temperature or when a substance is cooled.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermal_expansion"}, "a1274": {"id": "a1274", "title": "Turbulator", "description": "A device that turns a laminar flow into a turbulent flow.", "note": "", "link": "https://en.wikipedia.org/wiki/Turbulator"}, "a1312": {"id": "a1312", "title": "Vortex Generator", "description": "An aerodynamic surface, consisting of a small vane that creates a vortex. Vortex generators can be found on many devices, but the term is most often used in aircraft design. Vortex generators are likely to be found on the external surfaces of vehicles where flow separation is a potential problem because vortex generators delay flow separation.", "note": "", "link": "http://en.wikipedia.org/wiki/Vortex_generator"}, "a1337": {"id": "a1337", "title": "Wind", "description": "The flow of air or other gases that compose an atmosphere", "note": "", "link": "http://en.wikipedia.org/wiki/Wind"}, "a103": {"id": "a103", "title": "Barus Effect", "description": "A viscoelastic effect. A phenomenon in which the diameter of fluid becomes larger than the diameter of a nozzle at its exit when the fluid is extruded through the nozzle.", "note": "", "link": "http://en.wikipedia.org/wiki/Die_swell"}, "a238": {"id": "a238", "title": "Conservation of Momentum", "description": "In a closed system (one that does not exchange any matter with the outside and is not acted on by outside forces) the total momentum is constant.", "note": "", "link": "http://en.wikipedia.org/wiki/Momentum"}, "a297": {"id": "a297", "title": "Diamagnetism", "description": "The property of an object which causes it to create a magnetic field in opposition of an externally applied magnetic field, thus causing a repulsive effect. It is a form of magnetism that is only exhibited by a substance in the presence of an externally applied magnetic field. Diamagnetism is generally a quite weak effect in most materials, although superconductors exhibit a strong effect.", "note": "If a thin (under 0.5 cm) layer of water is placed on top of a powerful magnet (such as a super magnet) then the field of the magnet repels the water. This causes a slight dimple in the water's surface that may be seen by its reflection.", "link": "http://en.wikipedia.org/wiki/Diamagnetism"}, "a411": {"id": "a411", "title": "Electrowetting", "description": "(or Electrocapillary Effect) The modification of the wetting properties of a hydrophobic surface with an applied electric field.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrowetting"}, "a584": {"id": "a584", "title": "Hydraulic Jump", "description": "When liquid at high velocity discharges into a zone of lower velocity, a rather abrupt rise (a step or standing wave) occurs in the liquid surface. The liquid is abruptly slowed and increases in height converting some of the flow's initial kinetic energy into an increase in potential energy, with some energy lost through turbulence to heat. In an open channel flow, this manifests as the fast flow rapidly slowing and piling up on top of itself.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydraulic_jump"}, "a651": {"id": "a651", "title": "Kaye Effect", "description": "A property of complex liquids, common in shear-thinning liquids (liquids which thin under shear stress). While pouring one the liquid onto a surface, the surface suddenly spouts an upcoming jet of liquid which merges with the downgoing one. Common household liquids with this property are liquid hand soaps, shampoos and non-drip paint. The effect usually goes unnoticed, however, because it seldom lasts more than about 300ms.", "note": "", "link": "http://en.wikipedia.org/wiki/Kaye_effect"}, "a1194": {"id": "a1194", "title": "Surface Tension", "description": "An attractive property of the surface of a liquid. It is what causes the surface portion of liquid to be attracted to another surface, such as that of another portion of liquid (as in connecting bits of water or as in a drop of mercury that forms a cohesive ball).", "note": "", "link": "http://en.wikipedia.org/wiki/Surface_tension"}, "a1255": {"id": "a1255", "title": "Tidal Force", "description": "A situation in which a body or material (for example, tidal water, or the Moon) is mainly under the gravitational influence of a second body (for example, the Earth), but is also perturbed by the gravitational effects of a third body (for example, by the Moon in the case of tidal water, or by the Sun in the case of the Moon).", "note": "", "link": "http://en.wikipedia.org/wiki/Tidal_force"}, "a361": {"id": "a361", "title": "Electroactive Polymer", "description": "(or EAP) A polymer that exhibits a change in size or shape when stimulated by an electric field. The most common applications of this type of material are in actuators and sensors. A typical characteristic property of an EAP is that it will undergo a large amount of deformation while sustaining large forces.", "note": "", "link": "http://en.wikipedia.org/wiki/Electroactive_polymers"}, "a418": {"id": "a418", "title": "Entropic Explosion", "description": "An explosion in which the reactants undergo a large change in volume without releasing a large amount of heat.", "note": "", "link": "http://en.wikipedia.org/wiki/Entropic_explosion"}, "a554": {"id": "a554", "title": "Hart's Inversor", "description": "A mechanical linkage that can be used to convert circular motion into perfect linear motion (or vice versa). It does this without a sliding guide.", "note": "", "link": "https://en.wikipedia.org/wiki/Hart%27s_inversor"}, "a566": {"id": "a566", "title": "Hinge", "description": "A mechanical mechanism that allows mutal rotation of two joined objects around a joined common axis.", "note": "", "link": "http://en.wikipedia.org/wiki/Hinge"}, "a599": {"id": "a599", "title": "Hyperboloid", "description": "A hyperboloid is a quadric, a type of surface in three dimensions. A hyperboloid of revolution of one sheet can be obtained by revolving a hyperbola around its semi-minor axis. A hyperboloid of revolution of two sheets can be obtained by revolving a hyperbola around its focal axis. Hyperboloid structures are used in construction - they can be built with straight steel beams. Examples include cooling towers.", "note": "The hyperboloid is an example of a curved structure that can be constructed using straight lines - for example a power station cooling tower.", "link": "http://en.wikipedia.org/wiki/Hyperboloid"}, "a659": {"id": "a659", "title": "Knot", "description": "A method for fastening or securing flexible linear material such as rope by tying or interweaving.", "note": "", "link": "http://en.wikipedia.org/wiki/Knot"}, "a734": {"id": "a734", "title": "Magnetic Shape Memory", "description": "Magnetic shape memory (MSM) alloys, or ferromagnetic shape memory alloys (FSMA), are ferromagnetic materials exhibiting large changes in shape and size under the influence of an applied magnetic field due to martensitic phase transformation.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_shape_memory"}, "Magnetoelastic Effects": {"id": "", "title": "Magnetoelastic Effects", "description": "A group of effects including Magnetostriction (or Joule Magnetostriction), Delta-E Effect, Wiedemann Effect, Magnetovolume Effect, and their Inverses: Villari Effect, Delta-E Effect, Matteucci Effect and the Nagaoka-Honda Effect.", "note": "", "link": ""}, "Magnetovolume Effect": {"id": "", "title": "Magnetovolume Effect", "description": "One of a group of Magnetoelastic Effects. Volume change due to magnetisation (most evident near the Curie temperature)", "note": "By combining a materials having different susceptibilities to the magnetovolume effect.", "link": ""}, "a857": {"id": "a857", "title": "Origami", "description": "The traditional Japanese art of paper folding. The goal of this art is to create a representation of an object using geometric folds and crease patterns preferably without the use of gluing or cutting the paper, and using only one piece of paper. Origami only uses a small number of different folds, but they can be combined in a variety of ways to make intricate designs.", "note": "", "link": "http://en.wikipedia.org/wiki/Origami"}, "a877": {"id": "a877", "title": "Peaucellier\u0096Lipkin Linkage", "description": "A mechanical linkage that can be used to convert circular motion into perfect linear motion (or vice versa). It does this without a sliding guide.", "note": "", "link": "https://en.wikipedia.org/wiki/Peaucellier%E2%80%93Lipkin_linkage"}, "a942": {"id": "a942", "title": "Plasticity", "description": "The deformation of a material undergoing non-reversible changes of shape in response to applied forces. For example, a solid piece of metal or plastic being bent or pounded into a new shape displays plasticity as permanent changes occur within the material itself.", "note": "", "link": "http://en.wikipedia.org/wiki/Plasticity_(physics)"}, "a972": {"id": "a972", "title": "Pseudoelasticity", "description": "(or superelasticity) An elastic (impermanent) response to relatively high stress caused by a phase transformation between the austenitic and martensitic phases of a crystal. Exhibited in Shape memory alloys. Superelastic alloys belong to the larger family of shape memory alloys. Unlike shape-memory alloys, no change in temperature is needed for the alloy to recover its initial shape.", "note": "", "link": "http://en.wikipedia.org/wiki/Pseudoelasticity"}, "a990": {"id": "a990", "title": "Quadruplanar-Inversor", "description": "A mechanical linkage that can be used to convert circular motion into perfect linear motion (or vice versa). It does this without a sliding guide.", "note": "", "link": "https://en.wikipedia.org/wiki/Quadruplanar-Inversor"}, "a1041": {"id": "a1041", "title": "Rigid Origami", "description": "A branch of origami which is concerned with folding structures using flat rigid sheets joined by hinges. It has been used in the construction of large solar panel arrays that have to be folded before deployment. There is no requirement that the structure start as a flat sheet - for instance shopping bags with flat bottoms and airbags are examples of rigid origami.", "note": "", "link": "http://en.wikipedia.org/wiki/Rigid_origami"}, "Roller": {"id": "", "title": "Roller", "description": "A cylindrical device that rotates around its principle axis, typically to perform useful work, such as the compression of sheet metal between a pair of rollers.", "note": "", "link": ""}, "a1082": {"id": "a1082", "title": "Shape Memory Alloy", "description": "An alloy that 'remembers' its original, cold-forged shape: returning the pre-deformed shape by heating. This material is a lightweight, solid-state alternative to conventional actuators such as hydraulic, pneumatic, and motor-based systems.", "note": "", "link": "http://en.wikipedia.org/wiki/Shape_memory_alloy"}, "a1083": {"id": "a1083", "title": "Shape Memory Polymer", "description": "Polymeric smart materials that have the ability to return from a deformed state (temporary shape) to their original (permanent) shape induced by an external stimulus, such as temperature change. SMPs can retain two or sometimes three shapes, and the transition between those is induced by temperature, electric field,  or magnetic field, light or solution.", "note": "", "link": "http://en.wikipedia.org/wiki/Shape-memory_polymer"}, "a1088": {"id": "a1088", "title": "Shear Stress", "description": "A stress which is applied parallel or tangential to a face of a material, as opposed to a normal stress which is applied perpendicularly.", "note": "", "link": "http://en.wikipedia.org/wiki/Shear_stress"}, "a1127": {"id": "a1127", "title": "Spanish Windlass", "description": "A simple machine for applying a tension between two objects to pull them together. Consists of a continuous loop of rope passing around the objects and a beam (e.g. a stick) passing through the middle of the loop. Rotation of the beam around the axis of the loop causes the loop to twist around itself, effectivly shortening its length and so pulling the objects towards each another.", "note": "", "link": "http://www.wikihow.com/Make-a-Spanish-Windlass"}, "a1189": {"id": "a1189", "title": "Superplasticity", "description": "A state in which solid crystalline material is deformed well beyond its usual breaking point, usually over about 200% during tensile deformation. Such a state is usually achieved at high homologous temperature, typically half the absolute melting point. Examples of superplastic materials are some fine-grained metals and ceramics.", "note": "", "link": "http://en.wikipedia.org/wiki/Superplasticity"}, "a1260": {"id": "a1260", "title": "Torque", "description": "Torque (also called moment or moment of force) is the tendency of a force to rotate an object about an axis, fulcrum, or pivot. Just as a force is a push or a pull, a torque can be thought of as a twist. Torque is the rotational analogue of Force.", "note": "", "link": "http://en.wikipedia.org/wiki/Torque"}, "a1335": {"id": "a1335", "title": "Wiedemann Effect", "description": "A magnetoelastic effect. The twisting of a magnetic material when a helical magnetic field is applied to it.", "note": "", "link": "http://en.wikipedia.org/w/index.php?title=Wiedemann_effect"}, "a5": {"id": "a5", "title": "Abrasion", "description": "The process of scuffing, scratching, wearing down, marring, or rubbing away. It can be intentionally imposed in a controlled process using an abrasive.", "note": "", "link": "http://en.wikipedia.org/wiki/Abrasion_(mechanical)"}, "a18": {"id": "a18", "title": "Acoustic Lubrication", "description": "(or sonic lubrication) occurs when sound permits vibration to introduce separation between sliding faces (or between a series of particles). The frequency of sound required to induce optimal vibration, and thus cause sonic lubrication, varies with the size of the particles (high frequencies will have the effect on sand and lower frequencies will have on boulders).", "note": "In the case of a compacted divided solid.", "link": "http://en.wikipedia.org/wiki/Acoustic_lubrication"}, "Aerobic Digestion": {"id": "", "title": "Aerobic Digestion", "description": "A series of processes in which microorganisms break down biodegradable material in the presence of oxygen", "note": "", "link": ""}, "a46": {"id": "a46", "title": "Aggregated Diamond Nanorod", "description": "(or ADNRs or hyperdiamond) A nanocrystalline form of diamond believed to be the hardest and least compressible known material, as measured by its isothermal bulk modulus", "note": "", "link": "http://en.wikipedia.org/wiki/Aggregated_diamond_nanorods"}, "a60": {"id": "a60", "title": "Anaerobic Digestion", "description": "A series of processes in which microorganisms break down biodegradable material in the absence of oxygen. It is widely used to treat wastewater sludges and organic wastes because it provides volume and mass reduction of the input material.", "note": "", "link": "http://en.wikipedia.org/wiki/Anaerobic_digestion"}, "a91": {"id": "a91", "title": "Axle", "description": "A central shaft for a rotating wheel or gear.", "note": "For example: a roller", "link": "http://en.wikipedia.org/wiki/Axle"}, "a177": {"id": "a177", "title": "Catalysis", "description": "The process in which the rate of a chemical reaction is increased by means of a chemical substance known as a catalyst. Unlike other reagents that participate in the chemical reaction, a catalyst is not consumed.  Catalysts work by lowering the activation energy for a reaction, thus dramatically increasing the rate of the reaction. As a result, products are formed faster and reactions reach their equilibrium state more rapidly.", "note": "", "link": "http://en.wikipedia.org/wiki/Catalysis"}, "a230": {"id": "a230", "title": "Composting", "description": "The aerobic decomposition of biodegradable organic matter, producing compost. The decomposition is performed primarily by facultative and obligate aerobic bacteria, yeasts and fungi, helped in the cooler initial and ending phases by a number of larger organisms, such as springtails, ants, nematodes and oligochaete worms.", "note": "", "link": "http://en.wikipedia.org/wiki/Composting"}, "a260": {"id": "a260", "title": "Cryogenics", "description": "The behavior of materials at very low temperatures (typically below -150 \u00b0C, -238 \u00b0F or 123 K).", "note": "", "link": "http://en.wikipedia.org/wiki/Cryogenics"}, "Cryolysis": {"id": "", "title": "Cryolysis", "description": "Destruction by cold (usually in a medical context)", "note": "", "link": ""}, "a278": {"id": "a278", "title": "Decomposition (biological)", "description": "The break down of tissue of a formerly living organism into simpler forms of matter.", "note": "", "link": "http://en.wikipedia.org/wiki/Decomposition"}, "a293": {"id": "a293", "title": "Desorption", "description": "A phenomenon whereby a substance is released from or through a surface. The process is the opposite of sorption (i.e adsorption and absorption). This occurs in a system being in the state of sorption equilibrium between bulk phase (fluid, i.e. gas or liquid solution) and an adsorbing surface (solid or boundary separating two fluids). When the concentration (or pressure) of substance in the bulk phase is lowered, some of the sorbed substance changes to the bulk state.", "note": "", "link": "http://en.wikipedia.org/wiki/Desorption"}, "a375": {"id": "a375", "title": "Electrohydrogenesis", "description": "Electrohydrogenesis or biocatalyzed electrolysis is the name given to a process for generating hydrogen gas from organic matter being decomposed by bacteria.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrohydrogenesis"}, "a387": {"id": "a387", "title": "Electron Beam", "description": "(also called Cathode Rays or e-beam) are streams of electrons observed in vacuum tubes, i.e. evacuated glass tubes that are equipped with at least two metal electrodes to which a voltage is applied, a cathode or negative electrode and an anode or positive electrode.", "note": "", "link": "http://en.wikipedia.org/wiki/Electron_beam"}, "Electron Impact Desorption": {"id": "", "title": "Electron Impact Desorption", "description": "Desorption arising from electron-impact induced adsorbate surface bond breaking. Molecules on surfaces may also be chemically converted to other species by electron impact", "note": "", "link": ""}, "a402": {"id": "a402", "title": "Electrostatic Discharge", "description": "The sudden and momentary electric current that flows between two objects at different electrical potentials", "note": "", "link": "http://en.wikipedia.org/wiki/Electric_discharge"}, "a420": {"id": "a420", "title": "Enzyme", "description": "Proteins that catalyze (i.e., increase the rates of) chemical reactions. Almost all chemical reactions in a biological cell need enzymes in order to occur at rates sufficient for life. Enzymes differ from most other catalysts in that they are highly specific for their substrates", "note": "", "link": "http://en.wikipedia.org/wiki/Enzyme"}, "a591": {"id": "a591", "title": "Hydrogen Peroxide", "description": "(H2O2) A very pale blue liquid which appears colorless in a dilute solution, slightly more viscous than water. It is a weak acid. It has strong oxidizing properties and is therefore a powerful bleaching agent that has also found use as a disinfectant, as an oxidizer, as an antiseptic, and in rocketry. The oxidizing capacity of hydrogen peroxide is so strong that the chemical is considered a highly reactive oxygen species.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydrogen_Peroxide"}, "a593": {"id": "a593", "title": "Hydrolysis", "description": "A chemical reaction during which one or more water molecules are split into hydrogen and hydroxide ions which may go on to participate in further reactions.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydrolysis"}, "a595": {"id": "a595", "title": "Hydrophile", "description": "A physical property of a molecule that can transiently bond with water (H2O) through hydrogen bonding. This is thermodynamically favorable, and makes these molecules soluble not only in water, but also in other polar solvents.", "note": "", "link": "http://en.wikipedia.org/wiki/Hydrophile"}, "a604": {"id": "a604", "title": "Impact Force", "description": "A high force or shock applied over a short time period. Such a force or acceleration can sometimes have a greater effect than a lower force applied over a proportionally longer time period.", "note": "", "link": "http://en.wikipedia.org/wiki/Impact_force"}, "a607": {"id": "a607", "title": "Incandescence", "description": "The emission of light (visible electromagnetic radiation) from a hot body due to its temperature.", "note": "", "link": "http://en.wikipedia.org/wiki/Incandescence"}, "a614": {"id": "a614", "title": "Infrared Radiation", "description": "Infrared (IR) radiation is electromagnetic radiation whose wavelength is longer than that of visible light (400-700 nm), but shorter than that of terahertz radiation (3-300 \u00b5m) and microwaves (~30,000 \u00b5m). Infrared radiation spans roughly three orders of magnitude (750 nm and 1000 \u00b5m).", "note": "", "link": "http://en.wikipedia.org/wiki/Infra_Red"}, "Jet Erosion": {"id": "", "title": "Jet Erosion", "description": "A method of cutting or slicing a material using a jet of liquid or gas at high velocity and pressure, or a mixture of liquid/gas and an abrasive substance.", "note": "", "link": ""}, "a674": {"id": "a674", "title": "Laser", "description": "A device that emits light (electromagnetic radiation) through a process called stimulated emission.", "note": "", "link": "http://en.wikipedia.org/wiki/Laser"}, "a697": {"id": "a697", "title": "Light", "description": "Light is electromagnetic radiation of a wavelength that is visible to the human eye (in a range from about 380 or 400 nanometres to about 760 or 780 nm)", "note": "Using a high-power light source or a target susceptible to light.", "link": "http://en.wikipedia.org/wiki/Light"}, "a839": {"id": "a839", "title": "Nuclear Fission", "description": "The splitting of the nucleus of an atom into parts (lighter nuclei) often producing free neutrons and other smaller nuclei, which may eventually produce photons (in the form of gamma rays). Fission of heavy elements is an exothermic reaction which can release large amounts of energy both as electromagnetic radiation and as kinetic energy of the fragments (heating the bulk material where fission takes place).", "note": "", "link": "http://en.wikipedia.org/wiki/Nuclear_fission"}, "a840": {"id": "a840", "title": "Nuclear Fusion", "description": "The generation of power by the fusing together of atomic nuclei to form a heavier nucleus.", "note": "", "link": "http://en.wikipedia.org/wiki/Fusion_power"}, "a865": {"id": "a865", "title": "Ozone", "description": "Ozone (O3), or trioxygen, is a triatomic molecule, consisting of three oxygen atoms. It is an allotrope of oxygen that is much less stable than the diatomic allotrope (O2).", "note": "", "link": "http://en.wikipedia.org/wiki/Ozone"}, "a914": {"id": "a914", "title": "Photo-oxidation", "description": "Oxidation facilitated radiant energy such as UV or artificial light. This process is often the most significant component of weather degradation of polymers.", "note": "", "link": "http://en.wikipedia.org/wiki/Photooxidation"}, "a979": {"id": "a979", "title": "Pulsed Magnet", "description": "Pulsed magnets can generate field strengths far in excess of conventional magnets. They come in two types: destructive and non-destructive.", "note": "", "link": "https://en.wikipedia.org/wiki/Pulsed_field_magnet"}, "a987": {"id": "a987", "title": "Pyrolysis", "description": "A thermochemical decomposition of organic material at elevated temperatures in the absence of oxygen. Pyrolysis typically occurs under pressure and at operating temperatures above 430 \u00b0C (800 \u00b0F). Pyrolysis is a special case of thermolysis.", "note": "", "link": "http://en.wikipedia.org/wiki/Pyrolysis"}, "a989": {"id": "a989", "title": "Pyrophoricity", "description": "A pyrophoric substance ignites spontaneously in air at or below 55 degrees centigrade. The creation of sparks from metals is based on the pyrophoricity of small metal particles. The sparking mechanism in cigarette lighters is an example. Some liquids and gases are phyrophoric.", "note": "", "link": "https://en.wikipedia.org/wiki/Pyrophoricity"}, "a997": {"id": "a997", "title": "Radiation", "description": "A process in which energetic particles or waves travel through a medium or space. There are two distinct types of radiation; ionizing and non-ionizing.", "note": "", "link": "http://en.wikipedia.org/wiki/Radiation"}, "a1000": {"id": "a1000", "title": "Radioactive Decay", "description": "The process in which an unstable atomic nucleus spontaneously loses energy by emitting ionizing particles and radiation.", "note": "", "link": "http://en.wikipedia.org/wiki/Radioactive_decay"}, "Segmentation": {"id": "", "title": "Segmentation", "description": "The division of an object into multiple parts.", "note": "", "link": ""}, "Shaking": {"id": "", "title": "Shaking", "description": "Moving something rapidly from side to side.", "note": "", "link": ""}, "a1092": {"id": "a1092", "title": "Shock Wave", "description": "A type of propagating disturbance. Like an ordinary wave, it carries energy and can propagate through a medium (solid, liquid, gas or plasma) or through a field such as the electromagnetic field. Characterized by an abrupt, nearly discontinuous change in the characteristics of the medium. Associated with rapid rise in pressure, temperature and density of the flow. A shock wave travels through most media at a higher speed than an ordinary wave.", "note": "", "link": "http://en.wikipedia.org/wiki/Shock_wave"}, "a1121": {"id": "a1121", "title": "Sonochemistry", "description": "The effect of sonic waves and wave properties on chemical systems. Sonochemistry arises from acoustic cavitation: the formation, growth, and implosive collapse of bubbles in a liquid. This is demonstrated in phenomena such as ultrasound, sonication, sonoluminescence, and sonic cavitation.", "note": "", "link": "http://en.wikipedia.org/wiki/Sonochemistry"}, "a1122": {"id": "a1122", "title": "Sonoluminescence", "description": "The emission of short bursts of light from imploding bubbles in a liquid when excited by sound.", "note": "", "link": "http://en.wikipedia.org/wiki/Sonoluminescence"}, "a1126": {"id": "a1126", "title": "Sound", "description": "A mechanical wave that is an oscillation of pressure transmitted through a solid, liquid, or gas, composed of frequencies within the range of hearing and of a level sufficiently strong to be heard.", "note": "", "link": "http://en.wikipedia.org/wiki/Sound"}, "a1146": {"id": "a1146", "title": "Sputtering", "description": "A process whereby atoms are ejected from a solid target material due to bombardment of the target by energetic ions. It is commonly used for thin-film deposition, etching and analytical techniques", "note": "", "link": "http://en.wikipedia.org/wiki/Sputtering"}, "a1184": {"id": "a1184", "title": "Superhydrophilicity", "description": "Under light irradiation, water dropped onto titanium dioxide forms no contact angle (almost 0 degrees). This effect is called superhydrophilicity. Examples of uses: defogging glass, enabling oil spots to be swept away by water, door mirrors for cars, coatings for buildings, self-cleaning glass, etc. Another use is the property of self-cleaning by the photodecomposition of dirt such as organic compounds adsorbed on the surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Super_hydrophilicity"}, "a1223": {"id": "a1223", "title": "Thermal Shock", "description": "Cracking as a result of rapid temperature change. Thermal shock occurs when a thermal gradient causes different parts of an object to expand by different amounts. This differential expansion can be understood in terms of stress or of strain, equivalently. At some point, this stress overcomes the strength of the material, causing a crack to form. If nothing stops this crack from propagating through the material, it will cause the object's structure to fail.", "note": "", "link": "http://en.wikipedia.org/wiki/Thermal_shock"}, "a1226": {"id": "a1226", "title": "Thermionic Emission", "description": "Emission of electrons or ions caused by thermal vibrational energy . Also known as the Edison Effect.", "note": "", "link": "https://en.wikipedia.org/wiki/Thermionic_emission"}, "a1283": {"id": "a1283", "title": "Ultrasonic Vibration", "description": "Vibration at ultrasonic frequencies.", "note": "", "link": "http://en.wikipedia.org/wiki/Ultrasound"}, "a1284": {"id": "a1284", "title": "Ultrasound", "description": "Cyclic sound pressure with a frequency greater than the upper limit of human hearing. Although this limit varies from person to person, 20 kHz serves as a useful lower limit in describing ultrasound.", "note": "", "link": "http://en.wikipedia.org/wiki/Ultrasound"}, "a1300": {"id": "a1300", "title": "Vibration", "description": "Mechanical oscillations about an equilibrium point. The oscillations may be periodic such as the motion of a pendulum or random such as the movement of a tire on a gravel road.", "note": "", "link": "http://en.wikipedia.org/wiki/Vibration"}, "a1325": {"id": "a1325", "title": "Weathering", "description": "The breaking down of Earth's rocks, soils and minerals through direct contact with the planet's atmosphere. Weathering occurs in situ, or 'with no movement', and thus should not be confused with erosion, which involves the movement of rocks and minerals by agents such as water, ice, wind, and gravity.", "note": "", "link": "http://en.wikipedia.org/wiki/Weathering"}, "a1339": {"id": "a1339", "title": "Wind Power", "description": "The conversion of wind energy into a useful form of energy, such as using wind turbines to make electricity, wind mills for mechanical power, wind pumps for pumping water or drainage, or sails to propel ships.", "note": "", "link": "http://en.wikipedia.org/wiki/Wind_power"}, "a1343": {"id": "a1343", "title": "X-Ray", "description": "A form of electromagnetic radiation. X-rays have a wavelength in the range of 0.01 to 10 nanometers, corresponding to frequencies in the range 30 petahertz to 30 exahertz (3 \u00d7 1016 Hz to 3 \u00d7 1019 Hz) and energies in the range 120 eV to 120 keV. They are shorter in wavelength than UV rays and longer than gamma rays. In many languages, X-radiation is called R\u00f6ntgen radiation.", "note": "", "link": "http://en.wikipedia.org/wiki/X-ray"}, "a353": {"id": "a353", "title": "Electric Spark", "description": "A type of electrostatic discharge that occurs when an electric field creates an ionized electrically conductive channel in air producing a brief emission of light and sound. A spark is formed when the electric field strength exceeds the dielectric field strength of air. This causes an increase in the number of free electrons and ions in the air, temporarily causing the air to become an electrical conductor through dielectric breakdown.", "note": "", "link": "http://en.wikipedia.org/wiki/Electric_spark"}, "a718": {"id": "a718", "title": "Lyot Filter", "description": "A type of optical filter that uses birefringence to produce a narrow passband of transmitted wavelengths", "note": "", "link": "http://en.wikipedia.org/wiki/Lyot_filter"}, "a1347": {"id": "a1347", "title": "Zeeman Effect", "description": "The splitting of a spectral line into several components in the presence of a static magnetic field. The Zeeman effect is very important in applications such as nuclear magnetic resonance spectroscopy, electron spin resonance spectroscopy, magnetic resonance imaging (MRI) and M\u00f6ssbauer spectroscopy. It may also be utilised to improve accuracy in Atomic absorption spectroscopy.", "note": "", "link": "http://en.wikipedia.org/wiki/Zeeman_effect"}, "a801": {"id": "a801", "title": "Molecular Sieve", "description": "A material containing tiny pores of a precise and uniform size that is used as an adsorbent for gases and liquids.", "note": "", "link": "http://en.wikipedia.org/wiki/Molecular_Sieve"}, "a964": {"id": "a964", "title": "Pressure Swing Adsorption", "description": "A technology used to separate some gas species from a mixture of gases under pressure according to the species' molecular characteristics and affinity for an adsorbent material. Special adsorptive materials (e.g., zeolites) are used as a molecular sieve, preferentially adsorbing the target gas species at high pressure. The process then swings to low pressure to desorb the adsorbent material.", "note": "", "link": "http://en.wikipedia.org/wiki/Pressure_Swing_Adsorption"}, "a13": {"id": "a13", "title": "Acoustic Cavitation", "description": "Cavitation induced by an acoustic field. Microscopic gas bubbles which are generally present in a liquid will be forced to oscillate due to an applied acoustic field. If the acoustic intensity is sufficiently high, the bubbles will first grow in size, and then rapidly collapse.  High power ultrasonics usually use the inertial cavitation of microscopic vacuum bubbles for treatment of surfaces, liquids and slurries.", "note": "", "link": "http://en.wikipedia.org/wiki/Sonic_cavitation"}, "a183": {"id": "a183", "title": "Cavitation", "description": "The formation of vapour bubbles in a flowing liquid in a region where the pressure of the liquid falls below its vapour pressure. Usually divided into two classes of behavior. Inertial (or transient) cavitation occurs when a void or bubble in a liquid rapidly collapses, producing a shock wave. Non-inertial cavitation is the process in which a bubble in a fluid is forced to oscillate in size or shape due to energy input, e.g. acoustic field.", "note": "", "link": "http://en.wikipedia.org/wiki/Cavitation"}, "a589": {"id": "a589", "title": "Hydrodynamic Cavitation", "description": "The process of vaporisation, bubble generation and bubble implosion which occurs in a flowing liquid as a result of a decrease and subsequent increase in local pressure.", "note": "", "link": "https://en.wikipedia.org/wiki/Cavitation#Hydrodynamic_cavitation"}, "a1287": {"id": "a1287", "title": "Vacuum Distillation", "description": "A method of distillation whereby the pressure above the liquid mixture to be distilled is reduced to less than its vapour pressure (usually less than atmospheric pressure) causing evaporation of the most volatile liquid(s) (those with the lowest boiling points). This distillation method works on the principle that boiling occurs when the vapour pressure of a liquid exceeds the ambient pressure.", "note": "", "link": "http://en.wikipedia.org/wiki/Vacuum_distillation"}, "a145": {"id": "a145", "title": "Brinelling", "description": "Surface fatigue caused by repeated impact or overloading.", "note": "", "link": "http://en.wikipedia.org/wiki/Brinelling"}, "a257": {"id": "a257", "title": "Crevice Corrosion", "description": "Corrosion occurring in spaces having limited access to working fluid from the environment, such as gaps and contact areas between parts, under gaskets or seals, inside cracks and seams. Generally occurs due to high concentration of impurities in the crevice (e.g., chlorides, acid, or base), or differential electrolyte chemistry inside and outside the crevice: a single metal part being submerged in two different environments.", "note": "", "link": "http://en.wikipedia.org/wiki/Crevice_corrosion"}, "Diamond": {"id": "", "title": "Diamond", "description": "A metastable allotrope of carbon, where the carbon atoms are arranged in a variation of the face-centered cubic crystal structure called a diamond lattice. Diamond is renowned as a material with superlative physical qualities, most of which originate from the strong covalent bonding between its atoms. In particular, diamond has the highest hardness and thermal conductivity of any bulk material.", "note": "For example, by using diamond as a cutting tool or abrasive.", "link": ""}, "a355": {"id": "a355", "title": "Electrical Discharge Machining", "description": "(also referred to as spark machining, spark eroding, burning, die sinking or wire erosion), A manufacturing process whereby a desired shape is obtained using electrical discharges (sparks). Material is removed from the workpiece by a series of rapidly recurring current discharges between two electrodes, separated by a dielectric liquid and subject to an electric voltage.", "note": "", "link": "http://en.wikipedia.org/wiki/Electrical_discharge_machining"}, "a625": {"id": "a625", "title": "Ion Beam", "description": "An ion beam is a type of particle beam consisting of ions. Ion beams have many uses in electronics manufacturing (principally ion implantation) and other industries.", "note": "", "link": "http://en.wikipedia.org/wiki/Ion_beam"}, "a793": {"id": "a793", "title": "Misznay-Schardin Effect", "description": "A characteristic of the detonation of a broad sheet of explosive. The explosive blast expands directly away from (perpendicular to) the surface of an explosive (unlike the blast from a rounded explosive charge)", "note": "", "link": "http://en.wikipedia.org/wiki/Misznay-Schardin_effect"}, "a1022": {"id": "a1022", "title": "Regelation", "description": "The phenomenon of melting under pressure and freezing again when the pressure is reduced. Occurs only for substances, such as ice, that have the property of expanding upon freezing, for the melting points of those substances decrease with increasing external pressure.", "note": "", "link": "http://en.wikipedia.org/wiki/Regelation"}, "a1200": {"id": "a1200", "title": "Synthetic Diamond", "description": "Diamond produced in an artificial process. The properties of synthetic diamond depend on the details of the manufacturing processes; however, some synthetic diamonds have properties such as hardness, thermal conductivity and electron mobility that are superior to those of most naturally-formed diamonds.", "note": "For example, by using diamond as a cutting tool or abrasive.", "link": "http://en.wikipedia.org/wiki/Synthetic_diamond"}, "a236": {"id": "a236", "title": "Conduction (thermal)", "description": "The spontaneous transfer of thermal energy through matter, from a region of higher temperature to a region of lower temperature. Conduction acts to equalize temperature differences. It is also described as heat energy transferred from one material to another by direct contact.", "note": "", "link": "http://en.wikipedia.org/wiki/Heat_conduction"}, "Cooling": {"id": "", "title": "Cooling", "description": "The act of reducing temperature.", "note": "", "link": ""}, "a305": {"id": "a305", "title": "Dielectric Heating", "description": "(also known as electronic heating, RF heating, high-frequency heating) The phenomenon in which radiowave or microwave electromagnetic radiation heats a dielectric material, especially as caused by dipole rotation.", "note": "", "link": "http://en.wikipedia.org/wiki/Dielectric_heating"}, "a786": {"id": "a786", "title": "Microwave Radiation", "description": "Microwaves are electromagnetic waves with wavelengths ranging from as long as one meter to as short as one millimeter, or equivalently, with frequencies between 300 MHz (0.3 GHz) and 300 GHz.", "note": "", "link": "http://en.wikipedia.org/wiki/Microwave"}, "a1251": {"id": "a1251", "title": "Thixotropy", "description": "The property of some non-Newtonian pseudoplastic fluids to show a time-dependent change in viscosity; the longer the fluid undergoes shear stress, the lower its viscosity. A thixotropic fluid is a fluid which takes a finite amount of time to attain equilibrium viscosity when introduced to a step change in shear rate. Many gels and colloids are thixotropic materials, exhibiting a stable form at rest but becoming fluid when agitated.", "note": "Some thixotrophic materials have a divided solid as one of their constituents, e.g. some clays.", "link": "http://en.wikipedia.org/wiki/Thixotropy"}, "a326": {"id": "a326", "title": "Doppler Effect", "description": "The change in frequency and wavelength of a wave for an observer moving relative to the source of the waves. For waves that propagate in a medium, such as sound waves, the velocity of the observer and of the source are relative to the medium in which the waves are transmitted. The total Doppler effect may therefore result from motion of the source, motion of the observer, or motion of the medium.", "note": "", "link": "http://en.wikipedia.org/wiki/Doppler_effect"}, "a531": {"id": "a531", "title": "Goos-H\u00e4nchen Effect", "description": "An optical phenomenon in which linearly polarised light undergoes a small shift, parallel to the direction of propagation, when totally internally reflected. This effect is the linear polarisation analog of the Imbert-Fedorov effect. This occurs because the reflections of a finite sized beam will interfere along a line transverse to the average propagation direction.", "note": "", "link": "http://en.wikipedia.org/wiki/Goos-H%C3%A4nchen_effect"}, "a603": {"id": "a603", "title": "Imbert-Fedorov Effect", "description": "An optical phenomenon in which circularly or elliptically polarized light undergoes a small shift, transverse to the direction of propagation, when totally internally reflected. This effect is the circular polarisation analog of the Goos-H\u00e4nchen effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Imbert-Fedorov_effect"}, "a889": {"id": "a889", "title": "Phase Modulation", "description": "A form of modulation that represents information as variations in the instantaneous phase of a carrier wave. Unlike frequency modulation (FM), PM is not very widely used because it tends to require more complex receiving hardware and there can be ambiguity problems e.g. in determining whether the signal has changed phase by +180\u00b0 or -180\u00b0.", "note": "", "link": "http://en.wikipedia.org/wiki/Phase_modulation"}, "a950": {"id": "a950", "title": "Polarisation", "description": "A property of waves that describes the orientation of their oscillations. For transverse waves such as many electromagnetic waves, it describes the orientation of the oscillations in the plane perpendicular to the wave's direction of travel. The oscillations may be oriented in a single direction (linear polarisation), or the oscillation direction may rotate as the wave travels (circular or elliptical polarisation).", "note": "", "link": "http://en.wikipedia.org/wiki/Polarisation"}, "a1052": {"id": "a1052", "title": "Sagnac Effect", "description": "(or Sagnac interference) An interferometry phenomenon elicited by rotation.  A beam of light is split and the two beams made to follow a trajectory in opposite directions enclosing an area. On return to entry point the light is allowed to exit the apparatus such that an interference pattern is obtained. The position of the interference fringes is dependent on the angular velocity of the setup. The basis of ring interferometry.", "note": "", "link": "http://en.wikipedia.org/wiki/Sagnac_effect"}, "Capillary Evaporation": {"id": "", "title": "Capillary Evaporation", "description": "The transport of a liquid from within a capillary system (e.g. a block of porous material) and the subsequent evaporation from its surface.", "note": "By lowering temperature through latent heat of evaporation", "link": ""}, "a730": {"id": "a730", "title": "Magnetic Refrigeration", "description": "A cooling technology based on the magnetocaloric effect. This technique can be used to attain extremely low temperatures (well below 1 K), as well as the ranges used in common refrigerators, depending on the design of the system.", "note": "", "link": "http://en.wikipedia.org/wiki/Magnetic_refrigeration"}, "a976": {"id": "a976", "title": "Pulse Tube Refrigerator", "description": "A type of cryocooler having no moving parts in the low temperature part of the device making it suitable for a wide variety of applications.", "note": "", "link": "http://en.wikipedia.org/wiki/Pulse_tube_refrigerator"}, "a31": {"id": "a31", "title": "Adiabatic Heating", "description": "Adiabatic heating occurs when the pressure of a gas is increased from work done on it by its surroundings, e.g. a piston. Diesel engines rely on adiabatic heating during their compression stroke to elevate the temperature sufficiently to ignite the fuel.", "note": "", "link": "http://en.wikipedia.org/wiki/Adiabatic_process#Adiabatic_heating_and_cooling"}, "a90": {"id": "a90", "title": "Avalanche Breakdown", "description": "A phenomenon that can occur in both insulating and semiconducting materials (solids, liquids, or gases), allowing very large currents to flow within materials which are otherwise good insulators. Occurs when the electric field in the material is great enough to accelerate free electrons to the point that, when they strike atoms in the material, they can knock other electrons free: the number of free electrons is thus increased rapidly as newly generated particles become part of the process.", "note": "", "link": "http://en.wikipedia.org/wiki/Avalanche_breakdown"}, "a211": {"id": "a211", "title": "Coagulation", "description": "A complex process by which blood forms clots. It is an important part of hemostasis (the cessation of blood loss from a damaged vessel) whereby a damaged blood vessel wall is covered by a platelet and fibrin containing clot to stop bleeding and begin repair of the damaged vessel.", "note": "In the sense of a liquid (blood) changing to a solid form (clot).", "link": "http://en.wikipedia.org/wiki/Coagulation"}, "a463": {"id": "a463", "title": "Flash Evaporation", "description": "Flash (or partial) evaporation is the partial vaporisation that occurs when a saturated liquid stream undergoes a reduction in pressure by passing through a throttling valve or other throttling device. If the throttling valve or device is located at the entry into a pressure vessel so that the flash evaporation occurs within the vessel, then the vessel is often referred to as a flash drum.", "note": "", "link": "http://en.wikipedia.org/wiki/Flash_evaporation"}, "a496": {"id": "a496", "title": "Freeze Drying", "description": "(also known as lyophilisation or cryodesiccation)  A dehydration process performed by freezing a material and then reducing the surrounding pressure and adding enough heat to allow the frozen water in the material to sublime directly from the solid phase to gas.", "note": "", "link": "http://en.wikipedia.org/wiki/Freeze_drying"}, "a684": {"id": "a684", "title": "Leidenfrost Effect", "description": "A phenomenon in which a liquid, in near contact with a mass significantly hotter than its boiling point, produces an insulating vapour layer which keeps that liquid from boiling rapidly. Due to this repulsive force, the droplet hovers over the surface rather than making physical contact with it. Commonly seen in the case of droplets of water skittering across a very hot metal surface.", "note": "", "link": "http://en.wikipedia.org/wiki/Leidenfrost_effect"}, "a748": {"id": "a748", "title": "Magnetostriction", "description": "A property of ferromagnetic materials that causes them to change their shape or dimensions during the process of magnetisation. The variation of material's magnetisation due to the applied magnetic field changes the magnetostrictive strain until reaching its saturation value. This effect can cause losses due to frictional heating in susceptible ferromagnetic cores.", "note": "Through heating resulting from collapse of cavitation bubbles resulting from the manetostriction effect on a magnetic liquid.", "link": "http://en.wikipedia.org/wiki/Magnetostriction"}, "a790": {"id": "a790", "title": "Mineral Hydration", "description": "An inorganic chemical reaction where water is added to the crystal structure of a mineral, usually creating a new mineral, usually called a hydrate.There are two main ways in which minerals hydrate. One is conversion of an oxide to a double hydroxide, e.g. hydration of calcium oxide - CaO - to calcium hydroxide - Ca(OH)2, the other is incorporation of water molecules directly into the crystalline structure of the mineral, e.g. the hydration of feldspars to clay minerals. Hydration is the mechanism by which Portland cement develops strength.", "note": "", "link": "http://en.wikipedia.org/wiki/Mineral_hydration"}, "a1143": {"id": "a1143", "title": "Spray", "description": "When a liquid is dispersed as a stream of droplets (atomisation), it is called a spray. Spray nozzles are used to achieve two primary functions: increase liquid surface area to enhance evaporation, or distribute a liquid over an area.", "note": "", "link": "http://en.wikipedia.org/wiki/Spray_nozzle"}, "a1176": {"id": "a1176", "title": "Supercritical Drying", "description": "A process to remove liquid by changing into the gas form without crossing any phase boundary, instead passing through the supercritical region, where the distinction between gas and liquid ceases to apply.  Densities of the liquid phase and vapour phase become equal at critical point of drying.", "note": "", "link": "http://en.wikipedia.org/wiki/Supercritical_drying"}, "a138": {"id": "a138", "title": "Brazil Nut Effect", "description": "A phenomenon in which the largest particles end up on the surface when a granular material containing a mixture of objects of different sizes is shaken. Also known as the muesli effect.", "note": "", "link": "http://en.wikipedia.org/wiki/Brazil_nut_effect"}, "a208": {"id": "a208", "title": "Chromatography", "description": "A family of laboratory techniques for the separation of mixtures. It involves passing a mixture dissolved in a 'mobile phase' through a stationary phase, which separates the analyte to be measured from other molecules in the mixture and allows it to be isolated. Chromatography may be preparative or analytical.", "note": "", "link": "http://en.wikipedia.org/wiki/Chromatography"}, "a291": {"id": "a291", "title": "Desiccant Material", "description": "A hygroscopic substance that induces or sustains a state of dryness (desiccation) in its local vicinity", "note": "By absorbing water and any asscoiated contaminants.", "link": "http://en.wikipedia.org/wiki/Dessicant"}, "a493": {"id": "a493", "title": "Free Fall", "description": "The motion of a body where gravity is the only or dominant force acting upon it, at least initially.", "note": "If contaminants have different drag characteristics.", "link": "http://en.wikipedia.org/wiki/Freefall"}, "Purification": {"id": "", "title": "Purification", "description": "The process of rendering something pure, i.e. clean of foreign elements", "note": "", "link": ""}, "a1031": {"id": "a1031", "title": "Reverse Brazil Nut Effect", "description": "Under certain conditions the reverse of the Brazil Nut Effect (granular separation) can occur i.e. following vibration or agitation large beads fall to the bottom of a container, and small beads rising to the top of the container.", "note": "", "link": "http://large.stanford.edu/courses/2007/ph210/spector2/"}, "a289": {"id": "a289", "title": "Depth of Field", "description": "In optics, particularly as it relates to film and photography, depth of field is the distance between the nearest and farthest objects in a scene that appear acceptably sharp in an image.", "note": "", "link": "http://en.wikipedia.org/wiki/Depth_of_field"}, "a302": {"id": "a302", "title": "Dichroic Filter", "description": "A colour filter based on the use of the principle of interference, typically used to selectively pass light of a small range of colours while reflecting other colours", "note": "", "link": "http://en.wikipedia.org/wiki/Dichroic_filters"}, "a306": {"id": "a306", "title": "Dielectric Mirror", "description": "A mirror composed of multiple thin layers of dielectric material, typically deposited on a substrate of glass or some other optical material. By careful choice of the type and thickness of the dielectric layers, one can design an optical coating with specified reflectivity at different wavelengths of light.", "note": "", "link": "http://en.wikipedia.org/wiki/Dielectric_mirror"}, "a162": {"id": "a162", "title": "Capillary Condensation", "description": "The process by which multilayer adsorption from the vapour phase into a porous medium proceeds to the point at which pore spaces become filled with condensed liquid from the vapour phase. The unique aspect of capillary condensation is that vapor condensation occurs below the saturation vapor pressure of the pure liquid.  Can affect contact between solids, modifying macroscopic adhesion & friction properties.", "note": "", "link": "http://en.wikipedia.org/wiki/Capillary_condensation"}, "a886": {"id": "a886", "title": "Permeation", "description": "The penetration of a permeate (such as a liquid, gas, or vapour) through a solid. The permeate always migrates to the lower concentration in three steps:  1. Sorption (at the interface); 2. Diffusion (through the solid); 3. Desorption (the adsorbate leaves the solid as a gas).", "note": "", "link": "http://en.wikipedia.org/wiki/Permeation"}, "a1290": {"id": "a1290", "title": "Valve", "description": "A device that regulates the flow of a fluid (gases, liquids, fluidised solids, or slurries) by opening, closing, or partially obstructing various passageways.", "note": "", "link": "http://en.wikipedia.org/wiki/Valve"}, "a323": {"id": "a323", "title": "Distillation", "description": "A method of separating mixtures based on differences in their volatilities in a boiling liquid mixture.", "note": "", "link": "http://en.wikipedia.org/wiki/Distillation"}, "a887": {"id": "a887", "title": "Pervaporation", "description": "A method for the separation of mixtures of liquids by partial vaporisation through a non-porous or porous membrane. The name is derived from the two basic steps of the process, firstly the permeation through the membrane by the permeate, then its evaporation into the vapor phase. This process is used by a number of industries for several different processes, including purification and analysis, due to its simplicity and in-line nature.", "note": "", "link": "http://en.wikipedia.org/wiki/Pervaporation"}, "a1033": {"id": "a1033", "title": "Reverse Osmosis", "description": "The process of forcing a solvent from a region of high solute concentration through a semipermeable membrane to a region of low solute concentration by applying a pressure in excess of the osmotic pressure. The result is that the solute is retained on the pressurized side of the membrane and the pure solvent is allowed to pass to the other side. It is most often applied as a filter.", "note": "", "link": "http://en.wikipedia.org/wiki/Reverse_osmosis"}, "a1266": {"id": "a1266", "title": "Tribocorrosion", "description": "A material degradation process due to the combined effect of corrosion and wear.", "note": "", "link": "http://en.wikipedia.org/wiki/Tribocorrosion"}, "a79": {"id": "a79", "title": "Archimedes Screw", "description": "A device with a revolving screw-shaped blade inside a cylinder that can be used for pumping liquids and semifluid solids such as coal and grain.", "note": "", "link": "https://en.wikipedia.org/wiki/Archimedes"}, "a89": {"id": "a89", "title": "Auxetic Voids", "description": "Auxetic Materials or Structures containing holes, pores, cavities or other voids. These voids repsond differently to stretching compared to those conventional materials or structures. For example, pores in a stretched auxetic material, or cells in an auxetic honeycomb will open up in both the lateral and stretching directions.", "note": "", "link": "http://www.azom.com/details.asp?ArticleID=167"}, "a96": {"id": "a96", "title": "Ball", "description": "A round, usually spherical but sometimes ovoid, object with various uses.", "note": "", "link": "http://en.wikipedia.org/wiki/Ball"}, "a156": {"id": "a156", "title": "Cam", "description": "A projecting part of a rotating wheel or shaft that strikes a lever at one or more points on its circular path. The cam can be a simple tooth, as is used to deliver pulses of power to a steam hammer, for example, or an eccentric disc or other shape that produces a smooth reciprocating (back and forth) motion. A device that translates movement from circular to reciprocating (or sometimes oscillating)", "note": "", "link": "http://en.wikipedia.org/wiki/Cam"}, "a292": {"id": "a292", "title": "Desiccation", "description": "The process of extreme drying.", "note": "", "link": "http://en.wikipedia.org/wiki/Dessication"}, "a299": {"id": "a299", "title": "Diamond Anvil Cell", "description": "A hand-top device used in scientific experiments. It allows compressing a small (sub-millimeter sized) piece of material to extreme pressures, which can exceed 3,000,000 atmospheres (300 gigapascals). The device has been used to recreate the pressure existing deep inside planets, creating materials and phases not observed under normal conditions.", "note": "", "link": "http://en.wikipedia.org/wiki/Diamond_anvil_cell"}, "a338": {"id": "a338", "title": "Eccentric", "description": "A rotating object (typically circular) having its centre offset from the axis of rotation. It can be used, for example, to convert rotary into linear reciprocating motion.", "note": "", "link": "http://en.wikipedia.org/wiki/Eccentric_(mechanism)"}, "Elastic Recovery": {"id": "", "title": "Elastic Recovery", "description": "The tendancy of a material that has been stretched to return to its original shape.", "note": "", "link": ""}, "Electromagnetic Stirring": {"id": "", "title": "Electromagnetic Stirring", "description": "When an electric current flows through a conducting fluid in the presence of a magnetic field a force (Lorenz Force) is generated, causing movement of the fluid.", "note": "", "link": ""}, "a437": {"id": "a437", "title": "Explosive Welding", "description": "A solid state process where welding is accomplished by accelerating one of the components at extremely high velocity through the use of chemical explosives. Explosion welding can produce a bond between two metals that cannot necessarily be welded by conventional means. The process does not melt either metal, instead it plasticises the surfaces of both metals, causing them to come into intimate contact sufficient to create a weld.", "note": "", "link": "http://en.wikipedia.org/wiki/Explosive_welding"}, "a561": {"id": "a561", "title": "Helix", "description": "A special kind of space curve, i.e. a smooth curve in three-space. A helix is characterised by the fact that the tangent line at any point makes a constant angle with a fixed line.", "note": "", "link": "http://en.wikipedia.org/wiki/Helix"}, "a580": {"id": "a580", "title": "Hot Isostatic Pressing", "description": "A manufacturing process used to reduce the porosity of metals and influence the density of many ceramic materials. This improves the mechanical properties, workability and ceramic density. The HIP process subjects a component to both elevated temperature and isostatic gas pressure in a high pressure containment vessel.", "note": "", "link": "http://en.wikipedia.org/wiki/Hot_isostatic_pressing"}, "a686": {"id": "a686", "title": "Length Contraction", "description": "The physical phenomenon of a decrease in length detected by an observer of objects that travel at any non-zero velocity relative to that observer. This contraction is usually only noticeable at a substantial fraction of the speed of light; the contraction is only in the direction parallel to the direction in which the observed body is travelling.", "note": "", "link": "http://en.wikipedia.org/wiki/Length_contraction"}, "a828": {"id": "a828", "title": "Negative Thermal Expansion", "description": "A physicochemical process in which some materials contract upon heating rather than expanding as most materials do. Materials which undergo this unusual process have a range of potential engineering, photonic, electronic, and structural applications. For example, mixing a negative thermal expansion material with a 'normal' material which expands on heating, could result in a zero expansion composite material.", "note": "", "link": "http://en.wikipedia.org/wiki/Negative_thermal_expansion"}, "a847": {"id": "a847", "title": "Oloid", "description": "A three-dimensional solid formed by taking the convex hull of the shape made by intersecting two disks of equal radius at
