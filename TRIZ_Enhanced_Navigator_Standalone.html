"title": "Laser Surface Velocimeter", "description": "A non-contact optical sensor measuring velocity and length on moving surfaces. Laser surface velocimeters use the laser Doppler principle to evaluate the laser light scattered back from a moving object. They are widely used for process and quality control in industrial production processes.", "note": "", "link": "http://en.wikipedia.org/wiki/Laser_surface_velocimeter"}, "a1118": {"id": "a1118", "title": "Sonic Anemometer", "description": "A Sonic Anemometer uses ultrasonic sound waves to measure wind velocity based on the time of flight of sonic pulses between pairs of transducers. Measurements from pairs of transducers can be combined to yield a measurement of velocity in 1-, 2-, or 3-dimensional flow. Sonic anemometers can take measurements with very fine temporal resolution, 20 Hz or better, which makes them well suited for turbulence measurements.", "note": "", "link": "http://en.wikipedia.org/wiki/Anemometer#Sonic_anemometers"}, "a925": {"id": "a925", "title": "Piezoelectric Accelerometer", "description": "An accelerometer that exploits the piezoelectric effect of certain materials to measure dynamic changes in mechanical variables. (e.g. acceleration, vibration, and mechanical shock)", "note": "Force is related to acceleration for a given mass", "link": "http://en.wikipedia.org/wiki/Piezoelectric_accelerometer"}, "a503": {"id": "a503", "title": "Friction Coefficient", "description": "A dimensionless scalar value which describes the ratio of the force of friction between two bodies and the force pressing them together. The coefficient of friction depends on the materials used; for example, ice on steel has a low coefficient of friction, while rubber on pavement has a high coefficient of friction.", "note": "", "link": "http://en.wikipedia.org/wiki/Friction_coefficient"}, "a144": {"id": "a144", "title": "Brinell Scale", "description": "The Brinell scale characterises the indentation hardness of materials through the scale of penetration of an indenter, loaded on a material test-piece", "note": "", "link": "http://en.wikipedia.org/wiki/Brinell_scale"}, "a636": {"id": "a636", "title": "Janka Hardness Test", "description": "The Janka hardness test measures the hardness of wood. It involves measuring the force required to embed a 11.28 millimeter (0.444 inch) steel ball into wood to half its diameter. This method was chosen so that the result would leave an indention 100 square millimeters in size. It is one of the best measures of the ability of a wood species to withstand denting and wear. It is also a good indicator of how hard a species is to saw or nail.", "note": "", "link": "http://en.wikipedia.org/wiki/Janka_hardness_test"}, "a658": {"id": "a658", "title": "Knoop Hardness Test", "description": "The Knoop hardness test is a microhardness test - a test for mechanical hardness used particularly for very brittle materials or thin sheets, where only a small indentation may be made for testing purposes. A pyramidal diamond point is pressed into the polished surface of the test material with a known force, for a specified dwell time, and the resulting indentation is measured using a microscope.", "note": "", "link": "http://en.wikipedia.org/wiki/Knoop_hardness_test"}, "a776": {"id": "a776", "title": "Meyer Hardness Test", "description": "A hardness test based upon projected area of an impression. The principle behind the test is that the mean pressure required to test the material is the measurement of the hardness of the material.", "note": "", "link": "http://en.wikipedia.org/wiki/Meyer_hardness_test"}, "a814": {"id": "a814", "title": "Nanoindentation", "description": "A technique for measuring hardness (and other mechanical propeerties) of materials using an array of nano-sized intenting tips, having very precise tip shape, high spatial resolutions to place the indents. Real-time load-displacement (into the surface) data is provided while the indentation is in progress.", "note": "", "link": "http://en.wikipedia.org/wiki/Nanoindentation"}, "a1093": {"id": "a1093", "title": "Shore Durometer", "description": "A hardness test that measures the depth of an indentation in the material created by a given force on a standardized presser foot.", "note": "", "link": "http://en.wikipedia.org/wiki/Shore_durometer"}, "a1302": {"id": "a1302", "title": "Vickers Hardness Test", "description": "A method for measuring hardness based on using a specially shaped diamond intenter.", "note": "", "link": "http://en.wikipedia.org/wiki/Vickers_hardness_test"}, "a800": {"id": "a800", "title": "Moir\u00e9 Interferometry", "description": "A technique to study strains and deformations of structural elements with very high accuracy.", "note": "", "link": "http://materials.open.ac.uk/staff/staff_sg02.htm"}, "a598": {"id": "a598", "title": "Hygrometer", "description": "An instrument used for measuring the moisture content in the environment. Humidity measurement instruments usually rely on measurements of some other quantity such as temperature, pressure, mass or a mechanical or electrical change in a substance as moisture is absorbed.", "note": "", "link": "http://en.wikipedia.org/wiki/Hygrometer"}, "a1123": {"id": "a1123", "title": "Sonomicrometry", "description": "A technique for measuring the distance between piezoelectric crystals based on the speed of acoustic signals through the medium they are embedded in. One crystal is used to generate a sound pulse which travels across the gap and is detected by the other crystal - the time taken is used to calculate the distance between the crystals.", "note": "", "link": "http://en.wikipedia.org/wiki/Sonomicrometry"}, "a548": {"id": "a548", "title": "Haidinger's Brush", "description": "An entoptic phenomenon. Many people are able to perceive polarisation of light. It may be seen as a yellowish horizontal bar or bow-tie shape (with 'fuzzy' ends, hence the name 'brush') visible in the center of the visual field against the blue sky viewed while facing away from the sun, or on any bright background when looking through polarized sunglasses.", "note": "", "link": "http://en.wikipedia.org/wiki/Haidinger%27s_brush"}, "Inverse Peltier Effect": {"id": "", "title": "Inverse Peltier Effect", "description": "", "note": "", "link": ""}, "a943": {"id": "a943", "title": "Plastometer", "description": "A tool used to determine the flow properties of plastic materials.", "note": "", "link": "http://en.wikipedia.org/wiki/Plastometer"}, "a600": {"id": "a600", "title": "Hysteresis", "description": "A system with hysteresis can be summarized as a system that may be in any number of states, independent of the inputs to the system. To be exact, a system with hysteresis exhibits path-dependence, or 'rate-independent memory'", "note": "", "link": "http://en.wikipedia.org/wiki/Hysteresis"}, "a137": {"id": "a137", "title": "Brayton Cycle", "description": "A thermodynamic cycle that describes the workings of the gas turbine engine, the basis of the jet engine and others", "note": "", "link": "http://en.wikipedia.org/wiki/Bell_Coleman_cycle#Reverse_Brayton_cycle"}, "a173": {"id": "a173", "title": "Carnot Cycle", "description": "A particular thermodynamic cycle, modeled on the hypothetical Carnot heat engine. The Carnot cycle is the most efficient cycle possible for converting a given amount of thermal energy into work or, conversely, for using a given amount of work for refrigeration purposes.", "note": "", "link": "http://en.wikipedia.org/wiki/Carnot_cycle"}, "a424": {"id": "a424", "title": "Ericsson Cycle", "description": "The limit of ideal gas-turbine Brayton cycle, operating with multistage intercooled compression, and multistage expansion with reheat and regeneration. Compared to the Brayton cycle which uses adiabatic compression and expansion, the (second) Ericsson cycle uses isothermal compression and expansion, thus producing more net work per stroke. Also the use of regeneration in the Ericsson cycle increases efficiency by reducing the required heat input.", "note": "", "link": "http://en.wikipedia.org/wiki/Ericsson_cycle"}, "a1005": {"id": "a1005", "title": "Rankine Cycle", "description": "A thermodynamic cycle which converts heat into work. The heat is supplied externally to a closed loop, which usually uses water as the working fluid. This cycle generates about 80% of all electric power used throughout the world, including virtually all solar thermal, biomass, coal and nuclear power plants.", "note": "", "link": "http://en.wikipedia.org/wiki/Rankine_cycle"}, "a1160": {"id": "a1160", "title": "Stoddard Engine", "description": "An external combustion engine with valves and single-phase gaseous working fluid (i.e. a 'hot air engine'). The internal working fluid was originally air, although in modern versions, other gases such as helium or hydrogen may be used.", "note": "", "link": "http://en.wikipedia.org/wiki/Stoddard_engine"}, "a123": {"id": "a123", "title": "Blinovitch Limitation Effect", "description": "A fictional principle of time travel physics (and, as such, not to be taken seriously)", "note": "", "link": "http://en.wikipedia.org/wiki/Blinovitch_Limitation_Effect"}, "a83": {"id": "a83", "title": "Atomic Battery", "description": "A device which uses the emissions from a radioactive isotope to generate electricity.", "note": "", "link": "http://en.wikipedia.org/wiki/Atomic_battery"}, "a82": {"id": "a82", "title": "Atkinson Cycle", "description": "A type of internal combustion engine invented by James Atkinson in 1882. The Atkinson cycle is designed to provide efficiency at the expense of power and is beginning to see applications in modern hybrid electric applications.", "note": "", "link": "http://en.wikipedia.org/wiki/Atkinson_cycle"}, "a308": {"id": "a308", "title": "Diesel Cycle", "description": "The thermodynamic cycle which approximates the pressure and volume of the combustion chamber of the Diesel engine. It is characterised by having constant pressure during the 'combustion' phase. This is in contrast to the Otto cycle which is an idealisation of the process in a petrol engine, which approximates the real behavior with constant volume during that phase.", "note": "", "link": "http://en.wikipedia.org/wiki/Diesel_cycle"}, "a114": {"id": "a114", "title": "Biefeld-Brown Effect", "description": "An electrical effect that produces an ionic wind that transfers its momentum to surrounding neutral particles", "note": "An ion wind is usually accompanied by a hissing noise due to the changes in air pressure.", "link": "http://en.wikipedia.org/wiki/Biefeld%E2%80%93Brown_effect"}, "Kerr Cell": {"id": "", "title": "Kerr Cell", "description": "A light modulator consisting of a liquid cell between crossed polaroids. Light transmission is modulated by an applied electric field.", "note": "", "link": ""}, "a797": {"id": "a797", "title": "MOEMS", "description": "Micro-opto-electromechanical systems (MOEMS) are a special class of Micro-electro-mechanical systems (MEMS) which involves sensing or manipulating optical signals on a very small size scale using integrated mechanical and electrical systems.", "note": "", "link": "http://en.wikipedia.org/wiki/MOEMS"}, "a101": {"id": "a101", "title": "Barlow's Wheel", "description": "An early demonstration of a homopolar motor.  An electric current passes through the hub of a round metal disk to a mercury contact on the rim, contained in a small trough through which the rim passes. Brine is sometimes used today in place of mercury. The interaction of the current with the magnetic field of a U-magnet causes the wheel to rotate.", "note": "", "link": "http://en.wikipedia.org/wiki/Barlow%27s_Wheel"}, "a382": {"id": "a382", "title": "Electromagnetic Propulsion", "description": "The principle of accelerating an object by using a flowing electrical current and magnetic fields. The electrical current is used to either create an opposing magnetic field, or to charge a fluid, which can then be repelled.", "note": "", "link": "http://en.wikipedia.org/wiki/Electromagnetic_propulsion"}, "a977": {"id": "a977", "title": "Pulsed Inductive Thruster", "description": "A form of ion thruster, used in spacecraft propulsion that uses perpendicular electric and magnetic fields to accelerate a propellant.", "note": "", "link": "http://en.wikipedia.org/wiki/Pulsed_inductive_thruster"}, "a432": {"id": "a432", "title": "Excentric", "description": "A circular disk (eccentric sheave) solidly fixed to a rotating axle with its centre offset from that of the axle.", "note": "", "link": "https://en.wikipedia.org/wiki/Eccentric_%28mechanism%29"}, "a486": {"id": "a486", "title": "Four-Bar Linkage", "description": "The simplest movable closed chain linkage. It consists of four bodies, called bars or links, connected in a loop by four joints. Generally, the joints are configured so the links move in parallel planes, and the assembly is called a planar four-bar linkage.", "note": "", "link": "http://en.wikipedia.org/wiki/Four-bar_linkage"}, "a519": {"id": "a519", "title": "Geneva Drive", "description": "(or Maltese cross) is a gear mechanism that translates a continuous rotation into an intermittent rotary motion. The rotating drive wheel has a pin that reaches into a slot of the driven wheel advancing it by one step. The drive wheel also has a raised circular blocking disc that locks the driven wheel in position between steps.", "note": "", "link": "http://en.wikipedia.org/wiki/Geneva_drive"}, "a866": {"id": "a866", "title": "Pantograph", "description": "A mechanical linkage connected in a manner based on parallelograms so that the movement of one pen, in tracing an image, produces identical movements in a second pen.", "note": "", "link": "https://en.wikipedia.org/wiki/Pantograph"}, "a1187": {"id": "a1187", "title": "Superparamagnetism", "description": "A form of magnetism, which appears in small ferromagnetic or ferrimagnetic nanoparticles. In sufficiently small nanopart r property from an object", "examples": ["Non-smoking areas in restaurants or in railway carriages", "Children-only areas in public places and home", "Sunday school", "Public bars and lounge bars in pubs", "Women or men only bars / waiting rooms", "Air Conditioning in the room where you want it with the noise of the system outside the room"]}, {"id": "B", "explanation": "Extract the only necessary part (or property) of an object", "examples": ["Scarecrow", "Sound of a barking dog (with no dog) as a burglar alarm", "Economy class on planes (travel but no frills)"]}]}, "3": {"id": "3", "title": "Local quality", "sub_principles": [{"id": "A", "explanation": "Change of an object's structure from uniform to non-uniform", "examples": ["Reduce drag on aerodynamic surfaces by adding riblets or 'shark-skin' protrusions", "Moulded hand grips on tools", "Drink cans shaped to facilitate stable stacking", "Material surface treatments / coatings - plating,", "Erosion / corrosion protection, case hardening, non-stick, etc"]}, {"id": "B", "explanation": "Change an action or an external environment (or external influence) from uniform to non-uniform", "examples": ["Introduce turbulent flow around an object to alter heat transfer properties", "Strobe lighting", "Take account of extremes of weather conditions when designing outdoor systems", "Use a gradient instead of constant temperature, density, or pressure"]}, {"id": "C", "explanation": "Make each part of an object function in conditions most suitable for its operation", "examples": ["Freezer compartment in refrigerator", "Different zones in the combustion system of an engine", "Night-time adjustment on a rear-view mirror", "Lunch box with special compartments for hot and cold solid foods and for liquids"]}, {"id": "D", "explanation": "Make each part of an object fulfil a different and/or complementary useful function", "examples": ["Swiss-Army knife", "Combined can and bottle opener", "Sharp and blunt end of a drawing pin", "Rubb uid atomisation from a spray nozzle", "Optical phase modulator"]}, {"id": "E", "explanation": "Use combined ultrasonic and electromagnetic field oscillations", "examples": ["Mixing alloys in an induction furnace", "Sono-chemistry", "Ultrasonic drying of films \u2013 combine ultrasonic with heat source"]}]}, "19": {"id": "19", "title": "Periodic Action", "sub_principles": [{"id": "A", "explanation": "Instead of continuous action, use periodic or pulsating actions", "examples": ["Hitting something repeatedly with a hammer", "Pile drivers and hammer drills exert far more force for a given weight", "Replace a continuous siren with a pulsed sound", "Pulsed bicycle lights make cyclist more noticeable to drivers", "Pulsed vacuum cleaner suction improves collection performance", "Pulsed water jet cutting", "ABS car braking systems"]}, {"id": "B", "explanation": "If an action is already periodic, change the periodic magnitude or frequency", "examples": ["Improve a pulsed siren with changing amplitude and frequency", "Dots and dashes in Morse Code transmissions", "Use AM, FM, PWM to transmit information"]}, {"id": "C", "explanation": "Use pauses between actions to perform a different action", "examples": ["Clean barrier filters by back-flushing them when not in use", "Inkjet printer cleans heads between passes", "Brush between suction pulses in vacuum cleaner", "Multiple conversations on the same telephone transmission line", "Use of energy storage means \u2013 e.g. batteries, fly-wheels, etc"]}]}, "20": {"id": "20", "title": "Continuity of Useful Action", "sub_principles": [{"id": "A", "explanation": "Carry on work without a break. All parts of an object operating constantly at full capacity", "examples": ["Flywheel stores energy when a vehicle stops, so the motor can keep running at optimum power", "Constant output gas turbine in hybrid car, or APU in aircraft, runs at highest efficiency all the time it is switched on", "Constant speed / variable pitch propeller", "Self-tuning engine \u2013 constantly tunes itself to ensure maximum efficiency", "Heart pacemaker", "Improve composting process by continuously turning material", "Continuous glass or steel production"]}, {"id": "B", "explanation": "Eliminate all idle or intermittent motion", "examples": ["Self-cleaning / self-emptying filter eliminates down-time", "Print during the return of a printer carriage - dot matrix printer, daisy wheel printers, inkjet printers", "Digital storage media allow \u2018instant\u2019 information access", "Kayaks use double-ended paddle to utilise recovery stroke", "Computer operating systems utilise idle periods to perform necessary housekeeping tasks"]}]}, "21": {"id": "21", "title": "Rushing Through", "sub_principles": [{"id": "A", "explanation": "Conduct a process, or certain stages of it (e.g. destructible, harmful or hazardous operations) at high speed", "examples": ["Cut plastic faster than heat can propagate in the material, to avoid deforming the shape", "Shatter toffee with a hammer blow", "Drop forge", "Flash photography", "Super-critical shaft \u2013 run through resonant modes quickly", "Bikini waxing (ouch!)"]}]}, "22": {"id": "22", "title": "Blessing in Disguise", "sub_principles": [{"id": "A", "explanation": "Use harmful factors (particularly, harmful effects of the environment or surroundings) to achieve a positive effect", "examples": ["Use waste heat to generate electric power", "Recycle scrap material as raw materials for another \u2013 e.g. chipboard", "Vaccination", "Lower body temperature to slow metabolism during operations", "Composting", "Use centrifugal energy in rotating shaft to do something useful \u2013 e.g. seal, or modulate cooling air", "Use pressure differences to help rather than hinder seal performance"]}, {"id": "B", "explanation": "Eliminate the primary harmful action by adding it to another harmful action to resolve the problem", "examples": ["Add a buffering material to a corrosive solution (e.g. an alkali to an acid, or vice versa)", "Use a helium-oxygen mix for diving, to eliminate both nitrogen narcosis and oxygen poisoning from air and other nitrox mixes", "Use gamma rays to detect positron emissions from explosives"]}, {"id": "C", "explanation": "Amplify a harmful factor to such a degree that it is no longer harmful", "examples": ["Use a backfire to eliminate the fuel from a forest fire", "Use explosives to blow out an oil-well fire", "Laser-knife cauterises skin/blood vessels as it cuts"]}]}, "23": {"id": "23", "title": "Feedback", "sub_principles": [{"id": "A", "explanation": "Introduce feedback to improve a process or action", "examples": ["Automatic volume control in audio circuits", "Signal from gyrocompass is used to control simple aircraft autopilots", "Engine management system based on exhaust gas levels is more efficient than carburettor", "Thermostat controls temperature accurately", "Statistical Process Control - measurements are used to decide when to modify a process", "Feedback turns inaccurate op-amp into useable accurate amplifier"]}, {"id": "B", "explanation": "If feedback is already used, change its magnitude or influence in accordance with operating conditions", "examples": ["Change sensitivity of an autopilot when within 5 miles of an airport", "Change sensitivity of a thermostat when cooling vs. heating, since it uses energy less efficiently when cooling", "Use proportional, integral and/or differential control algorithm combinations"]}]}, "24": {"id": "24", "title": "Intermediary", "sub_principles": [{"id": "A", "explanation": "Use an intermediary carrier article or intermediary process", "examples": ["Play a guitar with a plectrum", "Use a chisel to control rock breaking/sculpting process", "Dwell period during a manufacture process operation"]}, {"id": "B", "explanation": "Merge one object temporarily with another (which can be easily removed)", "examples": ["Gloves to get hot dishes out of an oven", "Joining papers with a paper clip", "Introduction of catalysts into chemical reaction", "Abrasive particles enhance water jet cutting", "Bouquet garni in cooking"]}]}, "25": {"id": "25", "title": "Self-Service", "sub_principles": [{"id": "A", "explanation": "An object must service itself by performing auxiliary helpful functions", "examples": ["A soda fountain pump that runs on the pressure of the carbon dioxide used to carbonate the drinks. If it won\u2019t fizz it\u2019s empty!", "Halogen lamps regenerate the filament - evaporated material is redeposited", "Self-aligning / self-adjusting seal", "Self-cleaning oven / glass / material", "Abradable materials used in gas turbines such that initial running-in \u2018cuts\u2019 optimum seals into lining"]}, {"id": "B", "explanation": "Use waste resources, energy, or substances", "examples": ["Use heat from a process to generate electricity: co-generation", "Use animal waste as fertilizer", "Use food and lawn waste to create compost", "Use pressure difference to reinforce seal action"]}]}, "26": {"id": "26", "title": "Copying", "sub_principles": [{"id": "A", "explanation": "Replace unavailable, expensive or fragile object with available or inexpensive copies", "examples": ["Imitation jewellery", "Astroturf", "Crash test dummy"]}, {"id": "B", "explanation": "Replace an object, or process with optical copies", "examples": ["Do surveying from space photographs instead of on the ground", "Measure an object by scaling measurements from a photograph", "Virtual reality / Virtual mock-ups / electronic pre-assembly modelling"]}, {"id": "C", "explanation": "If visible optical copies are used, move to infrared or ultraviolet copies", "examples": ["Make images in infrared to detect heat sources, such as diseases in crops, or intruders in a security system", "Use UV as a non-destructive crack detection method", "UV light used to attract flying insects into trap"]}]}, "27": {"id": "27", "title": "Cheap Short-Living Objects", "sub_principles": [{"id": "A", "explanation": "Replace an nt to measure temperature", "Plastic spoon which changes colour when hot - for baby food", "Temperature-sensitive dyes used on food product labels to indicate when desired serving temperature has been achieved", "Electrochromic glass", "Light-sensitive glasses", "Camouflage", "Dazzle camouflage used on World War 1 ships", "Employ interference fringes on surface structures to change colour (as in butterfly wings, etc)"]}, {"id": "B", "explanation": "Change the transparency of an object or its external environment", "examples": ["Use photolithography to change transparent material to a solid mask for semiconductor processing", "Light-sensitive glass"]}, {"id": "C", "explanation": "In order to improve observability of things that are difficult to see, use coloured additives or luminescent elements", "examples": ["Fluorescent additives used during UV spectroscopy", "UV marker pens used to help identify stolen goods", "Use opposing colours to increase visibility \u2013 e.g. butchers use green decoration to make the red in meat look redder"]}, {"id": "D", "explanation": "Change the emissivity properties of an object subject to radiant heating", "examples": ["Use of black and white coloured panels to assist thermal management on space vehicles", "Use of parabolic reflectors in solar panels to increase energy capture", "Paint object with high emissivity paint in order to be able to measure its temperature with a calibrated thermal imager"]}]}, "33": {"id": "33", "title": "Homogeneity", "sub_principles": [{"id": "A", "explanation": "Objects interacting with the main object should be of same material (or material with identical properties)", "examples": ["Container made of the same material as its contents, to reduce chemical reactions", "Friction welding requires no intermediary material between the two surfaces to be joined", "Temporary plant pots made out of compostable material", "Human blood transfusions/transplants, use of bio-compatible materials", "Make ice-cubes out     function init() {
        const imp = document.getElementById('improveParam');
        const wor = document.getElementById('worsenParam');
        trizData.contradictions.parameters.forEach((p, i) => {
            imp.add(new Option((i+1)+'. '+p, i+1));
            wor.add(new Option((i+1)+'. '+p, i+1));
        });
        updateEffectOptions(); renderPrinciples(); renderPhysical();
    }
    function updateEffectOptions() {
        const mode = document.getElementById('effectMode').value;
        const taskS = document.getElementById('effectTask');
        const targetS = document.getElementById('effectTarget');
        taskS.innerHTML = ''; targetS.innerHTML = '';
        const mData = trizData.scientific_effects.mappings.filter(m => m.mode === mode);
        [...new Set(mData.map(m => m.task_label))].sort().forEach(t => taskS.add(new Option(t, t)));
        [...new Set(mData.map(m => m.target_label))].sort().forEach(t => targetS.add(new Option(t, t)));
        renderEffects();
    }
    function renderPrinciples() {
        const key = document.getElementById('improveParam').value + '-' + document.getElementById('worsenParam').value;
        const pIds = trizData.contradictions.matrix[key] || [];
        const container = document.getElementById('principleResults');
        container.innerHTML = pIds.length ? '' : '<p>No specific principles.</p>';
        pIds.forEach(id => container.innerHTML += createPrincipleCard(id));
    }
    function renderPhysical() {
        const pIds = trizData.physical_contradictions[document.getElementById('sepPrinciple').value];
        const container = document.getElementById('physicalResults');
        container.innerHTML = '';
        pIds.forEach(id => container.innerHTML += createPrincipleCard(id));
    }

        container.innerHTML = '';
        if (mapping) mapping.effect_ids.forEach(id => {
            const e = trizData.scientific_effects.effects[id];
            if (e) container.innerHTML += `<div class="card"><h3>${e.title}</h3><p>${e.description}</p></div>`;
        });
    }
    function createPrincipleCard(id) {
        const p = trizData.contradictions.principles[id];
        if (!p) return '';
        return `
            <div class="card">
                <h3><span class="principle-id">${id}</span> ${p.title}</h3>
                ${p.sub_principles.map(s => `
                    <div class="sub-principle">
                        <strong>[${s.id}] ${s.explanation}</strong>
                        <ul>${s.examples.map(ex => `<li class="example">${ex}</li>`).join('')}</ul>
                    </div>
                `).join('')}
            </div>
        `;
    }
    init();
</script>
</body>
</html>
